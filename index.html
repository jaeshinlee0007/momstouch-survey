}

// ── 매장 단위 조치상태 판정 (공용) ──────────────────
// "지금 조치가 필요한 매장 목록"의 단일 진실 기준. 매장선택(보완)/보완점검 필요점/대시보드
// 통계카드가 각자 따로 문서 단위로 pending을 판정하면서 화면마다 숫자가 어긋나던 문제를
// 이 함수 하나로 통합. 문서(row) 단위가 아니라 "매장코드당 1개 세트" 단위로 판정한다.
//
// 세트 정의:
//  - SV/TL 세트: SV 최초점검 문서가 있으면 그 문서 기준(TL 독립 N은 loadPrevNItems가 이미
//    SV문서의 followupSvAnswers에 병합 저장하므로 SV문서만 보면 됨). SV문서가 없으면(TL 독립
//    최초점검 매장) TL 최초점검 문서가 기준. 여러 라운드 중 "미해결"(followup 없거나 잔존N>0)
//    문서가 있으면 그것을, 없으면 최신 문서를 기준으로 삼는다 — 재점검으로 대체된 구문서는 무시.
//  - GL 세트: 그룹장 자체 최초점검은 SV/TL과 별개의 독립 승인사이클을 가지므로 분리 판정.
function _statusNCount(ansObj, exclKeys) {
  exclKeys = exclKeys || [];
  return Object.entries(ansObj||{}).filter(([k,v]) => !exclKeys.includes(Number(k)) && v && v.value==="N").length;
}
function _statusIsUnresolvedSvtl(d) {
  const fu = d.followupSvAnswers || d.followupTlAnswers || null;
  if (!fu) return true;
  return _statusNCount(fu) > 0;
}
function _statusByCreatedDesc(a,b) { return (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0); }
function pickPrimarySvtlDoc(svDocs, tlDocs) {
  const svFirst = (svDocs||[]).filter(d => d.inspType==="최초" || !d.inspType).slice().sort(_statusByCreatedDesc);
  const tlFirst = (tlDocs||[]).filter(d => d.inspType==="최초" || !d.inspType).slice().sort(_statusByCreatedDesc);
  let target = svFirst.find(_statusIsUnresolvedSvtl) || svFirst[0] || null;
  if (!target) target = tlFirst.find(_statusIsUnresolvedSvtl) || tlFirst[0] || null;
  return target;
}
function getSvtlSetStatus(svDocs, tlDocs) {
  const d = pickPrimarySvtlDoc(svDocs, tlDocs);
  if (!d) return { status:"해당없음", nRemaining:0, docId:null };
  if (d.finalConfirmed) return { status:"완료", nRemaining:0, docId:d.id };
  if (d.tlRejected || d.glRejected) {
    return { status:"반려", nRemaining:_statusNCount(d.answers), docId:d.id, rejectedBy: d.glRejected?"그룹장":"팀장" };
  }
  const fu = d.followupSvAnswers || d.followupTlAnswers || null;
  if (fu) {
    const fuN = _statusNCount(fu);
    if (fuN > 0) return { status:"보완필요", nRemaining:fuN, docId:d.id };
    return { status:"확인대기", nRemaining:0, docId:d.id, waitFor: d.tlConfirmed ? "그룹장" : "팀장" };
  }
  const origN = _statusNCount(d.answers);
  if (origN > 0) return { status:"보완필요", nRemaining:origN, docId:d.id };
  return { status:"확인대기", nRemaining:0, docId:d.id, waitFor: d.tlConfirmed ? "그룹장" : "팀장" };
}
function getGlSetStatus(glDocs) {
  const d = (glDocs||[]).slice().sort(_statusByCreatedDesc)[0];
  if (!d) return { status:"해당없음", nRemaining:0, docId:null };
  if (d.finalConfirmed) return { status:"완료", nRemaining:0, docId:d.id };
  const glA = d.glAnswers || d.answers || {};
  const nExcl10 = _statusNCount(glA, [10]);
  if (d.glRejected) return { status:"보완필요", nRemaining:nExcl10, docId:d.id, waitFor:"팀장" };
  if (d.tlConfirmed) return { status:"확인대기", nRemaining:0, docId:d.id, waitFor:"그룹장" };
  // glRejected=false·tlConfirmed=false·finalConfirmed=false인데 도달 = 정상 플로우에선 있을 수
  // 없는 상태(자동확인 로직 도입 이전 legacy 데이터). N있으면 원래 반려됐어야 할 건, N없으면
  // "관리자 설정 > 데이터 정리 도구"의 GL Q10 레거시 보정 대상.
  if (nExcl10 > 0) return { status:"보완필요", nRemaining:nExcl10, docId:d.id, waitFor:"팀장", legacyFlag:true };
  return { status:"legacy_미확인", nRemaining:0, docId:d.id, legacyFlag:true };
}
const _statusRank = { "반려":3, "보완필요":2, "확인대기":1, "완료":0, "legacy_미확인":0, "해당없음":-1 };
function getStoreActionStatus(storeCode, svDocs, tlDocs, glDocs) {
  const svtl = getSvtlSetStatus(svDocs, tlDocs);
  const gl   = getGlSetStatus(glDocs);
  const needsAction = ["반려","보완필요"].includes(svtl.status) || ["반려","보완필요"].includes(gl.status);
  const hasLegacyIssue = !!(svtl.legacyFlag || gl.legacyFlag);
  const overall = _statusRank[svtl.status] >= _statusRank[gl.status] ? svtl.status : gl.status;
  return {
    storeCode, needsAction, overall, hasLegacyIssue,
    nRemaining: (svtl.nRemaining||0) + (gl.nRemaining||0),
    svtl, gl,
  };
}
// records(sv/tl/gl 문서 배열)를 storeCode별로 그룹핑
function groupDocsByStore(records) {
  const map = new Map(); // storeCode -> {sv:[],tl:[],gl:[]}
  records.forEach(r => {
    if (!r.storeCode) return;
    if (!map.has(r.storeCode)) map.set(r.storeCode, {sv:[],tl:[],gl:[]});
    const bucket = map.get(r.storeCode);
    if (r.role === "sv" || r.role === "admin") bucket.sv.push(r); // admin은 effectiveRole상 sv와 동일 취급(안전장치)
    else if (r.role === "tl") bucket.tl.push(r);
    else if (r.role === "gl") bucket.gl.push(r);
  });
  return map;
}
// storeCode → 최신 storeName/storeTeam/writerName 등 표시용 메타(가장 최근 문서 기준)
function _latestMeta(bucket) {
  const all = [...bucket.sv, ...bucket.tl, ...bucket.gl].sort(_statusByCreatedDesc);
  return all[0] || {};
}

// 점검 상태 배지 공통 함수
function getInspStatusBadge(r) {
  const nItems     = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
  const hasFollowup = !!r.followupSvAnswers;
  const followupN  = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;

  // 현재 반려 상태(재보완점검 미제출)면 최우선으로 명시 표시
  if (r.tlRejected || r.glRejected) {
    const byWho = r.glRejected ? "그룹장" : "팀장";
    return `<span class="badge-reject">🚫 ${byWho} 반려</span>`;
  }

  // 예전에 반려됐다가 재보완점검으로 해소된 이력이 있으면 작은 힌트 추가
  const rejHint = (r.tlRejectedReason || r.glRejectedReason)
    ? ` <span style="font-size:10px;color:#A0AEC0">(반려 이력있음)</span>` : "";

  if (hasFollowup && followupN === 0) {
    // 보완점검 후 N 없음 → 보완점검완료
    return `<span class="status-badge status-followup-done">보완점검완료</span>${rejHint}`;
  } else if (hasFollowup && followupN > 0) {
    // 보완점검 했지만 N 잔존
    return `<span class="status-badge status-need-more">추가점검필요 N ${followupN}건</span>${rejHint}`;
  } else if (nItems > 0) {
    // 최초점검 N 있음, 보완 미실시
    return `<span class="status-badge status-need">추가점검필요 N ${nItems}건</span>${rejHint}`;
  } else {
    // N 없음 → 점검완료
    return `<span class="status-badge status-done">점검완료</span>${rejHint}`;
  }
}

// TL이 해당 점포를 담당하는지 확인 (admin은 예외 허용)
async function _checkTLOwnership(storeCode) {
  if (_authRole === "admin") return true;
  if (_authRole !== "tl") return false;
  if (!window._activeStores || window._activeStores.length === 0) {
    window._activeStores = await getActiveStoreData();
  }
  const store = (window._activeStores || []).find(s => s.code === storeCode);
  return !!(store && store.tl === _authName);
}

        📋 <b>${autoDesc}</b> 점검 내역을 표시합니다
      </div>` : ""}
      <div style="display:flex;gap:6px;margin-bottom:2px">
        <input id="recSearch" class="input-field" type="text" placeholder="매장명으로 검색" style="flex:1;margin:0;width:auto"/>
        <button onclick="fetchRecords()" style="flex-shrink:0;padding:12px 20px;background:var(--red);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap">검색</button>
      </div>
      <div id="recStatusFilterWrap" style="display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px">
        <button id="rsf_all" onclick="setRecStatusFilter('')" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1.5px solid #E53E3E;background:#E53E3E;color:white;cursor:pointer;font-weight:500">전체</button>
        <button id="rsf_need" onclick="setRecStatusFilter('추가점검필요')" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1.5px solid #F6AD55;background:#FFFBEB;color:#744210;cursor:pointer">추가점검필요</button>
        <button id="rsf_reject" onclick="setRecStatusFilter('반려')" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1.5px solid #FEB2B2;background:#FFF5F5;color:#C53030;cursor:pointer">반려</button>
        <button id="rsf_followup" onclick="setRecStatusFilter('보완점검완료')" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1.5px solid #9AE6B4;background:#F0FFF4;color:#276749;cursor:pointer">보완점검완료</button>
        <button id="rsf_final" onclick="setRecStatusFilter('최종완료')" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1.5px solid #90CDF4;background:#EBF8FF;color:#2B6CB0;cursor:pointer">최종완료</button>
      </div>
      <div id="recList"></div>
    </div>`;
  window._searchType = 'store';
  window._recStatusFilter = '';
  // 진입 시 자동 로드
  fetchRecords();
}

// ══════════════════════════════════════════════
// 보완점검 필요점 화면
// ══════════════════════════════════════════════

let _followupFilter = { team: "", keyword: "" };

async function renderFollowupNeeded(root) {
  if (!["tl","gl","admin"].includes(_authRole)) { go("home"); return; }
  root.innerHTML = `<div class="page-header"><button class="btn-back" onclick="goBack()">←</button><h2>보완점검 필요점</h2><span id="fnBadge" style="margin-left:auto;font-size:12px;background:#FFFBEB;color:#744210;border:0.5px solid #F6AD55;padding:3px 10px;border-radius:20px">로딩중...</span></div><div class="card-section" id="fnBody"><div style="text-align:center;padding:40px;color:#718096">데이터 로딩 중...</div></div>`;
  await buildFollowupNeeded();
}

async function buildFollowupNeeded() {
  const root = document.getElementById("fnBody");
  if (!root) return;

  // 데이터 로드 (fetchRecords 캐시 활용)
  let records = cacheGet("records");
  if (!records) {
    try {
      const [svSnap, tlSnap, glSnap, adSnap] = await Promise.all([
        getDocs(query(collection(db,"surveys"), where("role","==","sv"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","tl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","gl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","admin"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
      ]);
      records = [];
      svSnap.forEach(d => records.push({id:d.id,...d.data()}));
      tlSnap.forEach(d => records.push({id:d.id,...d.data()}));
      glSnap.forEach(d => records.push({id:d.id,...d.data()}));
      adSnap.forEach(d => records.push({id:d.id,...d.data()}));
      records.sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      cacheSet("records", records);
    } catch(e) {
      root.innerHTML = `<div style="text-align:center;padding:20px;color:#E53E3E">데이터 로드 오류: ${e.message}</div>`;
      return;
    }
  }

  // 매장 단위 판정: getStoreActionStatus() 공용함수 — 매장선택(보완)/대시보드와 동일 기준.
  // 매장당 문서가 여러 개(SV+TL+GL)여도 "지금 조치가 필요한 매장" 1행으로만 집계.
  const byStore = groupDocsByStore(records);
  let storeRows = []; // {storeCode, storeName, storeTeam, writerName, dt, status}
  byStore.forEach((bucket, storeCode) => {
    const st = getStoreActionStatus(storeCode, bucket.sv, bucket.tl, bucket.gl);
    if (!st.needsAction) return;
    // 표시용 메타/일시는 실제 조치가 필요한 쪽(svtl 우선, 없으면 gl) 문서 기준
    const svtlActs = ["반려","보완필요"].includes(st.svtl.status);
    const primaryDocId = svtlActs ? st.svtl.docId : st.gl.docId;
    const primaryDoc = [...bucket.sv, ...bucket.tl, ...bucket.gl].find(d => d.id === primaryDocId) || {};
    storeRows.push({
      storeCode,
      storeName: primaryDoc.storeName || "-",
      storeTeam: primaryDoc.storeTeam || "",
      writerName: primaryDoc.writerName || "",
      dt: primaryDoc.visitDate ? new Date(primaryDoc.visitDate) : (primaryDoc.createdAt ? new Date(primaryDoc.createdAt.seconds*1000) : null),
      isRejected: st.svtl.status === "반려" || (!svtlActs && bucket.gl.some(d => d.glRejected)),
      rejectedBy: st.svtl.status === "반려" ? st.svtl.rejectedBy : "그룹장",
      nRemaining: st.nRemaining,
      docId: primaryDocId,
    });
  });

  // 역할별 필터
  if (_authRole === "tl" && _authName) {
    const activeStores = window._activeStores || await getActiveStoreData();
    const teamCodes = new Set(activeStores.filter(s => s.tl === _authName).map(s => s.code));
    storeRows = storeRows.filter(r => teamCodes.has(r.storeCode));
  }

  // 팀 목록 동적 생성 (storeTeam 기반)
  const allTeams = [...new Set(storeRows.map(r => r.storeTeam).filter(Boolean))].sort();

  // 팀 필터 적용
  let filtered = storeRows;
  if (_followupFilter.team) {
    filtered = filtered.filter(r => r.storeTeam === _followupFilter.team);
  }

  // 매장명 검색 적용
  if (_followupFilter.keyword) {
    filtered = filtered.filter(r => (r.storeName||"").includes(_followupFilter.keyword));
  }

  // 정렬: 반려 최상단 → 나머지 (매장선택 화면과 동일한 우선순위)
  filtered.sort((a,b) => (a.isRejected?0:1) - (b.isRejected?0:1));

  // 건수 배지 업데이트 (매장 수 기준)
  const badge = document.getElementById("fnBadge");
  if (badge) badge.textContent = filtered.length + "건";

  // 목록 렌더링 (매장당 1행)
  const rows = filtered.map(r => {
    const dtStr = r.dt ? `${r.dt.getFullYear()}.${String(r.dt.getMonth()+1).padStart(2,"0")}.${String(r.dt.getDate()).padStart(2,"0")} ${String(r.dt.getHours()).padStart(2,"0")}:${String(r.dt.getMinutes()).padStart(2,"0")}` : "-";
    const badgeHtml = r.isRejected
      ? `<span style="font-size:12px;background:#FFF5F5;color:#C53030;border:0.5px solid #FEB2B2;padding:2px 8px;border-radius:12px">🚫 ${r.rejectedBy} 반려</span>`
      : `<span style="font-size:12px;background:#FFFBEB;color:#744210;border:0.5px solid #F6AD55;padding:2px 8px;border-radius:12px">N ${r.nRemaining}건</span>`;
    return `
    <div onclick="fnViewRecord('${r.docId}')" style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:14px;font-weight:500;color:#2D3748">${r.storeName||"-"}</span>
        ${badgeHtml}
      </div>
      <div style="font-size:12px;color:#718096">${r.storeCode||""} · ${r.storeTeam||""}</div>
      <div style="font-size:12px;color:#718096;margin-top:2px">${dtStr} · ${r.writerName||""}</div>
    </div>`;
  }).join("");

  root.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select onchange="fnSetTeam(this.value)" style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:white">
        <option value="">전체 팀</option>
        ${allTeams.map(t => `<option value="${t}" ${_followupFilter.team===t?"selected":""}>${t}</option>`).join("")}
      </select>
      <button onclick="fnDownloadExcel()" style="padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:white;cursor:pointer;white-space:nowrap">⬇ Excel</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="fnSearchInput" type="text" placeholder="매장명 검색..." value="${_followupFilter.keyword}"
        onkeydown="if(event.key==='Enter') fnSearch()"
        style="flex:1;padding:8px 12px;border:1.5px solid ${_followupFilter.keyword ? "#E53E3E" : "var(--border)"};border-radius:8px;font-size:13px">
      <button onclick="fnSearch()" style="padding:8px 16px;background:#E53E3E;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap">검색</button>
    </div>
    ${_followupFilter.keyword ? `<div style="font-size:12px;color:#E53E3E;margin-bottom:8px">"${_followupFilter.keyword}" 검색 결과 ${filtered.length}건</div>` : `<div style="font-size:12px;color:#718096;margin-bottom:8px">E코드 · 점포명 · 최초점검일시 · 점검자</div>`}
    ${filtered.length === 0 ? `<div style="text-align:center;padding:40px;color:#718096">해당 조건의 보완점검 필요 점포가 없습니다.</div>` : rows}`;
}

function fnSetTeam(val) {
  _followupFilter.team = val;
  buildFollowupNeeded();
}

function fnSearch() {
  const input = document.getElementById("fnSearchInput");
  _followupFilter.keyword = input ? input.value.trim() : "";
  buildFollowupNeeded();
}

async function fnViewRecord(docId) {
  await loadCompareData(docId);
  go("compare");
}

async function fnDownloadExcel() {
  // 현재 필터 기준 Excel 다운로드 — 화면(buildFollowupNeeded)과 동일한 매장단위 판정 재사용
  let records = cacheGet("records") || [];
  const byStore = groupDocsByStore(records);
  let pending = [];
  byStore.forEach((bucket, storeCode) => {
    const st = getStoreActionStatus(storeCode, bucket.sv, bucket.tl, bucket.gl);
    if (!st.needsAction) return;
    const svtlActs = ["반려","보완필요"].includes(st.svtl.status);
    const primaryDocId = svtlActs ? st.svtl.docId : st.gl.docId;
    const primaryDoc = [...bucket.sv, ...bucket.tl, ...bucket.gl].find(d => d.id === primaryDocId) || {};
    pending.push({ storeCode, storeName: primaryDoc.storeName, storeTeam: primaryDoc.storeTeam,
      writerName: primaryDoc.writerName, visitDate: primaryDoc.visitDate, createdAt: primaryDoc.createdAt });
  });
  if (_authRole === "tl" && _authName) {
    const activeStores = window._activeStores || await getActiveStoreData();
    const teamCodes = new Set(activeStores.filter(s => s.tl === _authName).map(s => s.code));
    pending = pending.filter(r => teamCodes.has(r.storeCode));
  }
  if (_followupFilter.team) pending = pending.filter(r => r.storeTeam === _followupFilter.team);
  if (_followupFilter.keyword) pending = pending.filter(r => (r.storeName||"").includes(_followupFilter.keyword));

  // SheetJS 동적 로드
  if (!window.XLSX) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const rows = [["E코드", "점포명", "팀", "최초점검일시", "점검자"]];
  pending.forEach(r => {
    const dt = r.visitDate ? new Date(r.visitDate) : (r.createdAt ? new Date(r.createdAt.seconds*1000) : null);
    const dtStr = dt ? `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}` : "-";
    rows.push([r.storeCode||"", r.storeName||"", r.storeTeam||"", dtStr, r.writerName||""]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:12},{wch:20},{wch:10},{wch:18},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, "보완점검필요점");
  XLSX.writeFile(wb, `보완점검필요점_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function setRecStatusFilter(val) {
  window._recStatusFilter = val;
  fetchRecords();
}

async function fetchRecords() {
  const keyword = document.getElementById("recSearch").value.trim();
  const recList = document.getElementById("recList");
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    // 양도양수/폐점점포 배지 표시를 위해 역할 무관 항상 맵 갱신
    await _refreshTransferAndClosedMaps();
    // 매장 데이터 로드 보장 (SV/TL 역할 필터에 필요)
    if ((_authRole === "tl" || _authRole === "sv") && (!window._activeStores || window._activeStores.length === 0)) {
      window._activeStores = await getActiveStoreData();
    }
    // SV + TL + GL 전체 조회 후 병합
    let records = cacheGet("records");
    if (!records) {
      const [svSnap2, tlSnap2, glSnap2, adminSnap2] = await Promise.all([
        getDocs(query(collection(db,"surveys"), where("role","==","sv"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","tl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","gl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","admin"), orderBy("createdAt","desc"))),
      ]);
      records = [];
      svSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      tlSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      glSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      adminSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      records.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      cacheSet("records", stripImages(records)); // 이미지 제외 버전 캐시
    }
    // 양도양수: 각 점포코드에 배지 정보 추가
    const tMap = window._transferMap || new Map();
    records = records.map(r => ({
      ...r,
      _transferInfo: tMap.get(r.storeCode) || null,
    }));
    // ── 역할별 자동 필터 ──────────────────────────
    if (_currentUser && _authRole === "sv" && _authName) {
      // SV: 본인 담당 매장(store_master 기준) 건 전체 + 본인이 작성한 건(폐점/양도 등으로 담당매장 목록에서
      // 빠졌더라도 본인이 쓴 건은 계속 보이도록 안전망 유지)
      const activeStores = window._activeStores || [];
      const myStoreCodes = new Set(activeStores.filter(s => s.sv === _authName).map(s => s.code));
      records = records.filter(r =>
        myStoreCodes.has(r.storeCode) ||
        r.writerName === _authName ||
        r.followupSvWriterName === _authName
      );
    } else if (_currentUser && _authRole === "tl" && _authName) {
      // TL: 담당팀 점검 건 (store_master tl===_authName 매장)
      const activeStores = window._activeStores || [];
      const teamCodes = new Set(activeStores.filter(s => s.tl === _authName).map(s => s.code));
      records = records.filter(r => teamCodes.has(r.storeCode));
    }
    // GL/admin: 전체 표시 (필터 없음)

    // 매장명 검색 (역할 필터 위에 추가 적용)
    if (keyword) {
      records = records.filter(r => r.storeName && r.storeName.includes(keyword));
    }

    // 상태 필터 적용
    const _sf = window._recStatusFilter || "";
    if (_sf) {
      records = records.filter(r => {
        const nItems       = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
        // SV 보완(followupSvAnswers) 또는 TL 보완(followupTlAnswers) 중 하나라도 있으면 보완 실시로 간주
        const hasSvFollowup = r.followupSvAnswers != null && Object.values(r.followupSvAnswers||{}).length > 0;
        const hasTlFollowup = r.followupTlAnswers != null && Object.values(r.followupTlAnswers||{}).length > 0;
        const hasAnyFollowup = hasSvFollowup || hasTlFollowup;
        // 보완점검 후 잔존 N수 (SV 보완 또는 TL 보완 중 최신 것 기준)
        const svFollowupN = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;
        const tlFollowupN = Object.values(r.followupTlAnswers||{}).filter(a=>a.value==="N").length;
        // 보완 후 N이 0인지: 가장 최근 보완 기준으로 판단
        const followupN = hasTlFollowup ? tlFollowupN : svFollowupN;
        const isRejected = !!(r.tlRejected || r.glRejected);
        if (_sf === "추가점검필요") return nItems > 0 && !r.finalConfirmed; // 반려건도 추가점검필요에 함께 노출
        if (_sf === "반려")         return isRejected;
        if (_sf === "보완점검완료") return hasAnyFollowup && followupN === 0 && !r.finalConfirmed && !isRejected;
        if (_sf === "최종완료")     return !!r.finalConfirmed;
        return true;
      });
    }

    // 필터 버튼 활성화 상태 반영
    ["all","need","reject","followup","final"].forEach(k => {
      const btn = document.getElementById("rsf_"+k);
      if (!btn) return;
      const map = {all:"",need:"추가점검필요",reject:"반려",followup:"보완점검완료",final:"최종완료"};
      const isActive = map[k] === _sf;
      const styles = {
        all:     {bg:"#E53E3E", border:"#E53E3E", color:"white"},
        need:    {bg:"#FFFBEB", border:"#F6AD55", color:"#744210"},
        reject:  {bg:"#FFF5F5", border:"#FEB2B2", color:"#C53030"},
        followup:{bg:"#F0FFF4", border:"#9AE6B4", color:"#276749"},
        final:   {bg:"#EBF8FF", border:"#90CDF4", color:"#2B6CB0"},
      };
      const s = styles[k];
      if (isActive) {
        btn.style.fontWeight = "600";
        btn.style.background = s.bg;
        btn.style.borderColor = s.border;
        btn.style.color = s.color;
        btn.style.transform = "scale(1.05)";
      } else {
        btn.style.fontWeight = "400";
        btn.style.background = k === "all" ? "white" : s.bg;
        btn.style.borderColor = "var(--border)";
        btn.style.color = "var(--text-secondary)";
        btn.style.transform = "scale(1)";
      }
    });

    if (records.length===0) { recList.innerHTML=`<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="store-count" style="padding:8px 2px">${records.length}건</div><div class="search-list">`;
    records.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const typeBadge = `<span class="insp-badge ${r.inspType==='최초'?'badge-first':'badge-follow'} badge-sm">${r.inspType||"최초"}점검</span>`;
      const statusBadge = getInspStatusBadge(r);
      const tInfoR = (window._transferMap||new Map()).get(r.storeCode) || null;
      const transferBadgeR = tInfoR
        ? tInfoR.map(t => {
            const d = t.transferDate||""; const yy=d.slice(2,4); const mm=d.slice(5,7);
            return `<span class="badge-transfer">⚡ ${yy}.${mm} 양도양수</span>`;
          }).join(" ")
        : "";
      const closedInfoR = (window._closedMap||new Map()).get(r.storeCode) || null;
      const closedBadgeR = closedInfoR ? `<span class="badge-closed">🚫 폐점</span>` : "";
      html += `<div class="search-item" onclick="viewRecord('${r.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0">${typeBadge}<span class="si-store">${r.storeName}</span>${transferBadgeR}${closedBadgeR}</div>
          <div style="display:flex;gap:3px;flex-shrink:0">${productBadges((window._activeStores||[]).find(s=>s.code===r.storeCode))}</div>
        </div>
        <div class="si-meta">${r.role==="gl"?"그룹장":r.role==="tl"?"팀장":"SV"}: ${r.writerName} · ${dt}</div>
        <div class="si-tags">${statusBadge}</div>
      </div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) { recList.innerHTML=`<p class="error-text">오류: ${e.message}</p>`; }
}

async function viewRecord(docId) {
  // 캐시/재조회로 문서 role, storeCode, 보완상태 우선 확인
  const cached = [...(cacheGet("records")||[]), ...(cacheGet("dashboard")||[])];
  let found = cached.find(r => r.id === docId);
  if (!found) {
    await loadCompareData(docId);
    found = S.compareData;
  }
  if (!found) { S.loadedDocId = docId; go("compare"); return; }

  const nItems = Object.values(found.answers||{}).filter(a=>a.value==="N").length;
  const hasFollowup = !!(found.followupSvAnswers || found.followupTlAnswers);
  const isClosedStore = !!(window._closedMap||new Map()).get(found.storeCode);
  const needFollowup = nItems > 0 && !found.finalConfirmed && !hasFollowup && !isClosedStore;

  if (isClosedStore && nItems > 0 && !found.finalConfirmed && !hasFollowup) {
    alert("🚫 폐점된 매장입니다. 보완점검을 진행할 수 없습니다.");
  }

  if (needFollowup && _authRole !== "gl") {
    if (found.role === "gl") {
      // GL건 N항목 → 기존 GL 전용 보완점검 진입 경로 그대로 사용
      loadGLCompareAndShow(docId);
      return;
    } else {
      // SV/TL건 N항목 → "점검 시작하기"와 동일한 검증된 경로 재사용
      S.role = _authRole;
      S.writerName = _authName || "";
      S.storeCode = found.storeCode;
      S.storeName = found.storeName;
      S.storeTeam = found.storeTeam;
      S.inspType = "보완";
      S.answers = {};
      await loadPrevNItems(found.storeCode);
      return;
    }
  }

  // 보완 대상 아니거나 폐점점포면 결과보기(compare) 화면으로 (폐점 배지 표시됨)
  await loadCompareData(docId);
  S.loadedDocId = docId; go("compare");
}

async function doLogin() {
  const email = document.getElementById("loginEmail")?.value?.trim();
  const pw    = document.getElementById("loginPw")?.value;
  const errEl = document.getElementById("loginErr");
  if (!email || !pw) {
    errEl.textContent = "이메일과 비밀번호를 입력해주세요.";
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";

  const btn = document.querySelector("#app .btn-primary");
  if (btn) { btn.disabled=true; btn.textContent="로그인 중..."; }

  const result = await authLogin(email, pw);
  if (result.ok) {
    // onAuthStateChanged에서 자동으로 home으로 이동
    // (타이밍 문제 방지 위해 여기서는 별도 이동 없음)
    const btn = document.querySelector("#app .btn-primary");
    if (btn) btn.textContent = "로그인됨 ✅";
  } else {
    if (btn) { btn.disabled=false; btn.textContent="로그인"; }
    errEl.textContent = result.msg;
    errEl.style.display = "block";
  }
}

// ── 날짜 필터 유틸 함수들 ──────────────────────────
function getDashDateRange() {
  const f = window._dashDateFilter || "오늘";
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (f === "오늘") {
    const label = `오늘의 점검 현황 (${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')})`;
    return { from: today, label };
  }
  if (f === "어제") {
    const d = new Date(today); d.setDate(d.getDate()-1);
    return { from: d, to: new Date(d), label: "어제 점검 현황" };
  }
  if (f === "3일") {
    const d = new Date(today); d.setDate(d.getDate()-2);
    return { from: d, label: "최근 3일 점검 현황" };
  }
  if (f === "1주") {
    const d = new Date(today); d.setDate(d.getDate()-6);
    return { from: d, label: "최근 1주 점검 현황" };
  }
  if (f === "1개월") {
    const d = new Date(today); d.setMonth(d.getMonth()-1);
    return { from: d, label: "최근 1개월 점검 현황" };
  }
  if (f === "기간선택") {
    const fr = window._dashDateFrom ? new Date(window._dashDateFrom) : today;
    const to = window._dashDateTo   ? new Date(window._dashDateTo)   : today;
    return { from: fr, to, label: "기간 선택 점검 현황" };
  }
  if (f === "전체") {
    return { from: new Date(2000, 0, 1), label: "전체 기간 점검 현황" };
  }
  return { from: today, label: "오늘의 점검 현황" };
}

function filterByDate(records) {
  const { from, to } = getDashDateRange();
  return records.filter(r => {
    const d = r.visitDate
      ? new Date(r.visitDate)
      : (r.createdAt ? new Date(r.createdAt.seconds*1000) : null);
    if (!d) return false;
    const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (to) return day >= from && day <= to;
    return day >= from;
  });
}

function setDashDateFilter(f) {
  window._dashDateFilter = f;
  window._dashShown = 20;
  if (f !== "기간선택") {
    buildDashboard(document.getElementById("app"), window._dashRecords);
  } else {
    buildDashboard(document.getElementById("app"), window._dashRecords);
    const wrap = document.getElementById("dateRangeWrap");
    if (wrap) wrap.style.display = "flex";

function buildDashboard(root, records) {
  // ── Step 1: 탭/필터 상태 (가장 먼저 정의) ──
  const tab        = window._dashTab        || "전체";
  const dashFilter = window._dashFilter     || null;
  const df         = window._dashDateFilter || "오늘";

  // ── Step 2: 날짜 필터 적용 기준 결정 ──
  // 전체 탭: 날짜 필터 적용 / 나머지 탭: 전체 기간
  const statsBase = (tab === "전체") ? filterByDate(records) : records;

  // ── Step 3: 매장 단위 조치상태 요약 (getStoreActionStatus 공용함수) ──
  // "보완미실시"/"보완점검완료"는 매장(세트) 단위로 재정의. 매장코드별로 여러 문서(SV/TL/GL)가
  // 있어도 매장 1건으로만 집계되도록 records 전체를 기준으로 한 번만 그룹핑하고,
  // 날짜필터가 적용되는 "전체" 탭 카운트는 각 매장의 대표문서 생성일 기준으로 별도 필터링한다.
  const _dashByStore = groupDocsByStore(records);
  const _pendingRepDocsAll = [];   // 조치필요 매장의 대표문서(전체기간)
  const _followupDoneDocsAll = []; // 보완을 거쳐 해소된 매장의 대표문서(전체기간)
  _dashByStore.forEach((bucket, storeCode) => {
    const st = getStoreActionStatus(storeCode, bucket.sv, bucket.tl, bucket.gl);
    const allDocs = [...bucket.sv, ...bucket.tl, ...bucket.gl];
    if (st.needsAction) {
      const svtlActs = ["반려","보완필요"].includes(st.svtl.status);
      const primaryId = svtlActs ? st.svtl.docId : st.gl.docId;
      const primaryDoc = allDocs.find(d => d.id === primaryId);
      if (primaryDoc) _pendingRepDocsAll.push(primaryDoc);
    }
    // 보완완료 판정: SV/TL 세트 대표문서에 보완이력이 있고 잔존N=0인 경우만
    // (애초에 N이 없어 보완 자체가 필요없었던 매장은 제외 — 원본 정의와 동일)
    const svtlDoc = pickPrimarySvtlDoc(bucket.sv, bucket.tl);
    if (svtlDoc) {
      const fu = svtlDoc.followupSvAnswers || svtlDoc.followupTlAnswers || null;
      if (fu && _statusNCount(fu) === 0) _followupDoneDocsAll.push(svtlDoc);
    }
  });

  // ── Step 4 & 5: 통계 카드 + 탭 카운트 (모두 statsBase 기반으로 통일) ──
  // statsBase = 전체탭: 날짜필터 적용 / 나머지탭: 전체기간
  // → 통계카드 숫자와 탭 카운트 숫자가 항상 일치

  const isReadyForTL = r => {
    if (r.role === "gl") {
      return r.glRejected === true && !r.tlConfirmed && !r.finalConfirmed;
    }
    if (r.tlRejected) return false; // 반려된 건은 재보완점검 전까지 "팀장확인 대기" 큐에서 제외
    const rNItems      = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const rHasFollowup = !!r.followupSvAnswers;
    const rFollowupN   = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;
    return ((rNItems===0) || (rHasFollowup && rFollowupN===0)) && !r.tlConfirmed && !r.finalConfirmed;
  };
  const isReadyForGL = r => r.tlConfirmed && !r.finalConfirmed;

  const total          = statsBase.length;
  const hasFirst       = statsBase.filter(r => r.inspType==="최초"||!r.inspType).length;
  // 매장 단위 카운트: "전체" 탭이면 대표문서 생성일 기준으로 날짜필터 재적용, 아니면 전체기간
  const pendingRepDocs      = (tab === "전체") ? filterByDate(_pendingRepDocsAll)   : _pendingRepDocsAll;
  const followupDoneRepDocs = (tab === "전체") ? filterByDate(_followupDoneDocsAll) : _followupDoneDocsAll;
  const hasFollowup    = followupDoneRepDocs.length;
  const pending         = pendingRepDocs.length;
  const tlConfirmReady = statsBase.filter(isReadyForTL).length;
  const glConfirmReady = statsBase.filter(isReadyForGL).length;
  const finalConfirmed = statsBase.filter(r => r.finalConfirmed).length;

  // ── Step 6: 탭별 tableRecords 결정 ──
  let tableRecords = records;
  if (tab === "전체" && dashFilter) {
    if      (dashFilter === "전체점검")   tableRecords = records;
    else if (dashFilter === "최초점검")   tableRecords = records.filter(r => r.inspType==="최초"||!r.inspType);
    else if (dashFilter === "보완미실시") tableRecords = _pendingRepDocsAll;   // 매장당 1건(대표문서)
    else if (dashFilter === "보완완료")   tableRecords = _followupDoneDocsAll; // 매장당 1건(대표문서)
    else if (dashFilter === "최종확인")   tableRecords = records.filter(r => r.finalConfirmed);
  } else if (tab === "팀장확인") {
    let tlFiltered = records.filter(isReadyForTL);
    const selectedTL = window._dashTLFilter || "";
    if (selectedTL) {
      const _as = window._activeStores || [];
      const tlStoreCodes = new Set(_as.filter(s => s.tl === selectedTL).map(s => s.code));
      tlFiltered = tlFiltered.filter(r => tlStoreCodes.has(r.storeCode));
    }
    tableRecords = tlFiltered;
  } else if (tab === "그룹장확인") {
    tableRecords = records.filter(isReadyForGL);
  } else if (tab === "최종확인") {
    tableRecords = records.filter(r => r.finalConfirmed);
  }

  // ── Step 6.5: 탭 검색어 필터 (팀장/그룹장/최종확인 탭) ──
  const tabSearch = (window._dashTabSearch || "").trim();
  if (tabSearch && (tab === "팀장확인" || tab === "그룹장확인" || tab === "최종확인")) {
    tableRecords = tableRecords.filter(r =>
      (r.storeName || "").includes(tabSearch)
    );
  }

  // ── Step 7: 날짜 필터 + 더보기 슬라이싱 ──
  const dateFiltered  = (tab === "전체") ? filterByDate(tableRecords) : tableRecords;
  const shown         = window._dashShown || 20;
  const shownRecords  = dateFiltered.slice(0, shown);
  const remaining     = dateFiltered.length - shown;

  // ── Step 8: 행 렌더링 ──
  const rows = shownRecords.map(r => {
    const dt        = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString("ko-KR") : "-";
    const typeBadge = `<span class="insp-badge ${r.inspType==='최초'||!r.inspType?'badge-first':'badge-follow'} badge-sm">${r.inspType||'최초'}점검</span>`;
    const nItems    = r.role === "gl"
      ? Object.entries(r.answers||{}).filter(([k,v]) => Number(k) !== 10 && v.value === "N").length
      : Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const nBadge    = nItems>0
      ? `<span class="badge-n">N ${nItems}건</span>`
      : `<span class="badge-ok">이상없음</span>`;

    let statusBadge = "";
    const hasFollowupDone = !!r.followupSvAnswers;
    const followupNItems  = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;

    if (r.role === "gl") {
      if (r.finalConfirmed)  statusBadge = `<span class="badge-final">✅ 최종확인</span>`;
      else if (r.glRejected) statusBadge = `<span class="badge-tl">📋 팀장 보완점검 대기</span>`;
      else                   statusBadge = `<span class="badge-ok">점검완료</span>`;
    } else {
      // isClean: 진짜 손 안 댄 신규 건만(N도 없고 보완점검 제출도 없음).
      // 보완점검으로 N이 해소된 경우는 여기 포함하지 않고 getInspStatusBadge()에서
      // "보완점검완료"로 있는 그대로 표시되도록 함.
      const isClean = nItems===0 && !hasFollowupDone;
      if (r.finalConfirmed)   statusBadge = `<span class="badge-final">✅ 최종확인</span>`;
      else if (r.glRejected)  statusBadge = `<span class="badge-reject">🚫 그룹장 반려</span>`;
      else if (r.tlRejected)  statusBadge = `<span class="badge-reject">🚫 팀장 반려</span>`;
      else if (r.tlConfirmed) statusBadge = `<span class="badge-gl">👥 그룹장확인 대기</span>`;
      else if (isClean)       statusBadge = `<span class="badge-tl">📋 팀장확인 대기</span>`;
      else                    statusBadge = getInspStatusBadge(r);
    }

    const glFollowupRow    = r.role === "gl" && r.glRejected && !r.finalConfirmed;
    const rowBg            = glFollowupRow ? 'style="cursor:pointer;background:#FFFBEB"' : 'style="cursor:pointer"';
    const finalStatusBadge = glFollowupRow
      ? `<span class="badge-tl" style="background:#FEFCBF;color:#744210;border:1px solid #D69E2E">🔍 보완점검 진행</span>`
      : statusBadge;
    const tInfo            = r._transferInfo || (window._transferMap||new Map()).get(r.storeCode) || null;
    const transferBadges   = tInfo
      ? tInfo.map(t => {
          const d = t.transferDate || "";
          const yy = d.slice(2,4); const mm = d.slice(5,7);
          return `<span class="badge-transfer">⚡ ${yy}.${mm} 양도양수</span>`;
        }).join(" ")
      : "";
    const closedInfo        = (window._closedMap||new Map()).get(r.storeCode) || null;
    const closedBadge       = closedInfo ? `<span class="badge-closed">🚫 폐점</span>` : "";
    return `<tr onclick="viewRecordDash('${r.id}')" ${rowBg}>
      <td>${typeBadge} ${r.storeName||""}${transferBadges ? " "+transferBadges : ""}${closedBadge ? " "+closedBadge : ""}</td>

  // ── Step 9: UI 헬퍼 ──

      </div>
    </div>` : `

      <span style="font-size:13px;font-weight:500;color:#2D3748;">전체 기간 점검 현황</span>

    <div class="dash-stats">
      <div class="${statActive('전체점검')}" onclick="setDashFilter('전체점검')">
        <div class="stat-num">${total}</div><div class="stat-label">전체점검</div>
      </div>
      <div class="${statActive('최초점검')}" onclick="setDashFilter('최초점검')">
        <div class="stat-num" style="color:#3182CE">${hasFirst}</div><div class="stat-label">최초점검</div>
      </div>
      <div class="${statActive('보완미실시')}" onclick="setDashFilter('보완미실시')">
        <div class="stat-num" style="color:#D69E2E">${pending}</div><div class="stat-label">보완미실시</div>
      </div>
      <div class="${statActive('보완완료')}" onclick="setDashFilter('보완완료')">

      </div>
      <div class="${statActive('최종확인')}" onclick="setDashFilter('최종확인')">
        <div class="stat-num" style="color:#6B46C1">${finalConfirmed}</div><div class="stat-label">최종확인</div>

    <div class="dash-tabs">
      <button class="${tabActive('전체')}"      onclick="setDashTab('전체')">전체 <span class="tab-cnt">${records.length}</span></button>

      <button class="${tabActive('그룹장확인')}"  onclick="setDashTab('그룹장확인')">그룹장확인 <span class="tab-cnt">${glConfirmReady}</span></button>

    ${dashFilter && tab==="전체" ? `<div class="filter-bar">필터: <b>${dashFilter}</b> <button class="filter-clear" onclick="clearDashFilter()">✕ 초기화</button></div>` : ""}
    ${tab==="팀장확인" ? `<div class="tl-filter-wrap">
      <span class="tl-filter-label">팀장 필터</span>

          style="flex:1;padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;box-sizing:border-box">
        <button onclick="execDashTabSearch()"
          style="padding:8px 16px;background:var(--red);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0">검색</button>

  updateStoreDataStatus();
}


function setDashFilter(filter) {
  window._dashTab = "전체";
  window._dashFilter = filter; // 재클릭해도 해제 없이 유지
  window._dashShown = 20;
  window._dashDateFilter = "전체"; // 항상 전체 기간 기준
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function clearDashFilter() {
  window._dashFilter = null;
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function setTLFilter(value) {
  window._dashTLFilter = value || "";
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function setDashTab(tab) {
  window._dashTab = tab;
  window._dashFilter = null;
  window._dashShown = 20;
  window._dashTabSearch = "";
  buildDashboard(document.getElementById("app"), window._dashRecords);
}
function setDashTabSearch(val) {
  window._dashTabSearch = val;
}
function execDashTabSearch() {
  const input = document.getElementById("dashTabSearchInput");
  if (input) window._dashTabSearch = input.value.trim();
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

async function updateStoreDataStatus() {
  const statusEl = document.getElementById("storeDataStatus");
  if (!statusEl) return;
  try {
    const snap = await getDocs(collection(db, "store_master"));
    if (!snap.empty) {
      statusEl.textContent = `Firebase 매장 데이터 ${snap.size}개 적용 중`;
      statusEl.style.color = "#38A169";
    } else {
      statusEl.textContent = `내장 데이터 사용 중 (Excel 업로드 시 자동 교체)`;
      statusEl.style.color = "#D69E2E";
    }
  } catch(e) {
    statusEl.textContent = "매장 데이터 상태 확인 실패";
    statusEl.style.color = "#E53E3E";
  }
}

async function handleStoreUpload(input) {
  const file = input.files[0];
  if (!file) return;

  // 확인 팝업
  const confirmed = confirm(
    `매장 데이터를 업로드하면 기존 Firebase 매장 데이터가 교체됩니다.
파일: ${file.name}

계속하시겠습니까?`
  );
  if (!confirmed) { input.value = ""; return; }

  const progress = document.getElementById("uploadProgress");
  const fill = document.getElementById("uploadProgressFill");
  const text = document.getElementById("uploadProgressText");
  if (progress) progress.style.display = "block";
  if (fill) fill.style.width = "30%";
  if (text) text.textContent = "파일 분석 중...";

  try {
    if (fill) fill.style.width = "60%";
    if (text) text.textContent = "Firebase 업로드 중...";

    const count = await uploadStoreData(file);

    if (fill) fill.style.width = "100%";
    if (text) text.textContent = `완료! ${count}개 매장 업로드됨`;

    setTimeout(() => {
      if (progress) progress.style.display = "none";
      updateStoreDataStatus();
    }, 2000);

    try { localStorage.removeItem("momstouch_store_master"); } catch(e) {}
    _cache.store = { data: null, ts: 0 };
    _mapsLoadedAt = 0; // 양도양수/폐점점포 맵도 강제 재조회
    // 방법B: 업로드 버전 타임스탬프 Firestore에 기록 → 모든 기기 자동 무효화
    const _uploadTs = Date.now();
    try {
      await setDoc(doc(db, "settings", "storeMasterVersion"), { ts: _uploadTs });
    } catch(e) { console.warn("버전 기록 실패:", e.message); }
    alert(`✅ 매장 데이터 업로드 완료!\n${count}개 매장이 등록되었습니다.`);
  } catch(e) {
    if (text) text.textContent = `오류: ${e}`;
    if (fill) fill.style.width = "0%";
    alert(`업로드 실패: ${e}`);
  }
  input.value = "";
}

// ── DASHBOARD (신제품 현장점검 · 갓빠삭치킨 교육점검, surveys_np 전용) ──
// 작업지시서 7항: TL=담당팀 매장만, GL/관리자=전체 매장, 매장별 교육완료여부(Y/N)+교육인원 표시.
// 승인/반려 없음 (작업지시서 명시) — 읽기 전용 집계 화면.
async function renderDashboardNP(root) {
  if (!_npEnabled) {
    alert("현재 신제품 현장점검 기능이 비활성화되어 있습니다.");
    go("hub");
    return;
  }
  if (_authRole === "sv") {
    alert("대시보드 접근 권한이 없습니다.");
    go("homeNP");
    return;
  }
  window._dashNpStatusFilter = "";
  window._dashNpKeyword = "";
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <h2>관리자 대시보드 (신제품)</h2>
      <button class="btn-home-dash" onclick="go('homeNP')" style="margin-left:auto">🏠 Home</button>
    </div>
    <div style="padding:20px;text-align:center;color:#718096">데이터 불러오는 중...</div>`;
  try {
    let records = cacheGet("dashboardNP");
    if (!records) {
      const snap = await getDocs(query(collection(db,"surveys_np"), orderBy("createdAt","desc")));
      records = [];
      snap.forEach(d => records.push({id:d.id, ...d.data()}));
      cacheSet("dashboardNP", records);
    }
    const activeStores = await getActiveStoreData();

    // 열람 범위: TL은 담당팀(store_master.tl === 본인 이름)만, GL/관리자는 전체
    // + 신제품 판매/교육 대상 매장만 (STORE INFO "신제품-갓빠삭" 컬럼 기준)
    let scopeStores = activeStores.filter(s => s.npEligible);
    if (_authRole === "tl") {
      scopeStores = scopeStores.filter(s => s.tl === _authName || s.sv === _authName);
    }

    window._dashNpRecords = records; // 엑셀 다운로드용
    window._dashNpScope = scopeStores;
    buildDashboardNP(root, records, scopeStores);
  } catch(e) {
    root.innerHTML += `<p style="padding:20px;color:#E53E3E">오류: ${e.message}</p>`;
  }
}

function buildDashboardNP(root, records, scopeStores) {
  // storeCode → 최신 문서 매핑
  const latestByStore = new Map();
  records.forEach(r => {
    const ex = latestByStore.get(r.storeCode);
    const t = r.createdAt?.seconds || 0;
    const exT = ex?.createdAt?.seconds || 0;
    if (!ex || t > exT) latestByStore.set(r.storeCode, r);
  });

  const rowsDataAll = scopeStores.map(s => {
    const rec = latestByStore.get(s.code) || null;
    return { store: s, rec, status: npStatus(rec) };
  });

  const doneCount    = rowsDataAll.filter(r => r.status === "done").length;
  const pendingCount = rowsDataAll.filter(r => r.status === "pending").length;
  const needCount    = rowsDataAll.filter(r => r.status === "needs").length;
  const notYetCount  = rowsDataAll.filter(r => r.status === "none").length;

  // 스탯카드 필터 적용 ("" = 전체, "done"/"pending"/"needs"/"none")
  const statFilter = window._dashNpStatusFilter || "";
  let rowsData = !statFilter ? rowsDataAll : rowsDataAll.filter(r => r.status === statFilter);

  // 매장명 검색 (스탯카드 필터와 AND 조건으로 동시 적용)
  const keyword = (window._dashNpKeyword || "").trim().toLowerCase();
  if (keyword) rowsData = rowsData.filter(r =>
    r.store.name.toLowerCase().includes(keyword) ||
    (r.store.code||"").toLowerCase().includes(keyword) ||
    (r.rec?.writerName||"").toLowerCase().includes(keyword)
  );

  const cardStyle = (key, activeColor) => {
    const isActive = statFilter === key;
    return isActive
      ? `cursor:pointer;border-radius:10px;border:2px solid ${activeColor};box-shadow:0 0 0 3px ${activeColor}26`
      : `cursor:pointer`;
  };

  const statusBadge = (status) => ({
    done:    `<span style="color:#276749;font-weight:700">완료</span>`,
    pending: `<span style="color:#B7791F;font-weight:700">승인대기</span>`,
    needs:   `<span style="color:#C53030;font-weight:700">재점검필요</span>`,
    none:    `<span style="color:#A0AEC0">미점검</span>`,
  }[status]);

  const rows = rowsData.map(({store, rec, status}) => {
    const cnt = rec?.npAnswers?.attendees?.length ?? "-";
    const dt = rec?.createdAt ? new Date(rec.createdAt.seconds*1000) : null;
    const dtStr = dt ? `${dt.getMonth()+1}/${dt.getDate()}` : "-";
    const memo = rec?.npAnswers?.memo || "";
    const memoShort = memo.length > 16 ? memo.slice(0,16) + "…" : (memo || "-");
    const clickAttr = rec ? ` onclick="viewStoreHistoryNP('${store.code}')" style="cursor:pointer"` : "";
    return `<tr${clickAttr}>
      <td>${escapeHtml(store.name)}</td>
      <td style="color:#718096;font-size:12px">${escapeHtml(store.team||"-")}</td>
      <td>${statusBadge(status)}</td>
      <td style="font-size:13px">${escapeHtml(rec?.writerName || "-")}</td>
      <td style="text-align:center">${cnt}</td>
      <td style="color:#718096;font-size:12px">${dtStr}</td>
      <td style="color:#718096;font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(memo)}">${escapeHtml(memoShort)}</td>
    </tr>`;
  }).join("");

  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <h2>관리자 대시보드 (신제품)</h2>
      <button class="btn-home-dash" onclick="go('homeNP')" style="margin-left:auto">🏠 Home</button>
    </div>
    <div class="dash-stats">
      <div style="${cardStyle('', '#4A5568')}" onclick="setDashNpFilter('')"><div class="stat-num">${scopeStores.length}</div><div class="stat-label">대상 매장</div></div>
      <div style="${cardStyle('done', '#276749')}" onclick="setDashNpFilter('done')"><div class="stat-num" style="color:#276749">${doneCount}</div><div class="stat-label">완료</div></div>
      <div style="${cardStyle('pending', '#B7791F')}" onclick="setDashNpFilter('pending')"><div class="stat-num" style="color:#B7791F">${pendingCount}</div><div class="stat-label">승인대기</div></div>
      <div style="${cardStyle('needs', '#C53030')}" onclick="setDashNpFilter('needs')"><div class="stat-num" style="color:#C53030">${needCount}</div><div class="stat-label">재점검필요</div></div>
      <div style="${cardStyle('none', '#A0AEC0')}" onclick="setDashNpFilter('none')"><div class="stat-num" style="color:#A0AEC0">${notYetCount}</div><div class="stat-label">미점검</div></div>
    </div>
    <div style="display:flex;gap:6px;padding:10px 12px;background:#FAFAFA;border-bottom:1px solid #E2E8F0">
      <input type="text" id="dashSearchNP" value="${escapeHtml(window._dashNpKeyword||"")}" placeholder="매장명/점검자명 검색" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px" onkeydown="if(event.key==='Enter')searchDashNP()">
      <button onclick="searchDashNP()" style="flex-shrink:0;padding:8px 16px;background:var(--amber);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">검색</button>
    </div>
    <div style="padding:8px 12px;background:#FAFAFA;border-bottom:1px solid #E2E8F0;font-size:12px;color:#718096;display:flex;justify-content:space-between;align-items:center">
      <span>${_authRole==="tl" ? "담당팀" : "전체"} 매장 기준 · 매장별 최신 점검 결과${statFilter || keyword ? " · 필터 적용중" : ""}</span>
      <button class="btn-ghost" onclick="downloadExcelNP()" style="padding:6px 12px;font-size:12px;width:auto">📥 엑셀 다운로드</button>
    </div>
    <div class="dash-table-wrap">
      <div class="table-count">${rowsData.length}개 매장${(statFilter || keyword) ? ` (전체 ${scopeStores.length}개 중)` : ""}</div>
      <table class="dash-table">
        <thead><tr><th>매장명</th><th>팀</th><th>상태</th><th>점검자명</th><th>교육인원</th><th>최근점검일</th><th>메모</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#718096">해당 조건의 매장이 없습니다</td></tr>'}</tbody>
      </table>
    </div>`;
}

function setDashNpFilter(val) {
  window._dashNpStatusFilter = val;
  buildDashboardNP(document.getElementById("app"), window._dashNpRecords || [], window._dashNpScope || []);
}

function searchDashNP() {
  const input = document.getElementById("dashSearchNP");
  window._dashNpKeyword = input ? input.value : "";
  buildDashboardNP(document.getElementById("app"), window._dashNpRecords || [], window._dashNpScope || []);
}

// 매장 탭 시 그 매장의 점검 이력 전체를 최신순으로 보여줌 (Firestore 추가 조회 없이 대시보드 캐시 재사용)
function viewStoreHistoryNP(storeCode) {
  const all = window._dashNpRecords || [];
  const recs = all.filter(r => r.storeCode === storeCode)
                   .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

async function downloadExcelNP() {
  const records = window._dashNpRecords || [];
  const scopeStores = window._dashNpScope || [];
  try {
    await loadXLSX();
  } catch(e) {
    alert("엑셀 라이브러리 로드 실패: " + e.message);
    return;
  }
  const latestByStore = new Map();
  records.forEach(r => {
    const ex = latestByStore.get(r.storeCode);
    const t = r.createdAt?.seconds || 0;
    const exT = ex?.createdAt?.seconds || 0;
    if (!ex || t > exT) latestByStore.set(r.storeCode, r);
  });

  const rows = [["매장코드","매장명","팀","상태","교육인원","참석자명단","작성자","역할","점검일시","메모"]];
  const statusLabel = { done:"완료", pending:"승인대기", needs:"재점검필요", none:"미점검" };
  scopeStores.forEach(s => {
    const rec = latestByStore.get(s.code);
    const roleLabel = {sv:"AC",tl:"팀장",gl:"그룹장",admin:"관리자"};
    const dt = rec?.createdAt ? new Date(rec.createdAt.seconds*1000) : null;
    rows.push([
      s.code, s.name, s.team||"",
      statusLabel[npStatus(rec)],
      rec?.npAnswers?.attendees?.length ?? "",
      (rec?.npAnswers?.attendees||[]).join(", "),
      rec?.writerName || "",
      roleLabel[rec?.role] || rec?.role || "",
      dt ? dt.toLocaleString("ko-KR") : "",
      rec?.npAnswers?.memo || "",
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, "신제품현장점검");
  XLSX.writeFile(wb, `신제품현장점검_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function fetchRecordsNP() {
  if (!_npEnabled) return; // 비활성화 상태면 조회 자체를 막음
  const searchEl = document.getElementById("recSearchNP");
  const keyword = searchEl ? searchEl.value.trim() : "";
  const recList = document.getElementById("recListNP");
  if (!recList) return;
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    let records = cacheGet("recordsNP");
    if (!records) {
      const snap = await getDocs(query(collection(db,"surveys_np"), orderBy("createdAt","desc")));
      records = [];
      snap.forEach(d => records.push({id:d.id, ...d.data()}));
      cacheSet("recordsNP", records);
    }
    window._recordsNpAll = records; // 상세화면 재조회 없이 참조하기 위한 캐시

    // 역할별 자동 필터 (AC/TL/GL/ADMIN 별 점포 노출)
    if (_authRole === "sv" && _authName) {
      const activeStores = window._activeStores?.length ? window._activeStores : await getActiveStoreData();
      const myCodes = new Set(activeStores.filter(s => s.sv === _authName).map(s => s.code));
      records = records.filter(r => myCodes.has(r.storeCode));
    } else if (_authRole === "tl" && _authName) {
      const activeStores = window._activeStores?.length ? window._activeStores : await getActiveStoreData();
      const teamCodes = new Set(activeStores.filter(s => s.tl === _authName || s.sv === _authName).map(s => s.code));
      records = records.filter(r => teamCodes.has(r.storeCode));
    }
    // GL/admin: 전체 표시 (필터 없음)

    // 매장별 최신 건만 남김 (반려 후 재점검·승인된 경우 예전 반려 이력이 남아있지 않도록)
    const latestByStore = new Map();
    records.forEach(r => {
      const ex = latestByStore.get(r.storeCode);
      const t = r.createdAt?.seconds || 0;
      const exT = ex?.createdAt?.seconds || 0;
      if (!ex || t > exT) latestByStore.set(r.storeCode, r);
    });
    records = [...latestByStore.values()].sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

    if (keyword) records = records.filter(r => r.storeName && r.storeName.includes(keyword));

    const filter = window._recNpFilter || "";
    if (filter) records = records.filter(r => npStatus(r) === filter);

    // 필터 버튼 활성화 스타일
    const activeStyle = { all:"var(--amber)", done:"#9AE6B4", pending:"#F6D384", needs:"#FEB2B2" };
    const activeText  = { all:"white", done:"#276749", pending:"#B7791F", needs:"#C53030" };
    ["all","done","pending","needs"].forEach(k => {
      const btn = document.getElementById("rnf_"+k);
      if (!btn) return;
      const map = {all:"", done:"done", pending:"pending", needs:"needs"};
      const isActive = map[k] === filter;
      btn.style.background = isActive ? activeStyle[k] : "white";
      btn.style.color = isActive ? activeText[k] : (k==="all"?"#4A5568":activeText[k]);
      btn.style.fontWeight = isActive ? "600" : "400";
    });

    if (records.length === 0) { recList.innerHTML = `<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="store-count" style="padding:8px 2px">${records.length}건</div><div class="search-list">`;
    records.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const status = npStatus(r);
      const statusBadge = status === "done" ? `<span class="insp-badge badge-first badge-sm">완료</span>`
        : status === "pending" ? `<span class="insp-badge badge-sm" style="background:#FFFBEB;color:#B7791F;border-color:#F6D384">승인대기</span>`
        : status === "needs" ? `<span class="insp-badge badge-follow badge-sm">재점검필요</span>`
        : `<span class="insp-badge badge-sm">-</span>`;
      const cnt = r.npAnswers?.attendees?.length ?? 0;
      const roleLabel = {sv:"AC",tl:"팀장",gl:"그룹장",admin:"관리자"}[r.role] || r.role || "";
      html += `<div class="search-item" onclick="viewRecordNP('${r.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span class="si-store">${escapeHtml(r.storeName)}</span>
          ${statusBadge}
        </div>
        <div class="si-meta">${roleLabel}: ${escapeHtml(r.writerName)} · 참석 ${cnt}명 · ${dt}</div>
      </div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) {
    recList.innerHTML = `<p class="error-text">오류: ${e.message}</p>`;
  }
}

function setRecNpFilter(val) {
  window._recNpFilter = val;
  fetchRecordsNP();
}

    const listEl = document.getElementById("approvalListNP");

}

async function approveNpRecord(docId) {
  const comment = (document.getElementById("tlCommentInput")?.value || "").trim();
  if (!confirm("이 점검을 승인하시겠습니까?")) return;
  try {
    const payload = { tlApproved: true, tlApprovedBy: _authName, tlApprovedAt: new Date() };
    if (comment) payload.tlComment = comment;
    await updateDoc(doc(db, "surveys_np", docId), payload);
    cacheInvalidate("dashboardNP");
    cacheInvalidate("recordsNP");
    const r = window._recordDetailNP;
    if (r && r.id === docId) { r.tlApproved = true; if (comment) r.tlComment = comment; }
    alert("✅ 승인 처리되었습니다.");
    goBack();
  } catch(e) {
    alert("승인 처리 중 오류가 발생했습니다: " + e.message);
  }
}

async function rejectNpRecord(docId) {
  const comment = (document.getElementById("tlCommentInput")?.value || "").trim();
  if (!confirm("이 점검을 반려하시겠습니까?\n반려 시 해당 매장은 재점검필요 상태로 표시됩니다.")) return;
  try {
    const payload = { tlRejected: true, tlRejectedBy: _authName, tlRejectedAt: new Date() };
    if (comment) payload.tlComment = comment;
    await updateDoc(doc(db, "surveys_np", docId), payload);
    cacheInvalidate("dashboardNP");
    cacheInvalidate("recordsNP");
    const r = window._recordDetailNP;
    if (r && r.id === docId) { r.tlRejected = true; if (comment) r.tlComment = comment; }
    alert("🚫 반려 처리되었습니다.");
    goBack();
  } catch(e) {
    alert("반려 처리 중 오류가 발생했습니다: " + e.message);
  }
}

      <button class="btn-home-dash" onclick="go('homeSpacool')" style="margin-left:auto">🏠 Home</button>
    </div>
    <div style="padding:20px;text-align:center;color:#718096">데이터 불러오는 중...</div>`;
  try {
    let records = cacheGet("dashboardSpacool");
    if (!records) {
      const snap = await getDocs(query(collection(db,"surveys_spacool"), orderBy("createdAt","desc")));
      records = [];
      snap.forEach(d => records.push({id:d.id, ...d.data()}));
      cacheSet("dashboardSpacool", records);
    }
    const activeStores = await getActiveStoreData();

    // 열람 범위: TL은 담당팀만, GL/관리자는 전체 + 스파쿨 판매 대상 매장만
    let scopeStores = activeStores.filter(s => s.spacool);
    if (_authRole === "tl") {
      scopeStores = scopeStores.filter(s => s.tl === _authName || s.sv === _authName);
    }

    window._dashSpacoolRecords = records;
    window._dashSpacoolScope = scopeStores;
    buildDashboardSpacool(root, records, scopeStores);
  } catch(e) {
    root.innerHTML += `<p style="padding:20px;color:#E53E3E">오류: ${e.message}</p>`;
  }
}

function buildDashboardSpacool(root, records, scopeStores) {
  const latestByStore = new Map();
  records.forEach(r => {
    const ex = latestByStore.get(r.storeCode);
    const t = r.createdAt?.seconds || 0;
    const exT = ex?.createdAt?.seconds || 0;
    if (!ex || t > exT) latestByStore.set(r.storeCode, r);
  });

  const rowsDataAll = scopeStores.map(s => {
    const rec = latestByStore.get(s.code) || null;
    return { store: s, rec, status: spacoolStatus(rec) };
  });

  const doneCount    = rowsDataAll.filter(r => r.status === "done").length;
  const pendingCount = rowsDataAll.filter(r => r.status === "pending").length;
  const needCount    = rowsDataAll.filter(r => r.status === "needs").length;
  const notYetCount  = rowsDataAll.filter(r => r.status === "none").length;

  const statFilter = window._dashSpacoolStatusFilter || "";
  let rowsData = !statFilter ? rowsDataAll : rowsDataAll.filter(r => r.status === statFilter);

  const keyword = (window._dashSpacoolKeyword || "").trim().toLowerCase();
  if (keyword) rowsData = rowsData.filter(r =>
    r.store.name.toLowerCase().includes(keyword) ||
    (r.store.code||"").toLowerCase().includes(keyword) ||
    (r.rec?.writerName||"").toLowerCase().includes(keyword)
  );

  const cardStyle = (key, activeColor) => {
    const isActive = statFilter === key;
    return isActive
      ? `cursor:pointer;border-radius:10px;border:2px solid ${activeColor};box-shadow:0 0 0 3px ${activeColor}26`
      : `cursor:pointer`;
  };

  const statusBadge = (status) => ({
    done:    `<span style="color:#276749;font-weight:700">완료</span>`,
    pending: `<span style="color:#B7791F;font-weight:700">승인대기</span>`,
    needs:   `<span style="color:#C53030;font-weight:700">재점검필요</span>`,
    none:    `<span style="color:#A0AEC0">미점검</span>`,
  }[status]);

  const rows = rowsData.map(({store, rec, status}) => {
    const dt = rec?.createdAt ? new Date(rec.createdAt.seconds*1000) : null;
    const dtStr = dt ? `${dt.getMonth()+1}/${dt.getDate()}` : "-";
    const memo = rec?.spacoolAnswers?.memo || "";
    const memoShort = memo.length > 16 ? memo.slice(0,16) + "…" : (memo || "-");
    const clickAttr = rec ? ` onclick="viewStoreHistorySpacool('${store.code}')" style="cursor:pointer"` : "";
    return `<tr${clickAttr}>
      <td>${escapeHtml(store.name)}</td>
      <td style="color:#718096;font-size:12px">${escapeHtml(store.team||"-")}</td>
      <td>${statusBadge(status)}</td>
      <td style="font-size:13px">${escapeHtml(rec?.writerName || "-")}</td>
      <td style="color:#718096;font-size:12px">${dtStr}</td>
      <td style="color:#718096;font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(memo)}">${escapeHtml(memoShort)}</td>
    </tr>`;
  }).join("");

  // GL/관리자 전용: 팀별 진행률 (TL은 이미 단일 팀만 보이므로 불필요)
  let teamBreakdownHtml = "";
  if (_authRole !== "tl") {
    const teamMap = new Map();
    rowsDataAll.forEach(({store, status}) => {
      const t = store.team || "미지정";
      if (!teamMap.has(t)) teamMap.set(t, {total:0, done:0});
      const e = teamMap.get(t);
      e.total++; if (status === "done") e.done++;
    });
    const teamRows = [...teamMap.entries()].sort((a,b) => a[0].localeCompare(b[0])).map(([team, e]) => {
      const pct = e.total ? Math.round(e.done/e.total*100) : 0;
      return `<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${team}</span><span style="color:#718096">${e.done}/${e.total}</span></div>
        <div style="height:6px;background:#EDF2F7;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#3B6D11"></div></div>
      </div>`;
    }).join("");
    teamBreakdownHtml = `
    <div style="padding:12px 16px;border-bottom:1px solid #E2E8F0">
      <div style="font-size:12px;color:#718096;margin-bottom:8px">팀별 진행률</div>
      ${teamRows}
    </div>`;
  }

  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <h2>관리자 대시보드 (스파쿨)</h2>
      <button class="btn-home-dash" onclick="go('homeSpacool')" style="margin-left:auto">🏠 Home</button>
    </div>
    <div class="dash-stats">
      <div style="${cardStyle('', '#4A5568')}" onclick="setDashSpacoolFilter('')"><div class="stat-num">${scopeStores.length}</div><div class="stat-label">대상 매장</div></div>
      <div style="${cardStyle('done', '#276749')}" onclick="setDashSpacoolFilter('done')"><div class="stat-num" style="color:#276749">${doneCount}</div><div class="stat-label">완료</div></div>
      <div style="${cardStyle('pending', '#B7791F')}" onclick="setDashSpacoolFilter('pending')"><div class="stat-num" style="color:#B7791F">${pendingCount}</div><div class="stat-label">승인대기</div></div>
      <div style="${cardStyle('needs', '#C53030')}" onclick="setDashSpacoolFilter('needs')"><div class="stat-num" style="color:#C53030">${needCount}</div><div class="stat-label">재점검필요</div></div>
      <div style="${cardStyle('none', '#A0AEC0')}" onclick="setDashSpacoolFilter('none')"><div class="stat-num" style="color:#A0AEC0">${notYetCount}</div><div class="stat-label">미점검</div></div>
    </div>
    ${teamBreakdownHtml}
    <div style="display:flex;gap:6px;padding:10px 12px;background:#FAFAFA;border-bottom:1px solid #E2E8F0">
      <input type="text" id="dashSearchSpacool" value="${escapeHtml(window._dashSpacoolKeyword||"")}" placeholder="매장명/점검자명 검색" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px" onkeydown="if(event.key==='Enter')searchDashSpacool()">
      <button onclick="searchDashSpacool()" style="flex-shrink:0;padding:8px 16px;background:#3B6D11;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">검색</button>
    </div>
    <div style="padding:8px 12px;background:#FAFAFA;border-bottom:1px solid #E2E8F0;font-size:12px;color:#718096;display:flex;justify-content:space-between;align-items:center">
      <span>${_authRole==="tl" ? "담당팀" : "전체"} 매장 기준 · 매장별 최신 점검 결과${statFilter || keyword ? " · 필터 적용중" : ""}</span>
      <button class="btn-ghost" onclick="downloadExcelSpacool()" style="padding:6px 12px;font-size:12px;width:auto">📥 엑셀 다운로드</button>
    </div>
    <div class="dash-table-wrap">
      <div class="table-count">${rowsData.length}개 매장${(statFilter || keyword) ? ` (전체 ${scopeStores.length}개 중)` : ""}</div>
      <table class="dash-table">
        <thead><tr><th>매장명</th><th>팀</th><th>상태</th><th>점검자명</th><th>최근점검일</th><th>메모</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:#718096">해당 조건의 매장이 없습니다</td></tr>'}</tbody>
      </table>
    </div>`;
}

function setDashSpacoolFilter(val) {
  window._dashSpacoolStatusFilter = val;
  buildDashboardSpacool(document.getElementById("app"), window._dashSpacoolRecords || [], window._dashSpacoolScope || []);
}

function searchDashSpacool() {
  const input = document.getElementById("dashSearchSpacool");
  window._dashSpacoolKeyword = input ? input.value : "";
  buildDashboardSpacool(document.getElementById("app"), window._dashSpacoolRecords || [], window._dashSpacoolScope || []);
}

function viewStoreHistorySpacool(storeCode) {
  const all = window._dashSpacoolRecords || [];
  const recs = all.filter(r => r.storeCode === storeCode)
                   .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
  if (recs.length === 0) { alert("점검 이력이 없습니다."); return; }
  window._storeHistorySpacool = { storeCode, storeName: recs[0].storeName, records: recs };
  go("storeHistorySpacool");
}

function renderStoreHistorySpacool(root) {
  const h = window._storeHistorySpacool;
  if (!h) { go("dashboardSpacool"); return; }
  const rows = h.records.map(r => {
    const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
    const status = spacoolStatus(r);
    const statusBadge = status === "done" ? `<span class="insp-badge badge-first badge-sm">완료</span>`
      : status === "pending" ? `<span class="insp-badge badge-sm" style="background:#FFFBEB;color:#B7791F;border-color:#F6D384">승인대기</span>`
      : status === "needs" ? `<span class="insp-badge badge-follow badge-sm">재점검필요</span>`
      : `<span class="insp-badge badge-sm">-</span>`;
    const roleLabel = {sv:"AC",tl:"팀장",gl:"그룹장",admin:"관리자"}[r.role] || r.role || "";
    return `<div class="search-item" onclick="viewRecordSpacool('${r.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span class="si-store">${dt}</span>
        ${statusBadge}
      </div>
      <div class="si-meta">${roleLabel}: ${escapeHtml(r.writerName||"-")}</div>
    </div>`;
  }).join("");

  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <h2>${h.storeName} 점검 이력</h2>
    </div>
    <div class="card-section">
      <div class="store-count" style="padding:0 2px 8px">${h.records.length}건 · 최신순</div>
      <div class="search-list">${rows}</div>
    </div>`;
}

async function downloadExcelSpacool() {
  const records = window._dashSpacoolRecords || [];
  const scopeStores = window._dashSpacoolScope || [];
  try {
    await loadXLSX();
  } catch(e) {
    alert("엑셀 라이브러리 로드 실패: " + e.message);
    return;
  }
  const latestByStore = new Map();
  records.forEach(r => {
    const ex = latestByStore.get(r.storeCode);
    const t = r.createdAt?.seconds || 0;
    const exT = ex?.createdAt?.seconds || 0;
    if (!ex || t > exT) latestByStore.set(r.storeCode, r);
  });

  const rows = [["매장코드","매장명","팀","상태","Q1","Q2","작성자","역할","점검일시","메모"]];
  const statusLabel = { done:"완료", pending:"승인대기", needs:"재점검필요", none:"미점검" };
  scopeStores.forEach(s => {
    const rec = latestByStore.get(s.code);
    const roleLabel = {sv:"AC",tl:"팀장",gl:"그룹장",admin:"관리자"};
    const dt = rec?.createdAt ? new Date(rec.createdAt.seconds*1000) : null;
    rows.push([
      s.code, s.name, s.team||"",
      statusLabel[spacoolStatus(rec)],
      rec?.spacoolAnswers?.q1 || "",
      rec?.spacoolAnswers?.q2 || "",
      rec?.writerName || "",
      roleLabel[rec?.role] || rec?.role || "",
      dt ? dt.toLocaleString("ko-KR") : "",
      rec?.spacoolAnswers?.memo || "",
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, "스파쿨홍보물점검");
  XLSX.writeFile(wb, `스파쿨홍보물점검_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function fetchRecordsSpacool() {
  if (!_spacoolEnabled) return;
  const searchEl = document.getElementById("recSearchSpacool");
  const keyword = searchEl ? searchEl.value.trim() : "";
  const recList = document.getElementById("recListSpacool");
  if (!recList) return;
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    let records = cacheGet("recordsSpacool");
    if (!records) {
      const snap = await getDocs(query(collection(db,"surveys_spacool"), orderBy("createdAt","desc")));
      records = [];
      snap.forEach(d => records.push({id:d.id, ...d.data()}));
      cacheSet("recordsSpacool", records);
    }
    window._recordsSpacoolAll = records;

    // 역할별 자동 필터: SV=담당점포만, TL=담당팀 전체 (신제품 점검내역조회와 동일 스코프 규칙)
    if (_authRole === "sv" && _authName) {
      const activeStores = window._activeStores?.length ? window._activeStores : await getActiveStoreData();
      const myCodes = new Set(activeStores.filter(s => s.sv === _authName).map(s => s.code));
      records = records.filter(r => myCodes.has(r.storeCode));
    } else if (_authRole === "tl" && _authName) {
      const activeStores = window._activeStores?.length ? window._activeStores : await getActiveStoreData();
      const teamCodes = new Set(activeStores.filter(s => s.tl === _authName || s.sv === _authName).map(s => s.code));
      records = records.filter(r => teamCodes.has(r.storeCode));
    }
    // GL/admin: 전체 표시 (필터 없음)

    const latestByStore = new Map();
    records.forEach(r => {
      const ex = latestByStore.get(r.storeCode);
      const t = r.createdAt?.seconds || 0;
      const exT = ex?.createdAt?.seconds || 0;
      if (!ex || t > exT) latestByStore.set(r.storeCode, r);
    });
    records = [...latestByStore.values()].sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

    if (keyword) records = records.filter(r => r.storeName && r.storeName.includes(keyword));

    const filter = window._recSpacoolFilter || "";
    if (filter) records = records.filter(r => spacoolStatus(r) === filter);

    const activeStyle = { all:"#3B6D11", done:"#9AE6B4", pending:"#F6D384", needs:"#FEB2B2" };
    const activeText  = { all:"white", done:"#276749", pending:"#B7791F", needs:"#C53030" };
    ["all","done","pending","needs"].forEach(k => {
      const btn = document.getElementById("rsf_"+k);
      if (!btn) return;
      const map = {all:"", done:"done", pending:"pending", needs:"needs"};
      const isActive = map[k] === filter;
      btn.style.background = isActive ? activeStyle[k] : "white";
      btn.style.color = isActive ? activeText[k] : (k==="all"?"#4A5568":activeText[k]);
      btn.style.fontWeight = isActive ? "600" : "400";
    });

    if (records.length === 0) { recList.innerHTML = `<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="store-count" style="padding:8px 2px">${records.length}건</div><div class="search-list">`;
    records.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const status = spacoolStatus(r);
      const statusBadge = status === "done" ? `<span class="insp-badge badge-first badge-sm">완료</span>`
        : status === "pending" ? `<span class="insp-badge badge-sm" style="background:#FFFBEB;color:#B7791F;border-color:#F6D384">승인대기</span>`
        : status === "needs" ? `<span class="insp-badge badge-follow badge-sm">재점검필요</span>`
        : `<span class="insp-badge badge-sm">-</span>`;
      const roleLabel = {sv:"AC",tl:"팀장",gl:"그룹장",admin:"관리자"}[r.role] || r.role || "";
      html += `<div class="search-item" onclick="viewRecordSpacool('${r.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span class="si-store">${escapeHtml(r.storeName)}</span>
          ${statusBadge}
        </div>
        <div class="si-meta">${roleLabel}: ${escapeHtml(r.writerName)} · ${dt}</div>
      </div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) {
    recList.innerHTML = `<p class="error-text">오류: ${e.message}</p>`;
  }
}

function setRecSpacoolFilter(val) {

    let pending = [...latestByStore.values()].filter(r => spacoolStatus(r) === "pending");

    if (_authRole === "tl") {
      const activeStores = window._activeStores?.length ? window._activeStores : await getActiveStoreData();
      const teamCodes = new Set(activeStores.filter(s => s.tl === _authName || s.sv === _authName).map(s => s.code));
      pending = pending.filter(r => teamCodes.has(r.storeCode));
    }
    pending.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

    window._recordsSpacoolAll = records;
    const listEl = document.getElementById("approvalListSpacool");
    if (!listEl) return;
    if (pending.length === 0) { listEl.innerHTML = `<p class="error-text">승인 대기 중인 건이 없습니다.</p>`; return; }

    listEl.innerHTML = `<div class="store-count" style="padding:0 2px 8px">${pending.length}건</div><div class="search-list">` + pending.map(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const roleLabel = {sv:"AC"}[r.role] || r.role || "";
      return `<div class="search-item" onclick="viewRecordSpacool('${r.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span class="si-store">${escapeHtml(r.storeName)}</span>
          <span class="insp-badge badge-sm" style="background:#FFFBEB;color:#B7791F;border-color:#F6D384">Y 승인대기</span>
        </div>
        <div class="si-meta">${escapeHtml(r.writerName||"-")}(${roleLabel}) · ${dt}</div>
      </div>`;
    }).join("") + `</div>`;
  } catch(e) {
    const listEl = document.getElementById("approvalListSpacool");
    if (listEl) listEl.innerHTML = `<p class="error-text">오류: ${e.message}</p>`;
  }
}

async function approveSpacoolRecord(docId) {
  const comment = (document.getElementById("tlCommentInputSpacool")?.value || "").trim();
  if (!confirm("이 점검을 승인하시겠습니까?")) return;
  try {
    const payload = { tlApproved: true, tlApprovedBy: _authName, tlApprovedAt: new Date() };
    if (comment) payload.tlComment = comment;
    await updateDoc(doc(db, "surveys_spacool", docId), payload);
    cacheInvalidate("dashboardSpacool");
    cacheInvalidate("recordsSpacool");
    const r = window._recordDetailSpacool;
    if (r && r.id === docId) { r.tlApproved = true; if (comment) r.tlComment = comment; }
    alert("✅ 승인 처리되었습니다.");
    goBack();
  } catch(e) {
    alert("승인 처리 중 오류가 발생했습니다: " + e.message);
  }
}

async function rejectSpacoolRecord(docId) {
  const comment = (document.getElementById("tlCommentInputSpacool")?.value || "").trim();
  if (!confirm("이 점검을 반려하시겠습니까?\n반려 시 해당 매장은 재점검필요 상태로 표시됩니다.")) return;
  try {
    const payload = { tlRejected: true, tlRejectedBy: _authName, tlRejectedAt: new Date() };
    if (comment) payload.tlComment = comment;
    await updateDoc(doc(db, "surveys_spacool", docId), payload);
    cacheInvalidate("dashboardSpacool");
    cacheInvalidate("recordsSpacool");
    const r = window._recordDetailSpacool;
    if (r && r.id === docId) { r.tlRejected = true; if (comment) r.tlComment = comment; }
    alert("🚫 반려 처리되었습니다.");
    goBack();
  } catch(e) {
    alert("반려 처리 중 오류가 발생했습니다: " + e.message);
  }
}

async function viewRecordDash(docId) {
  const records = window._dashRecords||[];
  const found = records.find(r=>r.id===docId);
  if (!found) return;
  S.loadedDocId = docId;
  // 매장 객체 설정 (배지 표시용) - beef 필드 있는 문서 우선
  const activeStores = window._activeStores || await getActiveStoreData();
  S.storeObj = activeStores.find(s => s.code === found.storeCode) || null;

  // GL glRejected 건: compare 화면으로 이동 (그룹장 최초점검 결과 + 보완점검 시작 버튼)
  if (found.role === "gl" && found.glRejected && !found.finalConfirmed && !found.tlConfirmed) {
    // GL 반려건: loadGLCompareAndShow로 이미지 포함 전체 로드
    loadGLCompareAndShow(docId);
    return;
  }

  // SV/TL건 N항목 보완 대상 (GL은 직접 보완점검 수행 안 함): "점검 시작하기"와 동일 경로 재사용
  const nItems = Object.values(found.answers||{}).filter(a=>a.value==="N").length;
  const hasFollowup = !!(found.followupSvAnswers || found.followupTlAnswers);
  const isClosedStoreD = !!(window._closedMap||new Map()).get(found.storeCode);
  const needFollowup = found.role !== "gl" && nItems > 0 && !found.finalConfirmed && !hasFollowup && !isClosedStoreD;
  if (isClosedStoreD && nItems > 0 && !found.finalConfirmed && !hasFollowup && found.role !== "gl") {
    alert("🚫 폐점된 매장입니다. 보완점검을 진행할 수 없습니다.");
  }
  if (needFollowup && ["sv","tl"].includes(_authRole)) {
    S.role = _authRole;
    S.writerName = _authName || "";
    S.storeCode = found.storeCode;
    S.storeName = found.storeName;
    S.storeTeam = found.storeTeam;
    S.inspType = "보완";
    S.answers = {};
    await loadPrevNItems(found.storeCode);
    return;
  }

  // 이미지 포함 전체 문서 로드 (stripImages된 캐시 대신 getDoc 재조회)
  await loadCompareData(docId);
  go("compare");
}

    !r.finalConfirmed &&
