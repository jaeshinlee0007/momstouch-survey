// 활성 매장 데이터 (Firebase 우선, 없으면 내장 데이터)
async function getActiveStoreData() {
  try {
    const snap = await getDocs(collection(db, "store_master"));
    if (!snap.empty) {
      const stores = [];
      snap.forEach(d => stores.push(d.data()));
      if (stores.length > 0) {
        console.log(`Firebase 매장 데이터 로드: ${stores.length}개`);
        return stores;
      }
    }
  } catch(e) {
    console.warn("Firebase 매장 데이터 로드 실패, 내장 데이터 사용:", e.message);
  }
  return STORE_DATA;
}

// 매장 데이터 Excel 업로드
async function uploadStoreData(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

        // 헤더 제외, 빈 행 제거
        const stores = rows.slice(1)
          .filter(r => r[0] && r[1])
          .map(r => ({
            code: String(r[0]||"").trim(),
            name: String(r[1]||"").trim(),
            team: String(r[2]||"").trim(),
            sv:   String(r[3]||"").trim(),
            tl:   String(r[4]||"").trim(),
          }));

        if (stores.length === 0) {
          reject("유효한 매장 데이터가 없습니다."); return;
        }

        // Firebase store_master 컬렉션에 저장
        // 기존 데이터 전체 삭제 후 재업로드
        const existingSnap = await getDocs(collection(db, "store_master"));
        const deletePromises = [];
        existingSnap.forEach(d => deletePromises.push(updateDoc(doc(db,"store_master",d.id), {_deleted:true})));

        // 새 데이터 일괄 저장 (50개씩 배치)
        const batchSize = 50;
        for (let i = 0; i < stores.length; i += batchSize) {
          const batch = stores.slice(i, i + batchSize);
          await Promise.all(batch.map(s => addDoc(collection(db,"store_master"), s)));
        }

        // _deleted 항목 정리
        existingSnap.forEach(d => {
          // 이미 덮어씌워졌으므로 무시
        });

        resolve(stores.length);
      } catch(err) {
        reject(err.message || "파일 처리 오류");
      }
    };
    reader.onerror = () => reject("파일 읽기 실패");
    reader.readAsBinaryString(file);
  });
}

function render() {
  const root = document.getElementById("app");
  root.innerHTML = ""; window.scrollTo(0,0);
  const scr = S.screen;
  if      (scr==="home")       renderHome(root);
  else if (scr==="inspType")   renderInspType(root);
  else if (scr==="role")       renderRole(root);
  else if (scr==="storeSel")   renderStoreSel(root);
  else if (scr==="info")       renderInfo(root);
  else if (scr==="form")       renderForm(root);
  else if (scr==="compare")    renderCompare(root);
  else if (scr==="records")    renderRecords(root);
  else if (scr==="adminLogin") renderAdminLogin(root);

async function searchStores() {
  const name = document.getElementById("writerInput").value.trim();
  if (!name) { alert("이름을 입력해주세요."); return; }
  S.writerName = name;
  S.storeSearch = "";

  document.getElementById("storeResult").innerHTML = `<p class="loading-text">매장 목록 불러오는 중...</p>`;
  const activeStores = await getActiveStoreData();

  let matched = [];
  if (S.role === "sv") {
    matched = activeStores.filter(s => s.sv === name);
  } else if (S.role === "tl") {
    matched = activeStores.filter(s => s.tl === name);
  } else {
    matched = activeStores.slice();
  }

  if (matched.length === 0) {
    document.getElementById("storeResult").innerHTML =
      `<p class="error-text">담당 매장이 없습니다. 이름을 확인해주세요.</p>`;
    return;
  }

  // 보완점검: Firebase에서 최초점검 N항목 있는 매장 조회 후 상단 정렬
  if (S.inspType === "보완") {
    document.getElementById("storeResult").innerHTML = `<p class="loading-text">보완필요 매장 확인 중...</p>`;
    try {
      const q = query(collection(db,"surveys"), where("role","==","sv"), where("inspType","==","최초"));
      const snap = await getDocs(q);
      const needsFollowup = new Set();
      const alreadyDone = new Set();
      snap.forEach(d => {
        const data = d.data();
        const nCount = Object.values(data.answers||{}).filter(a=>a.value==="N").length;
        if (nCount > 0) needsFollowup.add(data.storeCode);
        if (data.followupSvAnswers) alreadyDone.add(data.storeCode);
      });
      window._needsFollowup = needsFollowup;
      window._alreadyDone = alreadyDone;
      // 보완필요(미완료) 상단, 보완완료 중간, 나머지 하단
      matched.sort((a,b) => {
        const aNeed = needsFollowup.has(a.code) && !alreadyDone.has(a.code) ? 0 : needsFollowup.has(a.code) ? 1 : 2;
        const bNeed = needsFollowup.has(b.code) && !alreadyDone.has(b.code) ? 0 : needsFollowup.has(b.code) ? 1 : 2;
        return aNeed - bNeed;
      });
    } catch(e) {
      console.warn("보완필요 조회 실패:", e.message);
    }
  }
  renderStoreList(matched);
}

function renderStoreList(list, keyword="") {
  const filtered = keyword
    ? list.filter(s => s.name.includes(keyword) || s.code.includes(keyword))
    : list;
  const showSearch = list.length > 10;
  const needsFollowup = window._needsFollowup || new Set();
  const alreadyDone = window._alreadyDone || new Set();
  let html = `<div class="store-list-wrap">`;
  if (showSearch) {
    html += `<div class="store-search-wrap">
      <input id="storeKeyword" class="input-field" type="text" placeholder="매장명 검색" value="${keyword}"
        oninput="filterStoreList(this.value)" />
    </div>`;
  }
  html += `<div class="store-count">${filtered.length}개 매장</div><div class="search-list">`;
  if (filtered.length === 0) {
    html += `<p class="error-text" style="padding:12px">검색 결과가 없습니다.</p>`;
  }
  filtered.forEach(s => {
    let badge = "";
    if (S.inspType === "보완") {
      if (needsFollowup.has(s.code) && !alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-need">⚠️ 보완필요</span>`;
      } else if (alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-done">✅ 보완완료</span>`;
      }
    }
    html += `<div class="search-item" onclick="selectStore('${s.code}','${s.name}','${s.team}')">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="si-store">${s.name}</span>${badge}
      </div>
      <div class="si-meta">${s.code} · ${s.team} · SV: ${s.sv}</div>
      <div class="si-arrow">→</div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById("storeResult").innerHTML = html;
  window._currentStoreList = list;
}

async function loadPrevNItems(storeCode) {
  try {
    const q = query(collection(db, "surveys"),
      where("storeCode","==",storeCode),
      where("inspType","==","최초"),
      orderBy("createdAt","desc"));
    const snap = await getDocs(q);
    if (!snap.empty) {
      const latest = snap.docs[0].data();
      const svAnswers = latest.answers || {};
      S.prevNItems = Object.entries(svAnswers)
        .filter(([,v]) => v.value === "N")
        .map(([k]) => Number(k));
      // N항목 없어도 반드시 loadedDocId 설정 (보완점검 연결 필수)
      S.loadedDocId = snap.docs[0].id;
    } else {
      S.prevNItems = [];
      S.loadedDocId = null;
    }
  } catch(e) {
    S.prevNItems = [];
    S.loadedDocId = null;
  }
  go("info");
}

function setAnswer(qId, value) {
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};
  S.answers[qId].value = value;
  ["Y","N","미취급"].forEach(v => {
    const b = document.getElementById(`ans-${qId}-${v}`); if(b) b.classList.remove("selected");
  });
  const sel = document.getElementById(`ans-${qId}-${value}`); if(sel) sel.classList.add("selected");
  const imgSec = document.getElementById(`img-sec-${qId}`);
  if (imgSec) imgSec.style.display = value==="미취급" ? "none" : "block";
  const card = document.getElementById(`qcard-${qId}`); if(card) card.classList.add("answered");
  updateProgress();
}

async function handleImage(qId, input) {
  const file = input.files[0]; if(!file) return;
  const compressed = await compressImage(file, 800, 0.7);
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};
  S.answers[qId].image = compressed;
  const preview = document.getElementById(`img-preview-${qId}`);
  if (preview) preview.innerHTML = `
    <div class="preview-container">
      <img src="${compressed}" class="preview-img" onclick="openImageModal('${compressed}')">
      <button class="remove-img" onclick="removeImage(${qId})">✕</button>
    </div>`;
}

function removeImage(qId) {
  if (S.answers[qId]) S.answers[qId].image = null;
  const p = document.getElementById(`img-preview-${qId}`); if(p) p.innerHTML = "";
  const i = document.getElementById(`img-${qId}`); if(i) i.value = "";
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h*maxWidth/w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function updateProgress() {
  const questions = S.role==="gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const answered = questions.filter(q => S.answers[q.id]?.value).length;
  const pct = Math.round(answered/questions.length*100);
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressText");
  if(fill) fill.style.width = pct+"%";
  if(text) text.textContent = `${answered} / ${questions.length}`;
}

// ── SUBMIT ─────────────────────────────────────────
async function submitForm() {
  const questions = S.role==="gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const unanswered = questions.filter(q => !S.answers[q.id]?.value);
  if (unanswered.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent="⚠️ 아직 답변하지 않은 항목이 있습니다."; }
    document.getElementById(`qcard-${unanswered[0].id}`)?.scrollIntoView({behavior:"smooth"});
    return;
  }
  // Y 또는 N 선택 시 이미지 필수
  const noImage = questions.filter(q => {
    const a = S.answers[q.id];
    return (a?.value === "Y" || a?.value === "N") && !a?.image;
  });
  if (noImage.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent=`📷 사진 첨부가 필요한 항목이 ${noImage.length}건 있습니다. (Y/N 선택 항목은 사진 필수)`; }
    document.getElementById(`qcard-${noImage[0].id}`)?.scrollIntoView({behavior:"smooth"});
    // 사진 없는 항목 카드 강조
    noImage.forEach(q => {
      const card = document.getElementById(`qcard-${q.id}`);
      if(card) card.style.borderColor = "#FC8181";
    });
    return;
  }
  const btn = document.querySelector(".btn-submit");
  if(btn) { btn.disabled=true; btn.textContent="저장 중..."; }
  try {
    const roleField = {sv:"sv",tl:"tl",gl:"gl"}[S.role];
    const payload = {
      storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
      writerName: S.writerName, visitDate: S.visitDate,
      role: S.role, inspType: S.inspType,
      answers: S.answers, createdAt: new Date(),
    };

    // SV 최초점검 → 새 문서
    if (S.role==="sv" && S.inspType==="최초") {
      const ref = await addDoc(collection(db,"surveys"), payload);
      S.loadedDocId = ref.id;
    }
    // SV 보완점검 → 최초점검 문서에 followup 저장 (또는 새 문서)
    else if (S.role==="sv" && S.inspType==="보완") {
      if (S.loadedDocId) {
        await updateDoc(doc(db,"surveys",S.loadedDocId), {
          followupSvAnswers: S.answers,
          followupSvWriterName: S.writerName,
          followupSvVisitDate: S.visitDate,
          followupSvUpdatedAt: new Date(),
        });
      } else {
        const ref = await addDoc(collection(db,"surveys"), payload);
        S.loadedDocId = ref.id;
      }
    }
    // 팀장 → 최초/보완에 tl 필드 업데이트
    else if (S.role==="tl") {
      const prefix = S.inspType==="최초" ? "tl" : "followupTl";
      if (S.loadedDocId) {
        await updateDoc(doc(db,"surveys",S.loadedDocId), {
          [`${prefix}WriterName`]: S.writerName,
          [`${prefix}VisitDate`]: S.visitDate,
          [`${prefix}Answers`]: S.answers,
          [`${prefix}UpdatedAt`]: new Date(),
        });
      }
    }
    // 그룹장 → gl 필드 업데이트
    else if (S.role==="gl") {
      const prefix = S.inspType==="최초" ? "gl" : "followupGl";
      if (S.loadedDocId) {
        await updateDoc(doc(db,"surveys",S.loadedDocId), {
          [`${prefix}WriterName`]: S.writerName,
          [`${prefix}VisitDate`]: S.visitDate,
          [`${prefix}Answers`]: S.answers,
          [`${prefix}UpdatedAt`]: new Date(),
        });
      }
    }

    await loadCompareData(S.loadedDocId);
    go("compare");
  } catch(e) {
    alert("저장 오류: "+e.message);
    if(btn) { btn.disabled=false; btn.textContent="점검 제출하기"; }
  }
}

async function loadCompareData(docId) {
  const snap = await getDocs(collection(db,"surveys"));
  snap.forEach(d => { if(d.id===docId) S.compareData={id:d.id,...d.data()}; });
}

function renderCompare(root) {
  const d = S.compareData;
  if (!d) { root.innerHTML=`<p style="padding:20px">비교 데이터 없음</p>`; return; }

  const sections = [
    { label:"최초점검", svA:d.answers||{}, tlA:d.tlAnswers||{}, glA:d.glAnswers||{},
      svName:d.writerName, svDate:d.visitDate,
      tlName:d.tlWriterName, tlDate:d.tlVisitDate,
      glName:d.glWriterName, glDate:d.glVisitDate },
    { label:"보완점검", svA:d.followupSvAnswers||{}, tlA:d.followupTlAnswers||{}, glA:d.followupGlAnswers||{},
      svName:d.followupSvWriterName, svDate:d.followupSvVisitDate,
      tlName:d.followupTlWriterName, tlDate:d.followupTlVisitDate,
      glName:d.followupGlWriterName, glDate:d.followupGlVisitDate },
  ];

  let html = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">🏠</button>
      <h2>점검 결과</h2>
    </div>
    <div class="compare-meta">
      <div class="meta-store">${d.storeName}</div>
      <div class="meta-sub">${d.storeCode} · ${d.storeTeam}</div>
    </div>`;

  sections.forEach(sec => {
    const hasSV = Object.keys(sec.svA).length > 0;
    const hasTL = Object.keys(sec.tlA).length > 0;
    const hasGL = Object.keys(sec.glA).length > 0;
    if (!hasSV && !hasTL && !hasGL) return;

    html += `<div class="section-divider ${sec.label==='최초점검'?'divider-first':'divider-follow'}">${sec.label}</div>`;
    if (hasSV) html += `<div class="meta-row"><span>SV: ${sec.svName||""}</span><span>${fmtDate(sec.svDate)}</span></div>`;
    if (hasTL) html += `<div class="meta-row"><span>팀장: ${sec.tlName||""}</span><span>${fmtDate(sec.tlDate)}</span></div>`;
    if (hasGL) html += `<div class="meta-row"><span>그룹장: ${sec.glName||""}</span><span>${fmtDate(sec.glDate)}</span></div>`;

    let catCurrent = "";
    SV_QUESTIONS.forEach(q => {
      const color = CAT_COLORS[q.category]||"#718096";
      if (q.category !== catCurrent) {
        catCurrent = q.category;
        html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
      }
      const sv=sec.svA[q.id], tl=sec.tlA[q.id], gl=sec.glA[q.id];
      const svV=sv?.value||"-", tlV=tl?.value||(hasTL?"-":""), glV=gl?.value||(hasGL?"-":"");
      const changed = hasTL && sv?.value && tl?.value && sv.value!==tl.value;
      html += `
        <div class="compare-card ${changed?"changed":""}">
          <div class="cc-title">Q${q.id} ${q.title} ${changed?'<span class="change-badge">변경</span>':""}</div>
          <div class="cc-row">
            <div class="cc-cell">
              <div class="cc-role">SV</div>
              <div class="cc-val ${valClass(svV)}">${svV}</div>
              ${sv?.image?`<img src="${sv.image}" class="cc-img" onclick="openImageModal('${sv.image}')">` : ""}
            </div>
            ${hasTL?`<div class="cc-cell"><div class="cc-role">팀장</div><div class="cc-val ${valClass(tlV)}">${tlV}</div>${tl?.image?`<img src="${tl.image}" class="cc-img" onclick="openImageModal('${tl.image}')">`:""}</div>`:""}
            ${hasGL&&q.id<=10?`<div class="cc-cell"><div class="cc-role">그룹장</div><div class="cc-val ${valClass(glV)}">${glV}</div>${gl?.image?`<img src="${gl.image}" class="cc-img" onclick="openImageModal('${gl.image}')">`:""}</div>`:""}
          </div>
        </div>`;
    });
  });

  // 그룹장확인 버튼 (보완완료 && 미최종확인 시)
  const d2 = S.compareData;
  if (d2 && d2.followupSvAnswers && !d2.finalConfirmed) {
    html += `
      <div class="card-section">
        <button class="btn-gl-confirm" onclick="confirmGL()">✅ 그룹장 확인 완료</button>
        <button class="btn-primary" onclick="go('home')">홈으로</button>
      </div>`;
  } else if (d2 && d2.finalConfirmed) {
    html += `
      <div class="card-section">
        <div class="final-confirmed-box">🏆 최종확인 완료<br><span style="font-size:12px;color:#718096">${fmtDate(d2.finalConfirmedAt)}</span></div>
        <button class="btn-primary" onclick="go('home')">홈으로</button>
      </div>`;
  } else {
    html += `<div class="card-section"><button class="btn-primary" onclick="go('home')">홈으로</button></div>`;
  }
  root.innerHTML = html;
}

async function confirmGL() {
  if (!confirm("그룹장 확인 완료 처리하시겠습니까?\n최종확인 탭으로 이동됩니다.")) return;
  const btn = document.querySelector(".btn-gl-confirm");
  if (btn) { btn.disabled=true; btn.textContent="처리 중..."; }
  try {
    await updateDoc(doc(db,"surveys",S.loadedDocId), {
      finalConfirmed: true,
      finalConfirmedAt: new Date().toISOString(),
    });
    S.compareData.finalConfirmed = true;
    S.compareData.finalConfirmedAt = new Date().toISOString();
    alert("✅ 최종확인 완료 처리되었습니다.");
    // 대시보드로 돌아가며 최종확인 탭 표시
    window._dashTab = "최종확인";
    window._dashFilter = null;
    go("dashboard");
  } catch(e) {
    alert("오류: " + e.message);
    if (btn) { btn.disabled=false; btn.textContent="✅ 그룹장 확인 완료"; }
  }
}

function valClass(v) { return v==="Y"?"val-y":v==="N"?"val-n":v==="미취급"?"val-na":""; }

async function renderRecords(root) {
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">←</button>
      <h2>점검 내역 조회</h2>
    </div>
    <div class="card-section">
      <div class="search-type-row">
        <button class="search-type-btn active" id="stype-store" onclick="setSearchType('store')">매장명</button>
        <button class="search-type-btn" id="stype-writer" onclick="setSearchType('writer')">점검자명</button>
      </div>
      <input id="recSearch" class="input-field" type="text" placeholder="매장명으로 검색 (비우면 전체)" />
      <button class="btn-primary" onclick="fetchRecords()">검색</button>
      <div id="recList"></div>
    </div>`;
  window._searchType = 'store';
}

function setSearchType(type) {
  window._searchType = type;
  const input = document.getElementById("recSearch");
  const btnStore  = document.getElementById("stype-store");
  const btnWriter = document.getElementById("stype-writer");
  if (type === 'store') {
    input.placeholder = "매장명으로 검색 (비우면 전체)";
    btnStore.classList.add("active");
    btnWriter.classList.remove("active");
  } else {
    input.placeholder = "점검자 이름으로 검색";
    btnStore.classList.remove("active");
    btnWriter.classList.add("active");
  }
  input.value = "";
  document.getElementById("recList").innerHTML = "";
}

async function fetchRecords() {
  const keyword = document.getElementById("recSearch").value.trim();
  const recList = document.getElementById("recList");
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    // 전체 로드 후 부분 검색 적용
    const q = query(collection(db,"surveys"), where("role","==","sv"), orderBy("createdAt","desc"));
    const snap = await getDocs(q);
    let records = [];
    snap.forEach(d => records.push({id:d.id,...d.data()}));
    // 검색 유형에 따라 필터링
    const searchType = window._searchType || 'store';
    if (keyword) {
      if (searchType === 'store') {
        records = records.filter(r => r.storeName && r.storeName.includes(keyword));
      } else {
        // 점검자명: SV + 팀장 + 그룹장 이름 모두 검색
        records = records.filter(r =>
          (r.writerName && r.writerName.includes(keyword)) ||
          (r.tlWriterName && r.tlWriterName.includes(keyword)) ||
          (r.glWriterName && r.glWriterName.includes(keyword)) ||
          (r.followupSvWriterName && r.followupSvWriterName.includes(keyword)) ||
          (r.followupTlWriterName && r.followupTlWriterName.includes(keyword)) ||
          (r.followupGlWriterName && r.followupGlWriterName.includes(keyword))
        );
      }
    }
    if (records.length===0) { recList.innerHTML=`<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="store-count" style="padding:8px 2px">${records.length}건</div><div class="search-list">`;
    records.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const typeBadge = `<span class="insp-badge ${r.inspType==='최초'?'badge-first':'badge-follow'} badge-sm">${r.inspType||"최초"}점검</span>`;
      const hasFollow = r.followupSvAnswers ? "✅ 보완완료" : "⏳ 보완없음";
      const nCount = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
      const nBadge = nCount>0 ? `<span class="tag-sm" style="color:#C53030">N ${nCount}건</span>` : "";
      html += `<div class="search-item" onclick="viewRecord('${r.id}')">
        <div style="display:flex;align-items:center;gap:8px">${typeBadge}<span class="si-store">${r.storeName}</span></div>
        <div class="si-meta">SV: ${r.writerName} · ${dt}</div>
        <div class="si-tags"><span class="tag-sm">${hasFollow}</span>${nBadge}</div>
        <div class="si-arrow">→</div>
      </div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) { recList.innerHTML=`<p class="error-text">오류: ${e.message}</p>`; }
}

async function viewRecord(docId) {
  await loadCompareData(docId);
  S.loadedDocId = docId; go("compare");
}

// ── DASHBOARD ──────────────────────────────────────
async function renderDashboard(root) {
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">←</button>
      <h2>관리자 대시보드</h2>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn-excel" onclick="downloadExcel()">⬇️ Excel</button>
        <button class="btn-pdf" onclick="downloadPDF()">⬇️ PDF</button>
      </div>
    </div>
    <div style="padding:20px;text-align:center;color:#718096">데이터 불러오는 중...</div>`;
  try {
    const q = query(collection(db,"surveys"), where("role","==","sv"), orderBy("createdAt","desc"));
    const snap = await getDocs(q);
    const records = [];
    snap.forEach(d => records.push({id:d.id,...d.data()}));
    window._dashRecords = records;
    window._dashTab = window._dashTab || "전체";
    window._dashFilter = window._dashFilter || null;

    buildDashboard(root, records);
    updateStoreDataStatus();
  } catch(e) {
    root.innerHTML += `<p style="padding:20px;color:#E53E3E">오류: ${e.message}</p>`;
  }
}

function buildDashboard(root, records) {
  const total    = records.length;
  const hasFirst = records.filter(r => r.inspType==="최초"||!r.inspType).length;
  const hasFollowup = records.filter(r => r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0).length;
  const nCount   = records.filter(r => Object.values(r.answers||{}).some(a=>a.value==="N")).length;
  const pending  = Math.max(0, nCount - hasFollowup);
  const glConfirmed = records.filter(r => r.glConfirmed).length;
  const finalConfirmed = records.filter(r => r.finalConfirmed).length;

  // 현재 탭/필터에 따라 테이블 데이터 결정
  const tab = window._dashTab || "전체";
  const filter = window._dashFilter;

  let tableRecords = records;
  if (tab === "전체" && filter) {
    if (filter === "전체점검") tableRecords = records;
    else if (filter === "최초점검") tableRecords = records.filter(r => r.inspType==="최초"||!r.inspType);
    else if (filter === "N항목있음") tableRecords = records.filter(r => Object.values(r.answers||{}).some(a=>a.value==="N"));
    else if (filter === "보완완료") tableRecords = records.filter(r => r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0);
    else if (filter === "보완미실시") tableRecords = records.filter(r => Object.values(r.answers||{}).some(a=>a.value==="N") && !r.followupSvAnswers);
  } else if (tab === "그룹장확인") {
    tableRecords = records.filter(r => r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0 && !r.finalConfirmed);
  } else if (tab === "최종확인") {
    tableRecords = records.filter(r => r.finalConfirmed);
  }

  const rows = tableRecords.map(r => {
    const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString("ko-KR") : "-";
    const typeBadge = `<span class="insp-badge ${r.inspType==='최초'||!r.inspType?'badge-first':'badge-follow'} badge-sm">${r.inspType||'최초'}점검</span>`;
    const nItems = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const nBadge = nItems>0 ? `<span class="badge-n">N ${nItems}건</span>` : `<span class="badge-ok">이상없음</span>`;
    let statusBadge = "";
    const hasFollowupDone = !!r.followupSvAnswers;
    const followupNItems = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;
    if (r.finalConfirmed) statusBadge = `<span class="badge-final">✅ 최종확인</span>`;
    else if (hasFollowupDone && followupNItems===0) statusBadge = `<span class="badge-ok">✅ 보완완료</span>`;
    else if (hasFollowupDone && followupNItems>0) statusBadge = `<span class="badge-n">보완중 N ${followupNItems}건</span>`;
    else if (nItems>0) statusBadge = `<span class="badge-pend">⏳ 보완필요</span>`;
    else statusBadge = `<span class="badge-ok">이상없음</span>`;

    return `<tr onclick="viewRecordDash('${r.id}')" style="cursor:pointer">
      <td>${typeBadge} ${r.storeName||""}</td>
      <td>${r.writerName||""}<br><span style="font-size:11px;color:#718096">${dt}</span></td>
      <td>${nBadge}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join("");

  const tabActive = t => tab===t ? "dash-tab active" : "dash-tab";
  const statActive = f => filter===f && tab==="전체" ? "stat-card active-stat" : "stat-card";

  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">←</button>
      <h2>관리자 대시보드</h2>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn-excel" onclick="downloadExcel()">⬇️ Excel</button>
        <button class="btn-pdf" onclick="downloadPDF()">⬇️ PDF</button>
      </div>
    </div>

    <div class="dash-stats">
      <div class="${statActive('전체점검')}" onclick="setDashFilter('전체점검')">
        <div class="stat-num">${total}</div><div class="stat-label">전체점검</div>
      </div>
      <div class="${statActive('최초점검')}" onclick="setDashFilter('최초점검')">
        <div class="stat-num" style="color:#3182CE">${hasFirst}</div><div class="stat-label">최초점검</div>
      </div>
      <div class="${statActive('N항목있음')}" onclick="setDashFilter('N항목있음')">
        <div class="stat-num" style="color:#E53E3E">${nCount}</div><div class="stat-label">N항목있음</div>
      </div>
      <div class="${statActive('보완완료')}" onclick="setDashFilter('보완완료')">
        <div class="stat-num" style="color:#38A169">${hasFollowup}</div><div class="stat-label">보완완료</div>
      </div>
      <div class="${statActive('보완미실시')}" onclick="setDashFilter('보완미실시')">
        <div class="stat-num" style="color:#D69E2E">${pending}</div><div class="stat-label">보완미실시</div>
      </div>
    </div>

    <div class="store-upload-section">
      <div class="store-upload-header">
        <div>
          <div class="store-upload-title">📋 매장 데이터 관리</div>
          <div id="storeDataStatus" class="store-upload-sub">불러오는 중...</div>
        </div>
        <label class="btn-upload" for="storeFileInput">
          📤 Excel 업로드
          <input type="file" id="storeFileInput" accept=".xlsx,.xls" style="display:none"
            onchange="handleStoreUpload(this)">
        </label>
      </div>
      <div id="uploadProgress" style="display:none" class="upload-progress">
        <div class="upload-progress-bar"><div id="uploadProgressFill" class="upload-progress-fill"></div></div>
        <span id="uploadProgressText">업로드 중...</span>
      </div>
    </div>

    <div class="dash-tabs">
      <button class="${tabActive('전체')}"    onclick="setDashTab('전체')">전체 <span class="tab-cnt">${total}</span></button>
      <button class="${tabActive('그룹장확인')}" onclick="setDashTab('그룹장확인')">그룹장확인 <span class="tab-cnt">${records.filter(r=>r.followupSvAnswers&&!r.finalConfirmed).length}</span></button>
      <button class="${tabActive('최종확인')}"  onclick="setDashTab('최종확인')">최종확인 <span class="tab-cnt">${finalConfirmed}</span></button>
    </div>

    ${filter && tab==="전체" ? `<div class="filter-bar">필터: <b>${filter}</b> <button class="filter-clear" onclick="clearDashFilter()">✕ 초기화</button></div>` : ""}

    <div class="dash-table-wrap">
      <div class="table-count">${tableRecords.length}건</div>
      <table class="dash-table">
        <thead><tr><th>매장명</th><th>SV</th><th>최초결과</th><th>상태</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:#718096">데이터 없음</td></tr>'}</tbody>
      </table>
    </div>`;

  updateStoreDataStatus();
}

function setDashFilter(filter) {
  window._dashTab = "전체";
  window._dashFilter = window._dashFilter === filter ? null : filter;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function clearDashFilter() {
  window._dashFilter = null;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function setDashTab(tab) {
  window._dashTab = tab;
  window._dashFilter = null;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

async function updateStoreDataStatus() {
  const statusEl = document.getElementById("storeDataStatus");
  if (!statusEl) return;
  try {
    const snap = await getDocs(collection(db, "store_master"));
    if (!snap.empty) {
      statusEl.textContent = `Firebase 매장 데이터 ${snap.size}개 적용 중`;
      statusEl.style.color = "#38A169";
    } else {
      statusEl.textContent = `내장 데이터 ${STORE_DATA.length}개 사용 중 (Excel 업로드 시 자동 교체)`;
      statusEl.style.color = "#D69E2E";
    }
  } catch(e) {
    statusEl.textContent = "매장 데이터 상태 확인 실패";
    statusEl.style.color = "#E53E3E";
  }
}

async function handleStoreUpload(input) {
  const file = input.files[0];
  if (!file) return;

  // 확인 팝업
  const confirmed = confirm(
    `매장 데이터를 업로드하면 기존 Firebase 매장 데이터가 교체됩니다.
파일: ${file.name}

계속하시겠습니까?`
  );
  if (!confirmed) { input.value = ""; return; }

  const progress = document.getElementById("uploadProgress");
  const fill = document.getElementById("uploadProgressFill");
  const text = document.getElementById("uploadProgressText");
  if (progress) progress.style.display = "block";
  if (fill) fill.style.width = "30%";
  if (text) text.textContent = "파일 분석 중...";

  try {
    if (fill) fill.style.width = "60%";
    if (text) text.textContent = "Firebase 업로드 중...";

    const count = await uploadStoreData(file);

    if (fill) fill.style.width = "100%";
    if (text) text.textContent = `완료! ${count}개 매장 업로드됨`;

    setTimeout(() => {
      if (progress) progress.style.display = "none";
      updateStoreDataStatus();
    }, 2000);

    alert(`✅ 매장 데이터 업로드 완료!
${count}개 매장이 등록되었습니다.`);
  } catch(e) {
    if (text) text.textContent = `오류: ${e}`;
    if (fill) fill.style.width = "0%";
    alert(`업로드 실패: ${e}`);
  }
  input.value = "";
}

async function viewRecordDash(docId) {

  if(found) { S.compareData=found; S.loadedDocId=docId; go("compare"); }
}

// ── EXCEL ──────────────────────────────────────────
async function downloadPDF() {
  const records = window._dashRecords;
  if (!records || records.length === 0) { alert("다운로드할 데이터가 없습니다."); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

  const today = new Date().toLocaleDateString("ko-KR");
  const total      = records.length;
  const hasFirst   = records.filter(r => r.inspType==="최초"||!r.inspType).length;
  const nCount     = records.filter(r => Object.values(r.answers||{}).some(a=>a.value==="N")).length;
  const hasFollowup = records.filter(r => r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0).length;
  const pending    = Math.max(0, nCount - hasFollowup);

  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;

  // ── 헤더 배너 ──
  doc.setFillColor(229, 62, 62);
  doc.rect(0, 0, pageW, 24, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.setFont("helvetica", "bold");
  doc.text("New Platform Field Inspection Report", margin, 10);
  doc.setFontSize(9);
  doc.setFont("helvetica", "normal");
  doc.text("Beef  /  Pizza  /  Spacool", margin, 16);
  doc.text(`Generated: ${today}`, pageW - margin, 16, { align: "right" });

  // ── 요약 통계 박스 ──
  const stats = [
    { label: "Total", value: total,       color: [26,32,44] },
    { label: "First",  value: hasFirst,   color: [49,130,206] },
    { label: "N Found", value: nCount,    color: [229,62,62] },
    { label: "Followup", value: hasFollowup, color: [56,161,105] },
    { label: "Pending", value: pending,   color: [214,158,46] },
  ];
  const boxW = (pageW - margin*2 - 8) / 5;
  const boxY = 28;
  stats.forEach((s, i) => {
    const x = margin + i * (boxW + 2);
    doc.setFillColor(247, 248, 250);
    doc.roundedRect(x, boxY, boxW, 18, 2, 2, "F");
    doc.setTextColor(...s.color);
    doc.setFontSize(16);
    doc.setFont("helvetica", "bold");
    doc.text(String(s.value), x + boxW/2, boxY + 10, { align: "center" });
    doc.setTextColor(113, 128, 150);
    doc.setFontSize(7);
    doc.setFont("helvetica", "normal");
    doc.text(s.label, x + boxW/2, boxY + 15, { align: "center" });
  });

  // ── 구분선 ──
  doc.setDrawColor(226, 232, 240);
  doc.line(margin, 50, pageW - margin, 50);

  // ── 테이블 데이터 ──
  const tableRows = records.map(r => {
    const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString("ko-KR") : "-";
    const type = r.inspType || "최초";
    const nItems = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const nText = nItems > 0 ? `N ${nItems}` : "OK";
    const followText = r.followupSvAnswers ? "완료" : (nItems > 0 ? "미실시" : "-");
    return [r.storeName||"", r.storeTeam||"", r.writerName||"", dt, type, nText, followText];
  });

  doc.autoTable({
    startY: 54,
    head: [["매장명", "팀", "SV", "점검일", "유형", "최초결과", "보완"]],
    body: tableRows,
    margin: { left: margin, right: margin },
    headStyles: {
      fillColor: [229, 62, 62],
      textColor: [255, 255, 255],
      fontStyle: "bold",
      fontSize: 8,
      cellPadding: 3,
    },
    bodyStyles: { fontSize: 8, cellPadding: 2.5, textColor: [26, 32, 44] },
    alternateRowStyles: { fillColor: [247, 248, 250] },
    columnStyles: {
      0: { cellWidth: 38 },
      1: { cellWidth: 18 },
      2: { cellWidth: 18 },
      3: { cellWidth: 22 },
      4: { cellWidth: 14 },
      5: { cellWidth: 16, halign: "center" },
      6: { cellWidth: 14, halign: "center" },
    },
    didParseCell(data) {
      // 최초결과 N → 빨간색
      if (data.column.index === 5 && data.cell.raw && data.cell.raw.startsWith("N")) {
        data.cell.styles.textColor = [197, 48, 48];
        data.cell.styles.fontStyle = "bold";
      }
      // 보완 미실시 → 주황색
      if (data.column.index === 6 && data.cell.raw === "미실시") {
        data.cell.styles.textColor = [180, 100, 0];
      }
      // 보완 완료 → 녹색
      if (data.column.index === 6 && data.cell.raw === "완료") {
        data.cell.styles.textColor = [39, 103, 73];
      }
    },
    didDrawPage(data) {
      // 페이지 하단 푸터
      const pageNum = doc.internal.getCurrentPageInfo().pageNumber;
      const total   = doc.internal.getNumberOfPages();
      doc.setFontSize(7);
      doc.setTextColor(150, 150, 150);
      doc.text(
        `Moms Touch New Platform Inspection  |  ${today}  |  Page ${pageNum} / ${total}`,
        pageW / 2, pageH - 6, { align: "center" }
      );
    },
  });

  const filename = `신규플랫폼_점검리포트_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(filename);
}

async function downloadExcel() {
  const records = window._dashRecords;
  if(!records||records.length===0) { alert("다운로드할 데이터가 없습니다."); return; }
  const svH  = SV_QUESTIONS.map(q=>`[SV] Q${q.id} ${q.title}`);
  const tlH  = SV_QUESTIONS.map(q=>`[팀장] Q${q.id} ${q.title}`);
  const glH  = GL_QUESTIONS.map(q=>`[그룹장] Q${q.id} ${q.title}`);
  const rows = [["매장코드","매장명","팀","점검유형","역할","점검자","방문일시",...svH,...tlH,...glH]];
  records.forEach(r => {
    const addRow = (type, role, name, date, answers, tla, gla) => {
      if (!name && !Object.keys(answers||{}).length) return;
      const svVals = SV_QUESTIONS.map(q=>answers?.[q.id]?.value||"");
      const tlVals = SV_QUESTIONS.map(q=>tla?.[q.id]?.value||"");
      const glVals = GL_QUESTIONS.map(q=>gla?.[q.id]?.value||"");
      rows.push([r.storeCode,r.storeName,r.storeTeam,type,role,name||"",fmtDate(date),...svVals,...tlVals,...glVals]);
    };
    addRow("최초점검","SV",r.writerName,r.visitDate,r.answers,r.tlAnswers,r.glAnswers);
    if(r.followupSvAnswers) addRow("보완점검","SV",r.followupSvWriterName,r.followupSvVisitDate,r.followupSvAnswers,r.followupTlAnswers,r.followupGlAnswers);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:10},{wch:16},{wch:8},{wch:8},{wch:10},{wch:10},{wch:18},
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(GL_QUESTIONS.length).fill({wch:10})];
  XLSX.utils.book_append_sheet(wb,ws,"점검이력");
  XLSX.writeFile(wb,`신규플랫폼_점검이력_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── UTILS ──────────────────────────────────────────
function openImageModal(src) {
  const modal = document.createElement("div");
  modal.className = "img-modal";
  modal.innerHTML = `<div class="img-modal-bg" onclick="this.parentElement.remove()"></div>
    <img src="${src}" class="img-modal-img">
    <button class="img-modal-close" onclick="this.parentElement.remove()">✕</button>`;
  document.body.appendChild(modal);
}
function go(screen) { S.screen=screen; render(); }
function confirmBack() { if(confirm("작성 중인 내용이 사라집니다. 돌아가시겠습니까?")) go("home"); }
function nowDTL() {
  const now=new Date(), pad=n=>String(n).padStart(2,"0");
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
function fmtDate(v) { if(!v) return "-"; try { return new Date(v).toLocaleString("ko-KR"); } catch { return v; } }

Object.assign(window, {
  go, goAdmin, checkAdmin, selectInspType, selectRole, searchStores, downloadPDF, setSearchType, handleStoreUpload, setDashFilter, clearDashFilter, setDashTab, confirmGL,
  filterStoreList, selectStore, startForm, setAnswer, handleImage,
  removeImage, submitForm, fetchRecords, viewRecord, viewRecordDash,
  confirmBack, openImageModal, downloadExcel,
});
render();
</script>

.store-upload-sub{font-size:12px;color:var(--sub)}
.btn-upload{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:#3182CE;color:white;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.upload-progress{margin-top:10px;display:flex;align-items:center;gap:8px}
.upload-progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.upload-progress-fill{height:100%;background:#3182CE;border-radius:3px;transition:width .4s}
.dash-tabs{display:flex;gap:0;padding:0 16px;margin-bottom:4px;border-bottom:2px solid var(--border)}
.dash-tab{flex:1;padding:10px 6px;background:none;border:none;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.dash-tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-cnt{display:inline-block;background:#EDF2F7;color:var(--sub);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:3px}
.dash-tab.active .tab-cnt{background:#FFF5F5;color:var(--red)}
.active-stat{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(229,62,62,0.15)}
.filter-bar{padding:6px 16px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px}
.filter-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;cursor:pointer;color:var(--sub)}
.table-count{font-size:12px;color:var(--sub);padding:8px 2px;margin:0 16px}
.stat-card{cursor:pointer;transition:all .15s}
.stat-card:active{transform:scale(0.97)}
.btn-gl-confirm{width:100%;padding:16px;background:#805AD5;color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-gl-confirm:disabled{opacity:.6}
.final-confirmed-box{background:#F0FFF4;border:2px solid #9AE6B4;border-radius:var(--radius);padding:16px;text-align:center;font-size:16px;font-weight:700;color:#276749;margin-bottom:8px}
.hint-text{font-size:14px;color:var(--sub);line-height:1.6}
.loading-text{font-size:14px;color:var(--sub);text-align:center;padding:20px}
.error-text{font-size:14px;color:var(--red);text-align:center;padding:20px}
</style>
</head>
<body><div id="app"></div></body>
</html>
