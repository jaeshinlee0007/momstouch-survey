async function downloadExcel() {
  const records = window._dashRecords;
  if(!records||records.length===0) { alert("다운로드할 데이터가 없습니다."); return; }
  // SheetJS 지연 로딩
  try {
    await loadXLSX();
  } catch(e) {
    alert("Excel 라이브러리 로드 실패\n인터넷 연결을 확인해주세요."); return;
  }

  // 헤더: 답변값만 (이미지 제외)
  const svH  = SV_QUESTIONS.map(q=>`[SV] Q${q.id} ${q.title}`);
  const tlH  = SV_QUESTIONS.map(q=>`[팀장] Q${q.id} ${q.title}`);
  const glH  = GL_QUESTIONS.map(q=>`[그룹장] Q${q.id} ${q.title}`);
  const confirmH = ["팀장확인자","팀장확인일시","그룹장확인일시","최종확인여부","반려여부","보완횟수","반려횟수","보완이력요약"];
  const dateH    = ["최초점검일","보완점검일"];

  const rows = [["매장코드","매장명","팀","점검유형","역할","점검자","방문일시",...svH,...tlH,...glH,...confirmH,...dateH]];

  const roleLabelMap = { sv:"SV", tl:"팀장", gl:"그룹장" };
  const historyEventLabelMap = { submit_sv:"제출(SV)", submit_tl:"제출(팀장)", reject_tl:"반려(팀장)", reject_gl:"반려(그룹장)" };

  records.forEach(r => {
    const addRow = (type, role, name, date, answers, tla, gla) => {
      if (!name && !Object.keys(answers||{}).length) return;

      const svVals = SV_QUESTIONS.map(q=> answers?.[q.id]?.value||"");
      const tlVals = SV_QUESTIONS.map(q=> tla?.[q.id]?.value||"");
      const glVals = GL_QUESTIONS.map(q=> gla?.[q.id]?.value||"");
      const history = Array.isArray(r.followupHistory) ? r.followupHistory : [];
      const submitCount = history.filter(h => h.event==="submit_sv"||h.event==="submit_tl").length;
      const rejectCount = history.filter(h => h.event==="reject_tl"||h.event==="reject_gl").length;
      const historySummary = [...history].sort((a,b) => {
        const at = a.at?.seconds ?? (a.at ? new Date(a.at).getTime()/1000 : 0);
        const bt = b.at?.seconds ?? (b.at ? new Date(b.at).getTime()/1000 : 0);
        return at - bt;
      }).map(h => historyEventLabelMap[h.event] || h.event).join(" → ");
      const confirmVals = [
        r.tlConfirmerName||"",
        r.tlConfirmedAt ? fmtDateExcel(r.tlConfirmedAt) : "",
        r.finalConfirmedAt ? fmtDateExcel(r.finalConfirmedAt) : "",
        r.finalConfirmed ? "Y" : "N",
        (r.tlRejected || r.glRejected) ? "Y" : "N",
        submitCount,
        rejectCount,
        historySummary,
      ];
      // 최초점검일: visitDate
      // 보완점검일: N값 있으면 followup 날짜, 없으면(해당없음) 빈칸
      const firstDate   = r.visitDate ? fmtDateExcel(r.visitDate) : "";
      const hasNItems   = Object.values(r.answers||{}).some(a => a.value === "N");
      const followupDate = hasNItems
        ? (r.followupSvVisitDate ? fmtDateExcel(r.followupSvVisitDate)
          : r.followupTlVisitDate ? fmtDateExcel(r.followupTlVisitDate) : "")
        : ""; // N없음 → 보완점검 해당없음이므로 빈칸 (최초점검일 복사 안 함)
      const dateVals = [firstDate, followupDate];
      rows.push([r.storeCode,r.storeName,r.storeTeam,type,role,name||"",fmtDateExcel(date),...svVals,...tlVals,...glVals,...confirmVals,...dateVals]);
    };
    const roleLabel = roleLabelMap[r.role] || "SV";
    // GL 자체 최초점검(role==="gl")은 SV 문항과 무관한 별도 11문항 체크리스트이므로
    // SV Q1~Q16 칸에는 값을 넣지 않고(빈칸), 그룹장 Q1~Q11 칸(glAnswers)에만 표시한다.
    const svAnswersForRow = r.role === "gl" ? null : r.answers;
    addRow("최초점검", roleLabel, r.writerName, r.visitDate, svAnswersForRow, r.tlAnswers, r.glAnswers);
    // 보완점검: SV 또는 TL 누가 진행했는지에 따라 동적으로 role/name/date/answers 결정
    // (GL 최초점검 N → TL 보완 등, 보완 주체가 SV가 아닌 경우도 별도 "보완점검" 행으로 정확히 출력)
    const hasSvFu = r.followupSvAnswers && Object.keys(r.followupSvAnswers).length > 0;
    const hasTlFu = r.followupTlAnswers && Object.keys(r.followupTlAnswers).length > 0;
    if (hasSvFu || hasTlFu) {
      const fuRole = hasSvFu ? "SV" : "팀장";
      const fuName = hasSvFu ? (r.followupSvWriterName||"") : (r.tlConfirmerName||r.followupTlWriterName||"");
      const fuDate = hasSvFu ? r.followupSvVisitDate : (r.followupTlVisitDate||r.followupSvVisitDate);
      const fuAnswers = hasSvFu ? r.followupSvAnswers : r.followupTlAnswers;

.store-upload-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
.store-upload-title{font-size:14px;font-weight:700;margin-bottom:4px}
.store-upload-sub{font-size:12px;color:var(--sub)}
.btn-upload{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:#3182CE;color:white;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.upload-progress{margin-top:10px;display:flex;align-items:center;gap:8px}
.upload-progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.upload-progress-fill{height:100%;background:#3182CE;border-radius:3px;transition:width .4s}
.dash-tabs{display:flex;gap:0;padding:0 16px;margin-bottom:4px;border-bottom:2px solid var(--border)}
.dash-tab{flex:1;padding:10px 6px;background:none;border:none;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.dash-tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-cnt{display:inline-block;background:#EDF2F7;color:var(--sub);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:3px}
.dash-tab.active .tab-cnt{background:#FFF5F5;color:var(--red)}
.active-stat{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(229,62,62,0.15)}
.filter-bar{padding:6px 16px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px}
.filter-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;cursor:pointer;color:var(--sub)}
.table-count{font-size:12px;color:var(--sub);padding:8px 2px;margin:0 16px}
.stat-card{cursor:pointer;transition:all .15s}
.stat-card:active{transform:scale(0.97)}
.btn-gl-confirm{width:100%;padding:16px;background:#805AD5;color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px}
.reject-notice{background:#FFF5F5;border:2px solid #FC8181;border-radius:12px;padding:14px;margin-bottom:12px}
.reject-notice{font-size:15px;font-weight:700;color:#C53030}
.reject-reason{font-size:13px;color:#718096;margin-top:6px;font-weight:400}
.reject-section{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.btn-tl-reject{width:100%;padding:14px;background:white;color:#C53030;border:2px solid #FC8181;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer}
.btn-gl-reject{width:100%;padding:14px;background:white;color:#C53030;border:2px solid #FC8181;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer}
.rej-badge{display:inline-block;font-size:11px;font-weight:700;color:#C53030;background:#FFF5F5;border:1px solid #FC8181;padding:2px 8px;border-radius:10px}
.rej-reason{font-size:11px;color:#C53030;margin-top:4px}
.rejected-item{border-color:#FC8181!important;background:#FFF5F5!important}
.btn-tl-confirm{width:100%;padding:16px;background:#3182CE;color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-tl-confirm:disabled{opacity:.6}
.tl-filter-wrap{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#F7F8FA;border-bottom:1px solid var(--border)}
.tl-filter-label{font-size:13px;font-weight:600;color:var(--sub);white-space:nowrap}
.tl-filter-select{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:white;outline:none;max-width:200px}
.tl-filter-select:focus{border-color:var(--red)}
.tl-confirmed-box{background:#EBF8FF;border:2px solid #90CDF4;border-radius:var(--radius);padding:16px;text-align:center;font-size:15px;font-weight:700;color:#2B6CB0;margin-bottom:8px}
.badge-tl{display:inline-block;font-size:11px;color:#2B6CB0;background:#EBF8FF;padding:2px 7px;border-radius:10px}
.badge-reject{display:inline-block;font-size:11px;color:#C53030;background:#FFF5F5;border:1px solid #FC8181;padding:2px 7px;border-radius:10px;font-weight:700}
.badge-gl{display:inline-block;font-size:11px;color:#553C9A;background:#FAF5FF;padding:2px 7px;border-radius:10px}
.badge-final{display:inline-block;font-size:11px;color:#276749;background:#F0FFF4;padding:2px 7px;border-radius:10px}
.badge-transfer{display:inline-block;font-size:11px;font-weight:700;color:#6B46C1;background:#FAF5FF;border:1px solid #D6BCFA;padding:2px 8px;border-radius:10px}
.badge-closed{display:inline-block;font-size:11px;font-weight:700;color:#742A2A;background:#FFF5F5;border:1px solid #FEB2B2;padding:2px 8px;border-radius:10px}
.btn-gl-confirm:disabled{opacity:.6}
.final-confirmed-box{background:#F0FFF4;border:2px solid #9AE6B4;border-radius:var(--radius);padding:16px;text-align:center;font-size:16px;font-weight:700;color:#276749;margin-bottom:8px}
.hint-text{font-size:14px;color:var(--sub);line-height:1.6}
.loading-text{font-size:14px;color:var(--sub);text-align:center;padding:20px}
.error-text{font-size:14px;color:var(--red);text-align:center;padding:20px}
.memo-section{margin-top:8px;padding:0 2px}
.memo-wrap{display:flex;align-items:center;gap:6px}
.memo-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#FAFAFA;outline:none;color:var(--text)}
.memo-input:focus{border-color:#805AD5;background:white}
.memo-input::placeholder{color:#A0AEC0}
.memo-counter{font-size:11px;color:#718096;white-space:nowrap;min-width:32px;text-align:right}
.compare-memo{margin-top:6px;font-size:12px;color:#553C9A;background:#FAF5FF;border-radius:6px;padding:5px 9px;border-left:3px solid #805AD5}
</style>
</head>
