// Auth 상태 변경 감지 (로그인/로그아웃 시 자동 처리)
onAuthStateChanged(auth, async user => {
  _currentUser = user;

      const _hasPendingSession = (() => {
        try {
          const raw = sessionStorage.getItem("momstouch_insp_session");

          const d = JSON.parse(raw);
          const inspScreens = ["form","info","storeSel","inspType","compare"];

// 활성 매장 데이터 (Firebase store_master)
// 양도양수/폐점점포 맵은 캐시 적중 여부와 무관하게 항상 신선하게 유지
// (store_master 캐시(메모리/localStorage)가 살아있어도 두 맵은 별도 짧은 캐시로 관리)
let _mapsLoadedAt = 0;
const _MAPS_TTL = 10 * 60 * 1000; // 10분

async function _refreshTransferAndClosedMaps() {
  if (Date.now() - _mapsLoadedAt < _MAPS_TTL && window._transferMap && window._closedMap) return;
  try {
    const [transferSnap, closedSnap] = await Promise.all([
      getDocs(collection(db,"store_transfer")).catch(() => ({docs:[]})),
      getDocs(collection(db,"store_closed")).catch(() => ({docs:[]})),
    ]);
    window._transferMap = new Map();
    (transferSnap.docs||[]).forEach(d => {
      const t = d.data();
      if (!window._transferMap.has(t.newCode)) window._transferMap.set(t.newCode, []);
      window._transferMap.get(t.newCode).push({oldCode: t.oldCode, transferDate: t.transferDate});
    });
    window._closedMap = new Map();
    (closedSnap.docs||[]).forEach(d => {
      const c = d.data();
      window._closedMap.set(c.code, c);
    });
    _mapsLoadedAt = Date.now();
  } catch(e) {
    if (!window._transferMap) window._transferMap = new Map();
    if (!window._closedMap) window._closedMap = new Map();
  }
}

async function getActiveStoreData() {
  // 양도양수/폐점점포 맵은 store_master 캐시 여부와 무관하게 항상 최신화
  await _refreshTransferAndClosedMaps();

  const cached = cacheGet("store");
  if (cached) return cached;

  // 방법B: Firestore 버전 타임스탬프 체크 → 불일치 시 localStorage 자동 무효화
  const LS_KEY = "momstouch_store_master";
  const LS_TTL = 24 * 60 * 60 * 1000;
  try {
    const lsRaw = localStorage.getItem(LS_KEY);
    if (lsRaw) {
      const lsData = JSON.parse(lsRaw);
      if (Date.now() - lsData.ts < LS_TTL && lsData.stores?.length > 0) {
        // 버전 타임스탬프 확인 (getDoc 1회만 추가)
        let serverTs = 0;
        try {
          const vSnap = await getDoc(doc(db, "settings", "storeMasterVersion"));
          serverTs = vSnap.exists() ? (vSnap.data().ts || 0) : 0;
        } catch(e) {}
        // 서버 버전이 로컬 캐시보다 최신이면 무효화 후 재조회
        if (serverTs > lsData.ts) {
          try { localStorage.removeItem(LS_KEY); } catch(e) {}
        } else {
          // 캐시 유효 → 그대로 사용
          const stores = lsData.stores;
          window._activeStores = stores;
          cacheSet("store", stores);
          return stores;
        }
      }
    }
  } catch(e) {}

  try {
    // 매장 데이터 조회 (양도양수/폐점점포는 위에서 이미 갱신됨)
    const [snap] = await Promise.all([
      getDocs(collection(db,"store_master")),
    ]);
    if (!snap.empty) {
      const storeMap = new Map();
      snap.forEach(d => {
        const data = d.data();
        if (!data._deleted) {
          const code = data.code;
          // 중복 코드 시 beef 필드 있는 최신 문서 우선
          if (!storeMap.has(code) || (data.beef !== undefined && storeMap.get(code).beef === undefined)) {
            storeMap.set(code, {
              ...data,
              beef:    data.beef    ?? false,
              pizza:   data.pizza   ?? false,
              spacool: data.spacool ?? false,
            });
          }
        }
      });
      const stores = [...storeMap.values()];
      if (stores.length > 0) {
        window._activeStores = stores;
        cacheSet("store", stores);
        try { localStorage.setItem("momstouch_store_master", JSON.stringify({ ts: Date.now(), stores })); } catch(e) {}
        return stores;
      }
    }
  } catch(e) {
    console.warn("Firebase 매장 데이터 로드 실패:", e.message);
  }
  return [];
}

// 매장 데이터 Excel 업로드
async function uploadStoreData(file) {
  // SheetJS 지연 로딩
  try { await loadXLSX(); } catch(e) { throw new Error("Excel 라이브러리 로드 실패"); }
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "binary" });

        // ── 양도양수 시트 파싱 (누적 저장: 기존 유지 + 신규만 추가, 중복 방지) ──
        const transferSheetName = wb.SheetNames.find(n => n.includes("양도양수") || n.toLowerCase().includes("transfer"));
        if (transferSheetName) {
          const wsT = wb.Sheets[transferSheetName];
          const transferData = XLSX.utils.sheet_to_json(wsT, {header:1});
          const transferRows = transferData.slice(1).filter(r => r[0] && r[1] && r[2]);
          if (transferRows.length > 0) {
            // 기존 누적 데이터 조회 (중복 방지용: oldCode+newCode 키)
            const tSnap = await getDocs(collection(db,"store_transfer"));
            const existingKeys = new Set(tSnap.docs.map(d => {
              const t = d.data();
              return `${t.oldCode}__${t.newCode}`;
            }));
            const newTransferRows = transferRows.filter(r => {
              const key = `${String(r[0]).trim()}__${String(r[1]).trim()}`;
              return !existingKeys.has(key);
            });
            if (newTransferRows.length > 0) {
              await Promise.all(newTransferRows.map(r => addDoc(collection(db,"store_transfer"), {
                oldCode: String(r[0]).trim(),
                newCode: String(r[1]).trim(),
                transferDate: String(r[2]).trim(),
                createdAt: new Date(),
              })));
            }
          }
        }

        // ── 폐점점포 시트 파싱 (누적 저장: 기존 유지 + 신규만 추가, 중복 방지) ──
        const closeSheetName = wb.SheetNames.find(n => n.includes("폐점") || n.toLowerCase().includes("close"));
        if (closeSheetName) {
          const wsC = wb.Sheets[closeSheetName];
          const closeData = XLSX.utils.sheet_to_json(wsC, {header:1});
          const closeRows = closeData.slice(1).filter(r => r[0] && r[1]);
          if (closeRows.length > 0) {
            const cSnap = await getDocs(collection(db,"store_closed"));
            const existingClosedCodes = new Set(cSnap.docs.map(d => d.data().code));
            const newCloseRows = closeRows.filter(r => !existingClosedCodes.has(String(r[0]).trim()));
            if (newCloseRows.length > 0) {
              await Promise.all(newCloseRows.map(r => addDoc(collection(db,"store_closed"), {
                code:    String(r[0]||"").trim(),
                name:    String(r[1]||"").trim(),
                team:    String(r[2]||"").trim(),
                sv:      String(r[3]||"").trim(),
                tl:      String(r[4]||"").trim(),
                beef:    String(r[5]||"").trim().toUpperCase() === "O",
                pizza:   String(r[6]||"").trim().toUpperCase() === "O",
                spacool: String(r[7]||"").trim().toUpperCase() === "O",
                closedAt: new Date(),
              })));
            }
          }
        }

        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

        // 헤더 제외, 빈 행 제거
        const stores = rows.slice(1)
          .filter(r => r[0] && r[1])
          .map(r => ({
            code:    String(r[0]||"").trim(),
            name:    String(r[1]||"").trim(),
            team:    String(r[2]||"").trim(),
            sv:      String(r[3]||"").trim(),
            tl:      String(r[4]||"").trim(),
            beef:    String(r[5]||"").trim().toUpperCase() === "O",
            pizza:   String(r[6]||"").trim().toUpperCase() === "O",
            spacool: String(r[7]||"").trim().toUpperCase() === "O",
            // 신제품(갓빠삭치킨) 판매/교육 대상 매장 여부 — 신제품 현장점검 관련 화면에서만 필터링에 사용
            npEligible: String(r[8]||"").trim().toUpperCase() === "O",
          }));

        if (stores.length === 0) {
          reject("유효한 매장 데이터가 없습니다."); return;
        }

        // Firebase store_master 컬렉션에 저장 (영업중 매장 - 전체 교체 방식 유지)
        const existingSnap = await getDocs(collection(db, "store_master"));
        if (existingSnap.size > 0) {
          const delBatchSize = 50;
          const existingDocs = existingSnap.docs;
          for (let i = 0; i < existingDocs.length; i += delBatchSize) {
            const batch = existingDocs.slice(i, i + delBatchSize);
            await Promise.all(batch.map(d => deleteDoc(doc(db,"store_master",d.id))));
          }
        }

        // 새 데이터 일괄 저장 (50개씩 배치)
        const batchSize = 50;
        for (let i = 0; i < stores.length; i += batchSize) {
          const batch = stores.slice(i, i + batchSize);
          await Promise.all(batch.map(s => addDoc(collection(db,"store_master"), s)));
        }

        cacheInvalidate("store");
        resolve(stores.length);
      } catch(err) {
        reject(err.message || "파일 처리 오류");
      }
    };
    reader.onerror = () => reject("파일 읽기 실패");
    reader.readAsBinaryString(file);
  });
}

// innerHTML에 꽂기 전 반드시 이 함수로 이스케이프. null/undefined는 빈 문자열로 처리.
function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 신제품 현장점검 건의 상태 계산: "none"(미점검) | "needs"(재점검필요) | "pending"(승인대기) | "done"(완료)
// - SV의 Q1=Y는 담당 팀장 승인(tlApproved===true)이 있어야 완료. 필드가 없는 과거 데이터도 승인대기로 취급.
// - TL/GL/관리자 본인 점검의 Y는 승인 절차 없이 즉시 완료.
// - 팀장(또는 GL/관리자)이 반려한 건은 재점검필요로 취급 (기존 N항목과 동일 버킷).
function npStatus(rec) {
  if (!rec) return "none";
  if (rec.tlRejected) return "needs";
  const q1 = rec.npAnswers?.q1;
  if (q1 === "N") return "needs";
  if (q1 === "Y") {
    if (rec.role === "sv") return rec.tlApproved === true ? "done" : "pending";
    return "done";
  }
  return "none";
}

// 스파쿨 홍보물 점검 건의 상태 계산: "none"(미점검) | "needs"(재점검필요) | "pending"(승인대기) | "done"(완료)
// - Q1, Q2 둘 다 Y여야 승인 절차로 진행. 하나라도 N이면 즉시 재점검필요 (보완점검 없음).
// - SV의 전부 Y 건은 담당 팀장 승인이 있어야 완료. TL/GL/관리자 본인 점검은 즉시 완료.
// - 팀장(또는 GL/관리자)이 반려한 건은 재점검필요로 취급.
function spacoolStatus(rec) {
  if (!rec) return "none";
  if (rec.tlRejected) return "needs";
  const a = rec.spacoolAnswers;
  if (!a || (a.q1 == null && a.q2 == null)) return "none";
  if (a.q1 === "N" || a.q2 === "N") return "needs";
  if (a.q1 === "Y" && a.q2 === "Y") {
    if (rec.role === "sv") return rec.tlApproved === true ? "done" : "pending";
    return "done";
  }
  return "none";
}

// 점검 작성일(visitDate) 유효성 검증
// 반환: { ok: true } 또는 { ok: false, message: "..." }
function validateVisitDate(visitDateStr) {
  if (_dateLimitSetting === "none" || !_dateLimitSetting) return { ok: true };
  if (["gl","admin"].includes(S.role)) return { ok: true }; // GL/admin 예외

  if (!visitDateStr) return { ok: true }; // 날짜 미입력은 별도 필수 검증에서 처리

  const limitDays = parseInt(_dateLimitSetting, 10);
  const today = new Date();
  today.setHours(0,0,0,0);

  const minDate = new Date(today);
  minDate.setDate(minDate.getDate() - limitDays);

  const visitDate = new Date(visitDateStr);
  visitDate.setHours(0,0,0,0);

  if (visitDate < minDate || visitDate > today) {
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    const label = limitDays === 0 ? `${fmt(today)} (당일)` : `${fmt(minDate)} ~ ${fmt(today)}`;
    return { ok: false, message: `점검 작성일은 ${label} 범위만 가능합니다.\n(현재 입력: ${fmt(visitDate)})` };
  }
  return { ok: true };
}

function renderNpRoster() {
  const rows = S.npAnswers.attendees.map((name, i) => `
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input type="text" class="input-field" style="flex:1;margin:0" placeholder="성명 입력"
        value="${escapeHtml(name)}" oninput="updateNpAttendeeName(${i},this.value)" />
      ${S.npAnswers.attendees.length > 1 ? `<button onclick="removeNpAttendee(${i})" style="flex-shrink:0;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:white;color:var(--red);cursor:pointer">✕</button>` : ""}
    </div>`).join("");
  return `${rows}<button class="btn-ghost" onclick="addNpAttendee()" style="margin-top:2px">+ 참석자 추가</button>`;
}

function addNpAttendee() {
  S.npAnswers.attendees.push("");
  const wrap = document.getElementById("npRosterWrap");
  if (wrap) wrap.innerHTML = renderNpRoster();
}

function removeNpAttendee(idx) {
  if (S.npAnswers.attendees.length <= 1) return; // 최소 1명 유지
  S.npAnswers.attendees.splice(idx, 1);
  const wrap = document.getElementById("npRosterWrap");
  if (wrap) wrap.innerHTML = renderNpRoster();
}

function updateNpAttendeeName(idx, val) {
  S.npAnswers.attendees[idx] = val;
}

function updateNpMemo(val) {
  S.npAnswers.memo = val;
  const cnt = document.getElementById("npMemoCnt");
  if (cnt) cnt.textContent = `${val.length}/${NP_FORM.memoMaxLen}`;
}

async function handleNpImage(slotKey, input) {
  const file = input.files[0]; if (!file) return;
  if (file.size > 20 * 1024 * 1024) {
    alert("파일 크기가 너무 큽니다. (20MB 이하만 가능)\n더 낮은 화질로 촬영하거나 갤러리에서 다른 사진을 선택해주세요.");
    input.value = "";
    return;
  }
  const compressed = await compressImage(file, 400, 0.35);
  const path = `inspections_np/${S.storeCode}/${Date.now()}_${slotKey}.jpg`;
  const { ok, url } = await uploadImageToStorage(compressed, path);
  S.npAnswers.photos[slotKey] = { image: ok ? url : compressed };
  sessionSave();
  const preview = document.getElementById(`npimg-preview-${slotKey}`);
  if (preview) preview.innerHTML = `
    <div class="preview-container">
      <img src="${compressed}" class="preview-img" onclick="openImageModal('${compressed}')">
      <button class="remove-img" onclick="removeNpImage('${slotKey}')">✕</button>

}

function removeNpImage(slotKey) {
  S.npAnswers.photos[slotKey] = null;
  const p = document.getElementById(`npimg-preview-${slotKey}`); if (p) p.innerHTML = "";
  const i = document.getElementById(`npimg-${slotKey}`); if (i) i.value = "";
}

async function submitFormNP() {
  if (!_npEnabled) {
    alert("현재 신제품 현장점검 기능이 비활성화되어 제출할 수 없습니다.\n관리자에게 문의해주세요.");
    return;
  }
  const a = S.npAnswers;
  const warnEl = document.getElementById("submitWarning");
  const showWarn = (msg) => {
    if (warnEl) { warnEl.textContent = "⚠️ " + msg; warnEl.style.display = "block"; }
    alert("⚠️ " + msg + "\n제출되지 않았습니다.");
  };

  if (!_npPhotoRequiredLoaded) await loadNpPhotoRequired();

  if (a.q1 !== "Y" && a.q1 !== "N") { showWarn("NP.Q1 (교육 완료 여부)를 선택해주세요."); return; }

  const validAttendees = a.attendees.map(x => (x||"").trim()).filter(x => x);
  if (validAttendees.length === 0) { showWarn("교육 참석자를 최소 1명 입력해주세요."); return; }

  if (_npPhotoRequired) {
    const missing = NP_FORM.photoSlots.filter(s => !a.photos[s.key]?.image);
    if (missing.length > 0) { showWarn(`사진 첨부가 필요합니다: ${missing.map(s=>s.label).join(", ")}`); return; }
  }

  if (warnEl) warnEl.style.display = "none";

  try {
    const payload = {
      storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
      writerName: S.writerName, role: S.role,
      inspType: "최초", // 신제품 현장점검은 최초/보완 구분 없음 (작업지시서 기준)
      visitDate: S.visitDate,
      npAnswers: {
        q1: a.q1,
        attendees: validAttendees,
        photos: a.photos,
        memo: (a.memo || "").slice(0, NP_FORM.memoMaxLen),
      },
      needsFollowup: a.q1 === "N", // 완료 미판정 → 대시보드에서 "추가점검 필요"로 표시
      createdAt: new Date(),
    };
    // SV가 Q1=Y로 제출한 건은 담당 팀장 승인이 있어야 최종 완료로 인정됨.
    // TL/GL/관리자 본인 점검은 승인 절차 없이 즉시 완료 처리 (필드 자체를 넣지 않음).
    if (S.role === "sv" && a.q1 === "Y") {
      payload.tlApproved = false;
    }
    await addDoc(collection(db, "surveys_np"), payload);

    sessionClear();
    cacheInvalidate("dashboardNP");
    cacheInvalidate("recordsNP");
    S.history = [];
    alert("✅ 점검이 제출되었습니다.");
    go("homeNP");
  } catch(e) {
    alert("제출 중 오류가 발생했습니다: " + e.message);
  }
}

async function submitFormSpacool() {
  if (!_spacoolEnabled) {
    alert("현재 스파쿨 홍보물 점검 기능이 비활성화되어 제출할 수 없습니다.\n관리자에게 문의해주세요.");

  }
  const a = S.spacoolAnswers;
  const warnEl = document.getElementById("submitWarning");
  const showWarn = (msg) => {
    if (warnEl) { warnEl.textContent = "⚠️ " + msg; warnEl.style.display = "block"; }

  };

  for (const q of SPACOOL_FORM.questions) {
    if (a[q.key] !== "Y" && a[q.key] !== "N") { showWarn(`${q.key==='q1'?'Q1':'Q2'} (${q.label})를 선택해주세요.`); return; }

      showWarn(`${q.key==='q1'?'Q1':'Q2'}에서 Y를 선택하셨습니다. 사진을 최소 1장 첨부해주세요.`);
      return;
    }
  }

  if (warnEl) warnEl.style.display = "none";

  try {
    const payload = {
      storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
      writerName: S.writerName, role: S.role,
      inspType: "최초", // 스파쿨 홍보물 점검은 최초/보완 구분 없음 (작업지시서 기준)
      visitDate: S.visitDate,
      spacoolAnswers: {
        q1: a.q1, q2: a.q2,
        photos: a.photos,
        memoQ1: (a.memoQ1 || "").slice(0, SPACOOL_FORM.memoMaxLen),
        memoQ2: (a.memoQ2 || "").slice(0, SPACOOL_FORM.memoMaxLen),
        memo: (a.memo || "").slice(0, SPACOOL_FORM.memoMaxLen),
      },
      needsFollowup: (a.q1 === "N" || a.q2 === "N"),
      createdAt: new Date(),
    };
    // SV가 Q1,Q2 전부 Y로 제출한 건은 담당 팀장 승인이 있어야 최종 완료로 인정됨.
    // TL/GL/관리자 본인 점검은 승인 절차 없이 즉시 완료 처리 (필드 자체를 넣지 않음).
    if (S.role === "sv" && a.q1 === "Y" && a.q2 === "Y") {
      payload.tlApproved = false;
    }
    await addDoc(collection(db, "surveys_spacool"), payload);

    sessionClear();
    cacheInvalidate("dashboardSpacool");
    cacheInvalidate("recordsSpacool");
    S.history = [];
    alert("✅ 점검이 제출되었습니다.");
    go("homeSpacool");
  } catch(e) {
    alert("제출 중 오류가 발생했습니다: " + e.message);

}

async function searchStores() {
  const inputEl = document.getElementById("writerInput");
  // Auth 로그인 시 이름 자동 적용
  const name = (_currentUser && _authName) ? _authName : (inputEl?.value?.trim() || "");
  if (!name) { alert("이름을 입력해주세요."); return; }
  if (_currentUser && _authName && inputEl) inputEl.value = _authName;
  S.writerName = name;
  // S.role에 Auth 역할 반영 (TL이 sv 역할 선택 시에도 tl 권한 유지)
  if (_currentUser && _authRole && !S.role) S.role = _authRole;
  S.storeSearch = "";

  document.getElementById("storeResult").innerHTML = `<p class="loading-text">매장 목록 불러오는 중...</p>`;
  const activeStores = await getActiveStoreData();

  let matched = [];
  if (S.category === "np") {
    // 신제품 현장점검: 역할 무관하게 TL과 동일한 담당팀 전체 범위 노출
    if (S.role === "sv") {
      // 본인 담당 매장에서 소속 TL을 역으로 찾아 그 TL 팀 전체로 확장
      const myStore = activeStores.find(s => s.sv === name);
      const teamTl = myStore ? myStore.tl : null;
      matched = teamTl ? activeStores.filter(s => s.tl === teamTl) : activeStores.filter(s => s.sv === name);
    } else if (S.role === "tl") {
      const svStores = activeStores.filter(s => s.sv === name);
      const tlStores = activeStores.filter(s => s.tl === name);
      const codeSet  = new Set(svStores.map(s => s.code));
      matched = [...svStores, ...tlStores.filter(s => !codeSet.has(s.code))];
    } else {
      // GL/admin: 전체 매장
      matched = activeStores.slice();
    }
    // 신제품 판매/교육 대상 매장만 노출 (STORE INFO의 "신제품-갓빠삭" 컬럼 기준)
    matched = matched.filter(s => s.npEligible);
  } else if (S.category === "spacool") {
    // 스파쿨 홍보물 점검: 역할 무관하게 TL과 동일한 담당팀 전체 범위 노출
    if (S.role === "sv") {
      const myStore = activeStores.find(s => s.sv === name);
      const teamTl = myStore ? myStore.tl : null;
      matched = teamTl ? activeStores.filter(s => s.tl === teamTl) : activeStores.filter(s => s.sv === name);
    } else if (S.role === "tl") {
      const svStores = activeStores.filter(s => s.sv === name);
      const tlStores = activeStores.filter(s => s.tl === name);
      const codeSet  = new Set(svStores.map(s => s.code));
      matched = [...svStores, ...tlStores.filter(s => !codeSet.has(s.code))];
    } else {
      matched = activeStores.slice();
    }
    // 스파쿨 판매 대상 매장만 노출 (STORE INFO의 "스파쿨" 컬럼 기준)
    matched = matched.filter(s => s.spacool);
  } else if (S.role === "sv") {
    // SV: 본인 담당 점포만
    matched = activeStores.filter(s => s.sv === name);
  } else if (S.role === "tl") {
    // TL: 본인 담당 점포(sv컬럼) + 담당팀 전체(tl컬럼) → 중복 제거
    const svStores = activeStores.filter(s => s.sv === name);
    const tlStores = activeStores.filter(s => s.tl === name);
    const codeSet  = new Set(svStores.map(s => s.code));
    matched = [...svStores, ...tlStores.filter(s => !codeSet.has(s.code))];
  } else {
    // GL/admin: 전체 매장
    matched = activeStores.slice();
  }

  if (matched.length === 0) {
    document.getElementById("storeResult").innerHTML =
      `<p class="error-text">담당 매장이 없습니다. 이름을 확인해주세요.</p>`;
    return;
  }

  // 보완점검: 지금 조치가 필요한(반려/보완필요) 담당 매장만 노출
  // ※ 판정은 getStoreActionStatus() 공용함수 기준 — 보완점검 필요점/대시보드와 동일 기준
  if (S.inspType === "보완") {
    document.getElementById("storeResult").innerHTML = `<p class="loading-text">보완필요 매장 확인 중...</p>`;
    try {
      const followupCached = cacheGet("followup");
      let svSnap, tlSnap, glSnap;
      if (followupCached) {
        [svSnap, tlSnap, glSnap] = followupCached;
      } else {
        // inspType 등호필터 제거: Firestore where절은 필드가 아예 없는 문서(구버전 legacy)를
        // 매칭시키지 못해 누락시킴. inspType 판별은 클라이언트에서 (없으면 최초로 간주) 처리.
        [svSnap, tlSnap, glSnap] = await Promise.all([
          getDocs(query(collection(db,"surveys"), where("role","==","sv"))),
          getDocs(query(collection(db,"surveys"), where("role","==","tl"))),
          getDocs(query(collection(db,"surveys"), where("role","==","gl"))),
        ]);
        cacheSet("followup", [svSnap, tlSnap, glSnap]);
      }
      const allDocs = [];
      svSnap.forEach(d => allDocs.push({ id:d.id, role:"sv", ...stripImages([{...d.data()}])[0] }));
      tlSnap.forEach(d => allDocs.push({ id:d.id, role:"tl", ...stripImages([{...d.data()}])[0] }));
      glSnap.forEach(d => allDocs.push({ id:d.id, role:"gl", ...stripImages([{...d.data()}])[0] }));
      const byStore = groupDocsByStore(allDocs);

      const needsFollowup = new Set();
      const alreadyDone = new Set();
      const rejectedMap = new Map(); // storeCode → {reason, by, docId?, glDocId?, svFollowupIds?}

      matched.forEach(s => {
        const bucket = byStore.get(s.code) || {sv:[],tl:[],gl:[]};
        const st = getStoreActionStatus(s.code, bucket.sv, bucket.tl, bucket.gl);
        const svtlNeedsAction = ["반려","보완필요"].includes(st.svtl.status);
        const glNeedsAction   = ["반려","보완필요"].includes(st.gl.status);
        // 기존 정책 유지: SV는 SV/TL 세트건만, TL은 SV/TL + GL 지적건까지 모두 노출
        const visibleToThisRole = S.role === "sv" ? svtlNeedsAction : (svtlNeedsAction || glNeedsAction);

        if (st.svtl.status === "반려") {
          const d = bucket.sv.concat(bucket.tl).find(x => x.id === st.svtl.docId);
          rejectedMap.set(s.code, { reason: d ? (d.tlRejectedReason || d.glRejectedReason) : null, by: st.svtl.rejectedBy, docId: st.svtl.docId });
        } else if (S.role !== "sv" && st.gl.status === "보완필요" && bucket.gl.some(d => d.glRejected)) {
          // GL 반려 → 팀장 보완점검 대기 (기존 GL 전용 진입 경로 호환, TL만 노출)
          const glDoc = bucket.gl.slice().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))[0];
          if (glDoc) {
            rejectedMap.set(s.code, {
              reason: glDoc.glRejectedReason, by: "그룹장",
              glDocId: glDoc.id, svFollowupIds: glDoc.svFollowupIds || [],
            });
          }
        }

        if (visibleToThisRole) {
          needsFollowup.add(s.code);
        } else if (svtlNeedsAction === false && ["완료","확인대기"].includes(st.svtl.status)) {
          alreadyDone.add(s.code);
        }
      });
      window._needsFollowup = needsFollowup;
      window._alreadyDone = alreadyDone;
      window._rejectedMap = rejectedMap;

      // 담당 매장 중: 반려된 점포 + 지금 조치필요(반려/보완필요)인 점포
      const needFollowup = matched.filter(s =>
        rejectedMap.has(s.code) || needsFollowup.has(s.code)
      );

      if (needFollowup.length === 0) {
        document.getElementById("storeResult").innerHTML =
          `<p class="error-text">보완점검이 필요한 담당 매장이 없습니다.<br>
          <span style="font-size:12px;color:#718096">(모두 점검완료 또는 추가점검 대상 없음)</span></p>`;
        return;
      }

      // 정렬: 반려 최상단 → 보완필요 → 나머지
      needFollowup.sort((a, b) => {
        const aRej = rejectedMap.has(a.code) ? 0 : 1;
        const bRej = rejectedMap.has(b.code) ? 0 : 1;
        return aRej - bRej;
      });
      matched = needFollowup;

    } catch(e) {
      console.warn("보완필요 조회 실패:", e.message);
    }
  }
  renderStoreList(matched);
}

function renderStoreList(list, keyword="") {
  window._currentStoreList = list;
  // 10개 이상이면 외부 고정 검색창 표시
  const searchWrap = document.getElementById("storeSearchWrap");
  if (searchWrap) {
    searchWrap.style.display = list.length > 10 ? "block" : "none";
    const fixedInput = document.getElementById("storeKeywordFixed");
    if (fixedInput) fixedInput.value = keyword;
  }
  renderStoreListInner(list, keyword);
}

function renderStoreListInner(list, keyword="") {
  const filtered = keyword
    ? list.filter(s => s.name.includes(keyword) || s.code.includes(keyword))
    : list;
  const needsFollowup = window._needsFollowup || new Set();
  const alreadyDone = window._alreadyDone || new Set();
  let html = `<div class="store-list-wrap">`;
  html += `<div class="store-count">${filtered.length}개 매장</div><div class="search-list">`;
  if (filtered.length === 0) {
    html += `<p class="error-text" style="padding:12px">검색 결과가 없습니다.</p>`;
  }
  filtered.forEach(s => {
    let badge = "";
    if (S.inspType === "보완") {
      if (needsFollowup.has(s.code) && !alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-need">⚠️ 보완필요</span>`;
      } else if (alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-done">✅ 보완점검완료</span>`;
      }
    }
    const rejInfo = (window._rejectedMap||new Map()).get(s.code);
    const rejBadge = rejInfo
      ? `<span class="rej-badge">🚫 ${rejInfo.by} 반려</span>`
      : "";
    const rejReason = rejInfo
      ? `<div class="rej-reason">반려사유: ${rejInfo.reason||"사유 없음"}</div>`
      : "";
    html += `<div class="search-item ${rejInfo?'rejected-item':''}" onclick="selectStore('${s.code}','${s.name}','${s.team}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="si-store">${s.name}</span>${badge}${rejBadge}
        </div>
        <div style="display:flex;gap:3px;flex-shrink:0">${productBadges(s)}</div>
      </div>
      <div class="si-meta">${s.code} · ${s.team} · SV: ${s.sv}</div>
      ${rejReason}
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById("storeResult").innerHTML = html;
  window._currentStoreList = list;
}

function filterStoreList(keyword) {
  S.storeSearch = keyword;
  renderStoreListInner(window._currentStoreList || [], keyword);
}

function selectStore(code, name, team) {
  S.storeCode = code; S.storeName = name; S.storeTeam = team;
  // 매장 객체 저장 (beef/pizza/spacool 배지용)
  S.storeObj = (window._activeStores||[]).find(s => s.code === code) || null;

  // GL glRejected 보완점검: rejectedMap에서 GL 전용 정보 확인
  const rejInfo = (window._rejectedMap || new Map()).get(code);
  if (S.inspType === "보완" && rejInfo && rejInfo.glDocId && rejInfo.svFollowupIds) {
    // 대시보드 경로와 동일하게: compare 화면으로 이동 (그룹장 최초점검 결과 표시)
    S.role = "tl";
    S.inspType = "보완";
    S.answers = {};
    S.prevNItems = rejInfo.svFollowupIds;
    S.glFollowupIds = rejInfo.svFollowupIds;
    S.loadedDocId = rejInfo.glDocId;
    S.visitDate = new Date().toISOString();
    // GL 문서 데이터를 compareData로 설정
    // rejInfo에 문서 데이터가 없으므로 Firebase에서 직접 로드
    loadGLCompareAndShow(rejInfo.glDocId);
    return;
  }

  // GL glRejected 보완점검: prevNItems 이미 설정됨 (기존 경로 호환)
  if (S.inspType === "보완" && S.prevNItems && S.prevNItems.length > 0 && S.glFollowupIds && S.glFollowupIds.length > 0) {
    go("info");
    return;
  }

  // 보완점검: loadPrevNItems 호출 (SV N값 기반 보완점검 대상 로드)
  // GL 최초점검: 바로 info로 (SV N값과 무관하게 독립 점검)
  if (S.inspType === "보완") {
    loadPrevNItems(code);
  } else {
    // SV/TL/GL 최초점검: 바로 info로
    go("info");
  }
}

async function loadPrevNItems(storeCode) {
  try {
    // SV + TL 최초점검 문서 병렬 조회
    const [svSnap, tlSnap] = await Promise.all([
      getDocs(query(collection(db,"surveys"),
        where("storeCode","==",storeCode),
        where("role","==","sv"),
        orderBy("createdAt","desc"))),
      getDocs(query(collection(db,"surveys"),
        where("storeCode","==",storeCode),
        where("role","==","tl"),
        orderBy("createdAt","desc"))),
    ]);

    // SV 세트 기준: 보완 미완료 최신 최초점검 문서
    // "보완 미완료" = 보완점검 자체가 없거나, 보완점검을 했어도 아직 N(미개선)이 남아있는 경우.
    // (보완했지만 여전히 N인 문서를 "종결"로 오판하면 다음 보완점검을 등록할 수 없게 되는 버그가 있었음)
    const _isUnresolved = (data) => {
      const fu = data.followupSvAnswers || data.followupTlAnswers || null;
      if (!fu) return true; // 보완점검 자체가 없으면 당연히 미완료
      const fuN = Object.values(fu).filter(a => a.value === "N").length;
      return fuN > 0; // 보완했어도 N이 남아있으면 여전히 미완료
    };
    let targetDoc = null;
    svSnap.forEach(d => {
      const data = d.data();
      const isFirst = data.inspType === "최초" || !data.inspType;
      if (!targetDoc && isFirst && _isUnresolved(data)) {
        targetDoc = { id: d.id, ...data };
      }
    });
    // 미완료 세트 없으면 최신 최초점검 (SV)
    if (!targetDoc) {
      svSnap.forEach(d => {
        const data = d.data();
        if (!targetDoc && (data.inspType === "최초" || !data.inspType)) {
          targetDoc = { id: d.id, ...data };
        }
      });
    }
    // SV 문서 없으면 TL 독립 최초점검 문서 사용
    if (!targetDoc) {
      tlSnap.forEach(d => {
        const data = d.data();
        const isFirst = data.inspType === "최초" || !data.inspType;
        if (!targetDoc && isFirst && _isUnresolved(data)) {
          targetDoc = { id: d.id, ...data };
        }
      });
    }

    if (targetDoc) {
      // N항목: 이전 보완점검 라운드가 있었다면(아직 N 남은 상태) 그 결과 기준으로,
      // 없었다면 최초점검 답변 기준으로 "아직 안 고쳐진" 항목만 재점검 대상으로 잡음
      const latestFollowupAnswers = targetDoc.followupSvAnswers || targetDoc.followupTlAnswers || null;
      const svAnswers = latestFollowupAnswers || targetDoc.answers || {};
      const normalNItems = Object.entries(svAnswers)
        .filter(([,v]) => v.value === "N")
        .map(([k]) => Number(k));

      // TL 최초점검 N항목 수집 (같은 매장, 최신 최초점검)
      let tlNItems = [];
      let latestTLDoc = null;
      tlSnap.forEach(d => {
        const data = d.data();
        if (!latestTLDoc && (data.inspType === "최초" || !data.inspType)) {
          latestTLDoc = data;
        }
      });
      if (latestTLDoc) {
        tlNItems = Object.entries(latestTLDoc.tlAnswers || latestTLDoc.answers || {})
          .filter(([,v]) => v.value === "N")
          .map(([k]) => Number(k));
      }

      // GL svFollowupIds 병합
      const glFollowupIds = targetDoc.svFollowupIds || [];

      // 전체 보완점검 대상: SV N + TL N + GL 매핑 (중복제거)
      const allFollowupIds = [...new Set([...normalNItems, ...tlNItems, ...glFollowupIds])];
      // 팀장 반려 건은 특정 N항목이 아니라 전체 재점검이 필요하므로 대상 목록을 비워
      // renderForm의 "N목록 없으면 전체 문항 표시" 폴백을 타도록 함
      S.prevNItems = targetDoc.tlRejected ? [] : allFollowupIds;
      S.loadedDocId = targetDoc.id;
      S.glFollowupIds = targetDoc.tlRejected ? [] : glFollowupIds.filter(id => !normalNItems.includes(id) && !tlNItems.includes(id));
      // 최초점검 결과 미리보기용 compareData 설정
      S.compareData = { id: targetDoc.id, ...targetDoc };
      
    } else {
      S.prevNItems = [];
      S.loadedDocId = null;
      S.glFollowupIds = [];
      S.compareData = null;
    }
  } catch(e) {
    console.error("loadPrevNItems 오류:", e.message);
    S.prevNItems = [];
    S.loadedDocId = null;
    S.glFollowupIds = [];
    S.compareData = null;
  }
  // 최초점검 결과 있으면 compare 화면으로, 없으면 바로 info로
  if (S.compareData && S.prevNItems.length > 0) {
    go("compare");
  } else {
    go("info");
  }
}

    S.answers = {};

}

function renderForm(root) {
  const allQuestions = currentQuestionSet();
  const roleLabel = {sv:"SV",tl:"팀장",gl:"그룹장",admin:"관리자"}[S.role] || S.role || "";
  const nSet = new Set(S.prevNItems);

  // 보완점검: N항목만 표시 (A안)
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  const questions = isFollowup
    ? allQuestions.filter(q => nSet.has(q.id))
    : allQuestions;

  let html = `
    <div class="sticky-header" style="display:flex;align-items:center;gap:8px;padding:16px;background:white;border-bottom:1px solid var(--border)">
      <button class="btn-back" onclick="confirmBack()" style="flex-shrink:0">←</button>
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;min-width:0">
        <div style="display:flex;flex-direction:column;align-items:flex-start;min-width:0">
          <span class="header-store" style="font-size:15px;font-weight:700;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${S.storeName}</span>
          <span class="header-role" style="font-size:12px;color:var(--sub);text-align:left">${S.inspType}점검 · ${roleLabel}</span>
        </div>
        <div style="display:flex;gap:3px;margin-left:8px;flex-shrink:0">
          ${productBadges(S.storeObj)}
        </div>
      </div>
    </div>
    <div class="form-body">
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
        <span id="progressText" class="progress-text">0 / ${questions.length}</span>
      </div>`;

  if (isFollowup) {
    html += `<div class="section-divider divider-n">⚠️ 최초점검 N항목 (${questions.length}건) — 재점검</div>`;
  }

  let prevCat = "";
  questions.forEach(q => {
    const color = CAT_COLORS[q.category] || "#718096";
    if (q.category !== prevCat) {
      prevCat = q.category;
      html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
    }
    const tag = q.tag ? `<span class="tag-badge" style="background:${color}20;color:${color}">${q.tag}</span>` : "";
    const glCatIds = S.glFollowupIds || [];
    const svNIds = (S.prevNItems || []).filter(id => !glCatIds.includes(id));
    const isGLcat = glCatIds.includes(q.id) && !svNIds.includes(q.id);
    const nHighlight = isFollowup
      ? (isGLcat ? ' style="border-color:#D69E2E;background:#FFFBEB"' : ' style="border-color:#FC8181;background:#FFF5F5"')
      : "";
    const nLabel = isFollowup
      ? (isGLcat
          ? `<span class="n-label" style="background:#FEFCBF;color:#744210">🔍 그룹장 지적</span>`
          : `<span class="n-label">⚠️ 이전 N</span>`)
      : "";
    html += `
      <div class="question-card" id="qcard-${q.id}"${nHighlight}>
        <div class="q-header">
          <span class="q-num" style="${isFollowup?'background:#E53E3E':''}">Q${q.id}</span>
          <span class="q-title">${q.title}</span>${tag}${nLabel}
        </div>
        <p class="q-desc">${q.desc}</p>
        <div class="answer-row">
          <button class="ans-btn ans-yes" id="ans-${q.id}-Y" onclick="setAnswer(${q.id},'Y')">✅ Y</button>
          <button class="ans-btn ans-no" id="ans-${q.id}-N" onclick="setAnswer(${q.id},'N')">❌ N</button>
          ${!q.noNa ? `<button class="ans-btn ans-na" id="ans-${q.id}-미취급" onclick="setAnswer(${q.id},'미취급')">➖ 미취급</button>` : ""}
        </div>
        <div class="image-section" id="img-sec-${q.id}">
          <label class="img-upload-btn" for="img-${q.id}">📷 사진 첨부
            <input type="file" id="img-${q.id}" accept="image/*" style="display:none" onchange="handleImage(${q.id},this)">
          </label>
          <div id="img-preview-${q.id}"></div>
        </div>
        <div class="memo-section" id="memo-sec-${q.id}" style="display:${S.answers[q.id]?.value ? 'block' : 'none'}">
          <div class="memo-wrap">
            <input type="text" id="memo-${q.id}" class="memo-input"
              placeholder="메모 입력 (선택, 최대 100자)"
              maxlength="100"
              oninput="handleMemo(${q.id},this.value)"
              value="${S.answers[q.id]?.memo||''}" />
            <span class="memo-counter" id="memo-cnt-${q.id}" style="color:${(S.answers[q.id]?.memo?.length||0)>=45?'#E53E3E':'#718096'}">${S.answers[q.id]?.memo?.length||0}/100</span>
          </div>
        </div>
      </div>`;
  });

  html += `
      <div class="submit-section">
        <div id="submitWarning" class="submit-warning" style="display:none">⚠️ 아직 답변하지 않은 항목이 있습니다.</div>
        <button class="btn-submit" onclick="submitForm()">점검 제출하기</button>
      </div>
    </div>`;
  root.innerHTML = html;

  // ── 세션 복원 시 기존 답변/이미지 DOM 반영 ──
  questions.forEach(q => {
    const a = S.answers[q.id];
    if (!a) return;

    // 1. Y/N/미취급 선택 상태 복원
    if (a.value) {
      const sel = document.getElementById(`ans-${q.id}-${a.value}`);
      if (sel) sel.classList.add("selected");

      // 이미지 섹션 표시/숨김 업데이트
      const imgSec = document.getElementById(`img-sec-${q.id}`);
      if (imgSec) {
        if (q.photoOnN) {
          imgSec.style.display = (a.value === "N" || (S.inspType === "보완" && a.value === "Y")) ? "block" : "none";
        } else {
          imgSec.style.display = (a.value === "Y" || a.value === "N") ? "block" : "none";
        }
      }
    }

    // 2. 이미지 미리보기 복원
    if (a.image) {
      const preview = document.getElementById(`img-preview-${q.id}`);
      if (preview) {
        const imgUrl = normalizeImageUrl(a.image);
        preview.innerHTML = `
          <div class="img-preview-view-container">
            <img src="${imgUrl}" class="preview-img" onclick="openImageModal('${imgUrl}')">
            <button class="remove-img" onclick="removeImage(${q.id})">✕</button>
          </div>`;
      }
    }

    // 3. 메모 복원
    if (a.memo) {
      const memoInput = document.getElementById(`memo-${q.id}`);
      const memoCnt   = document.getElementById(`memo-cnt-${q.id}`);
      const memoSec   = document.getElementById(`memo-sec-${q.id}`);
      if (memoInput) memoInput.value = a.memo;
      if (memoCnt)   memoCnt.textContent = `${a.memo.length}/100`;
      if (memoSec)   memoSec.style.display = "block";
    }
  });

  updateProgress();
}
function setAnswer(qId, value) {
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};
  S.answers[qId].value = value;
  ["Y","N","미취급"].forEach(v => {
    const b = document.getElementById(`ans-${qId}-${v}`); if(b) b.classList.remove("selected");
  });
  const sel = document.getElementById(`ans-${qId}-${value}`); if(sel) sel.classList.add("selected");
  const qDef = currentQuestionSet().find(q => q.id === qId);
  const imgSec = document.getElementById(`img-sec-${qId}`);
  if (imgSec) {
    if (qDef?.photoOnN) {
      if (S.inspType === "보완") {
        // 보완점검: 사입관리 Y/N 모두 사진 섹션 표시
        imgSec.style.display = (value === "Y" || value === "N") ? "block" : "none";
      } else {
        // 최초점검: 사입관리 N일 때만 사진 섹션 표시
        imgSec.style.display = value === "N" ? "block" : "none";
      }
    } else if (S.role === "gl" && S.inspType === "최초") {
      // 그룹장 최초점검: 모든 문항 Y/N 사진 선택적 (필수 아님) - 미취급 제외
      imgSec.style.display = (value === "Y" || value === "N") ? "block" : "none";
    } else {
      imgSec.style.display = value === "미취급" ? "none" : "block";
    }
  }
  const card = document.getElementById(`qcard-${qId}`); if(card) card.classList.add("answered");
  // 메모 섹션: 답변 선택 시 항상 표시 (Y/N/미취급 모두)
  const memoSec = document.getElementById(`memo-sec-${qId}`);
  if (memoSec) {
    memoSec.style.display = value ? "block" : "none";
    const memoInput = document.getElementById(`memo-${qId}`);
    if (memoInput && S.answers[qId]?.memo) {
      memoInput.value = S.answers[qId].memo;
      const cnt = document.getElementById(`memo-cnt-${qId}`);
      if (cnt) cnt.textContent = `${S.answers[qId].memo.length}/100`;
    }
  }
  updateProgress();
  sessionSave();
}

// GL 반려건: Firebase에서 GL 문서 로드 후 compare 화면으로 이동
async function loadGLCompareAndShow(glDocId) {
  try {
    const docSnap = await getDoc(doc(db, "surveys", glDocId));
    if (docSnap.exists()) {
      S.compareData = { id: docSnap.id, ...docSnap.data() };
      // 매장 객체 설정 (배지 표시용)
      if (!S.storeObj && S.compareData.storeCode) {
        const activeStores = window._activeStores || await getActiveStoreData();
        S.storeObj = activeStores.find(s => s.code === S.compareData.storeCode) || null;
      }
    } else {
      // getDoc 실패 시 캐시에서 탐색
      const cached = [
        ...(cacheGet("dashboard") || []),
        ...(cacheGet("records") || []),
      ];
      const hit = cached.find(r => r.id === glDocId);
      S.compareData = hit || null;
    }
  } catch(e) {
    // 오류 시 캐시에서 탐색
    const cached = [
      ...(cacheGet("dashboard") || []),
      ...(cacheGet("records") || []),
    ];
    S.compareData = cached.find(r => r.id === glDocId) || null;
  }
  go("compare");
}

function handleMemo(qId, value) {
  if (!S.answers[qId]) S.answers[qId] = {value:null, image:null};
  // 100자 초과 시 자르기
  const trimmed = value.slice(0, 100);
  S.answers[qId].memo = trimmed || null;
  // 글자수 카운터 업데이트
  const cnt = document.getElementById(`memo-cnt-${qId}`);
  if (cnt) {
    cnt.textContent = `${trimmed.length}/100`;
    cnt.style.color = trimmed.length >= 90 ? "#E53E3E" : "#718096";
  }
  // 입력창 값 동기화 (100자 초과 방지)
  const input = document.getElementById(`memo-${qId}`);
  if (input && input.value !== trimmed) input.value = trimmed;
}

async function handleImage(qId, input) {
  const file = input.files[0]; if(!file) return;
  // 20MB 초과 시 업로드 거부
  if (file.size > 20 * 1024 * 1024) {
    alert("파일 크기가 너무 큽니다. (20MB 이하만 가능)\n더 낮은 화질로 촬영하거나 갤러리에서 다른 사진을 선택해주세요.");
    input.value = "";
    return;
  }
  const compressed = await compressImage(file, 400, 0.35);
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};

  // ── Storage 전환 준비 ──────────────────────────────
  // USE_STORAGE = true 로 바꾸면 Storage URL 방식으로 자동 전환
  const USE_STORAGE = true;
  if (USE_STORAGE && _currentUser) {
    const storagePrefix = S.category === "np" ? "inspections_np" : "inspections";
    const path = `${storagePrefix}/${S.storeCode}/${Date.now()}_Q${qId}.jpg`;
    const { ok, url } = await uploadImageToStorage(compressed, path);
    if (ok) {
      S.answers[qId].image = url;          // Storage URL 저장
    } else {
      S.answers[qId].image = compressed;   // 실패 시 base64 fallback
    }
  } else {
    S.answers[qId].image = compressed;     // 현재: base64 저장
  }
  sessionSave(); // 이미지 변경 시 자동 저장
  const preview = document.getElementById(`img-preview-${qId}`);
  if (preview) preview.innerHTML = `
    <div class="preview-container">
      <img src="${compressed}" class="preview-img" onclick="openImageModal('${compressed}')">
      <button class="remove-img" onclick="removeImage(${qId})">✕</button>
    </div>`;
}

function removeImage(qId) {
  if (S.answers[qId]) S.answers[qId].image = null;
  const p = document.getElementById(`img-preview-${qId}`); if(p) p.innerHTML = "";
  const i = document.getElementById(`img-${qId}`); if(i) i.value = "";
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h*maxWidth/w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        // ── 워터마크 추가 ──
        addWatermark(ctx, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function addWatermark(ctx, w, h) {
  // 역할 라벨
  const roleMap = { sv: "AC", tl: "팀장", gl: "그룹장" };
  const roleLabel = roleMap[S.role] || "AC";
  const name = S.writerName || "";
  const storeName = S.storeName || "";

  // 업로드 일시
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // 이미지 크기 비례 폰트/패딩
  const scale   = w / 500;
  const fMain   = Math.max(11, Math.round(13 * scale)); // 매장명/이름 폰트
  const fSub    = Math.max(9,  Math.round(11 * scale)); // 업로드 일시 폰트
  const fBadge  = Math.max(8,  Math.round(10 * scale)); // 배지 폰트
  const padX    = Math.round(12 * scale);
  const padY    = Math.round(9  * scale);
  const lineGap = Math.round(5  * scale);
  const badgeH  = Math.round(16 * scale);
  const badgePadX = Math.round(7 * scale);
  const badgeR  = Math.round(4  * scale);

  // 박스 높이 계산
  const boxH = padY + fMain + lineGap + fSub + padY;

  // 반투명 검정 배경
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, h - boxH, w, boxH);

  const baseY = h - boxH + padY;

  // ── 1행: 맘스터치 배지 + 매장명(좌) / 이름+역할(우) ──
  // 배지 ("맘스터치")
  const badgeText = "맘스터치";
  ctx.font = `500 ${fBadge}px -apple-system, sans-serif`;
  const badgeW = ctx.measureText(badgeText).width + badgePadX * 2;

  // 배지 배경 (둥근 사각형)
  ctx.fillStyle = "#E53E3E";
  ctx.beginPath();
  ctx.roundRect(padX, baseY + (fMain - badgeH) / 2, badgeW, badgeH, badgeR);
  ctx.fill();

  // 배지 텍스트
  ctx.fillStyle = "#ffffff";
  ctx.font = `500 ${fBadge}px -apple-system, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.fillText(badgeText, padX + badgePadX, baseY + fMain / 2);

  // 매장명 (배지 오른쪽)
  const badgeEndX = padX + badgeW + Math.round(7 * scale);
  ctx.fillStyle = "#ffffff";
  ctx.font = `500 ${fMain}px -apple-system, sans-serif`;
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";
  ctx.fillText(storeName, badgeEndX, baseY + fMain);

  // 이름 + 역할 (우측 정렬)
  ctx.fillStyle = "#cccccc";
  ctx.font = `500 ${fMain}px -apple-system, sans-serif`;
  ctx.textAlign = "right";
  ctx.fillText(`${name} ${roleLabel}`, w - padX, baseY + fMain);

  // ── 2행: 업로드 일시 ──
  const row2Y = baseY + fMain + lineGap + fSub;
  ctx.font = `400 ${fSub}px -apple-system, sans-serif`;
  ctx.textAlign = "left";

  // "업로드 일시" 라벨
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText("업로드 일시", padX, row2Y);

  const labelW = ctx.measureText("업로드 일시").width + Math.round(6 * scale);
  // 구분자
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillText("|", padX + labelW, row2Y);

  // 일시값
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.fillText(`${dateStr}  ${timeStr}`, padX + labelW + Math.round(10 * scale), row2Y);
}

function updateProgress() {
  const allQuestions = currentQuestionSet();
  const nSet = new Set(S.prevNItems);
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  // 보완점검: N항목만 기준, 최초점검: 전체 기준
  const questions = isFollowup
    ? allQuestions.filter(q => nSet.has(q.id))
    : allQuestions;
  const answered = questions.filter(q => S.answers[q.id]?.value).length;
  const pct = Math.round(answered/questions.length*100);
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressText");
  if(fill) fill.style.width = pct+"%";
  if(text) text.textContent = `${answered} / ${questions.length}`;
}

// ── SUBMIT ─────────────────────────────────────────
async function submitForm() {
  // photoSettings 미로드 시 재시도 (로그인 후 로드 보장)
  if (!_photoSettingsLoaded) await loadPhotoSettings();
  if (!_dateLimitLoaded) await loadDateLimitSetting();
  // 디버그: 현재 photoSettings 상태 확인
  console.log("[submitForm] _photoSettingsLoaded:", _photoSettingsLoaded);
  console.log("[submitForm] _photoSettings:", JSON.stringify(_photoSettings));

  // 점검 작성일 제한 검증 (최초+보완 공통, GL/admin 예외)
  const dateCheck = validateVisitDate(S.visitDate);
  if (!dateCheck.ok) {
    alert("⚠️ " + dateCheck.message);
    return;
  }

  // admin 역할은 sv와 동일하게 처리
  const effectiveRole = S.role === "admin" ? "sv" : S.role;
  const allQ = currentQuestionSet();
  const nSet = new Set(S.prevNItems);
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  // 보완점검: N항목만 검증, 최초점검: 전체 검증
  const questions = isFollowup ? allQ.filter(q => nSet.has(q.id)) : allQ;
  const unanswered = questions.filter(q => !S.answers[q.id]?.value);
  if (unanswered.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent="⚠️ 아직 답변하지 않은 항목이 있습니다."; }
    document.getElementById(`qcard-${unanswered[0].id}`)?.scrollIntoView({behavior:"smooth"});
    alert("⚠️ 아직 답변하지 않은 항목이 있습니다.\n제출되지 않았습니다. 모든 항목에 답한 뒤 다시 제출해주세요.");
    return;
  }
  // 이미지 필수 체크
  // 그룹장 최초점검: 사진 선택적 (필수 아님)
  // 사입관리(photoOnN): 최초=N만 필수, 보완=Y/N 모두 필수
  // 일반: Y/N 선택 시 필수
  const isGL = effectiveRole === "gl";
  const noImage = (isGL && S.inspType === "최초")
    ? []
    : questions.filter(q => {
        const a = S.answers[q.id];
        if (!a?.value) return false;
        // isPhotoRequired: Firestore settings 기반 필수 여부
        if (!isPhotoRequired(q.id, isGL)) return false;
        if (q.photoOnN) {
          if (isFollowup) {
            return (a.value === "Y" || a.value === "N") && !a.image;
          }
          return a.value === "N" && !a.image;
        }
        return (a.value === "Y" || a.value === "N") && !a.image;
      });
  if (noImage.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent=`📷 사진 첨부가 필요한 항목이 ${noImage.length}건 있습니다. (Y/N 선택 항목은 사진 필수)`; }
    document.getElementById(`qcard-${noImage[0].id}`)?.scrollIntoView({behavior:"smooth"});
    // 사진 없는 항목 카드 강조
    noImage.forEach(q => {
      const card = document.getElementById(`qcard-${q.id}`);
      if(card) card.style.borderColor = "#FC8181";
    });
    alert(`📷 사진 첨부가 필요한 항목이 ${noImage.length}건 있습니다.\n제출되지 않았습니다. 빨간색으로 표시된 항목에 사진을 첨부한 뒤 다시 제출해주세요.`);
    return;
  }
  // 전체 이미지 용량 체크 (Firestore 1MB 문서 한도 고려)
  const totalSize = Object.values(S.answers).reduce((sum, a) => {
    return sum + (a.image ? Math.round(a.image.length * 0.75) : 0);
  }, 0);
  if (totalSize > 900 * 1024) {
    alert(`첨부 이미지 총 용량이 너무 큽니다.\n현재: ${Math.round(totalSize/1024)}KB / 한도: 900KB\n일부 사진을 제거하거나 더 낮은 화질로 다시 촬영해주세요.`);
    return;
  }
  const btn = document.querySelector(".btn-submit");
  if(btn) { btn.disabled=true; btn.textContent="저장 중..."; }
  try {
    const roleField = {sv:"sv",tl:"tl",gl:"gl"}[S.role];
    const payload = {
      storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
      writerName: S.writerName, visitDate: S.visitDate,
      role: effectiveRole, inspType: S.inspType, // effectiveRole: admin→sv
      answers: S.answers, createdAt: new Date(),
    };

    console.log("[submitForm] role:", S.role, "effectiveRole:", effectiveRole, "inspType:", S.inspType, "payload size:", JSON.stringify(payload).length);
    // SV/admin 최초점검 → 새 문서
    if (effectiveRole==="sv" && S.inspType==="최초") {
      console.log("[submitForm] SV 최초 addDoc 시작...");
      const ref = await addDoc(collection(db,currentSurveyCollection()), payload);
      console.log("[submitForm] SV 최초 addDoc 완료:", ref.id);
      S.loadedDocId = ref.id;
    }
    // SV 보완점검 → 최초점검 문서에 followup 저장
    else if (effectiveRole==="sv" && S.inspType==="보완") {
      const _histEvent = {
        event: "submit_sv",
        writerName: S.writerName,
        at: new Date(),
        answers: S.answers,
      };
      if (S.loadedDocId) {
        
        await updateDoc(doc(db,currentSurveyCollection(),S.loadedDocId), {
          followupSvAnswers: S.answers,
          followupSvWriterName: S.writerName,
          followupSvVisitDate: S.visitDate,
          followupSvUpdatedAt: new Date(),
          // 반려 이후 재보완점검 제출 시 반려 상태 해제 (반려 사유/이력 필드는 보존)
          tlRejected: false,
          glRejected: false,
          followupHistory: arrayUnion(_histEvent),
        });
      } else {
        // loadedDocId 없으면 매장코드로 최초점검 문서 재탐색
        console.warn("loadedDocId 없음 - storeCode로 재탐색:", S.storeCode);
        const fallbackQ = query(collection(db,currentSurveyCollection()),
          where("storeCode","==",S.storeCode),
          where("role","==","sv"),
          orderBy("createdAt","desc"));
        const fallbackSnap = await getDocs(fallbackQ);
        let targetId = null;
        fallbackSnap.forEach(d => {
          const data = d.data();
          if (!targetId && (data.inspType==="최초"||!data.inspType)) targetId = d.id;
        });
        if (targetId) {
          
          await updateDoc(doc(db,currentSurveyCollection(),targetId), {
            followupSvAnswers: S.answers,
            followupSvWriterName: S.writerName,
            followupSvVisitDate: S.visitDate,
            followupSvUpdatedAt: new Date(),
            tlRejected: false,
            glRejected: false,
            followupHistory: arrayUnion(_histEvent),
          });
          S.loadedDocId = targetId;
        } else {
          console.warn("최초점검 문서 없음 - 새 문서 생성");
          const ref = await addDoc(collection(db,currentSurveyCollection()), payload);
          S.loadedDocId = ref.id;
        }
      }
    }
    // 팀장 → 최초점검 문서에 tl 필드 업데이트
    else if (effectiveRole==="tl") {
      const prefix = S.inspType==="최초" ? "tl" : "followupTl";

      // GL 문서 기반 보완점검: S.loadedDocId가 GL 문서 ID인 경우
      const isGLFollowup = S.loadedDocId && S.glFollowupIds && S.glFollowupIds.length > 0;

      // 팀장 최초점검: SV 문서 없어도 독립 문서로 저장
      if (S.inspType === "최초" && !S.loadedDocId) {
        // TL 최초점검 N값 유무 확인
        const tlNCount = Object.values(S.answers).filter(a => a.value === "N").length;
        const tlPayload = {
          storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
          writerName: S.writerName, visitDate: S.visitDate,
          role: "tl", inspType: "최초",
          answers: S.answers, tlAnswers: S.answers,
          tlWriterName: S.writerName, tlVisitDate: S.visitDate,
          createdAt: new Date(),
          // N없음: 팀장확인 불필요 → 그룹장확인 자동 이동
          // N있음: 보완점검 필요 → SV/팀장 보완점검 목록 노출
          tlConfirmed: tlNCount === 0,
          tlConfirmerName: tlNCount === 0 ? S.writerName : null,
          tlConfirmedAt: tlNCount === 0 ? new Date().toISOString() : null,
        };
        console.log("[submitForm] TL addDoc 시작...");
        const tlRef = await addDoc(collection(db,currentSurveyCollection()), tlPayload);
        console.log("[submitForm] TL addDoc 완료:", tlRef.id);
        S.loadedDocId = tlRef.id;
        
      }

      if (!S.loadedDocId && S.inspType !== "최초") {
        // 보완점검: fallback으로 SV 최초점검 문서 재탐색
        const fbQ = query(collection(db,currentSurveyCollection()),
          where("storeCode","==",S.storeCode),
          where("role","==","sv"),
          orderBy("createdAt","desc"));
        const fbSnap = await getDocs(fbQ);
        fbSnap.forEach(d => {
          const data = d.data();
          if (!S.loadedDocId && (data.inspType==="최초"||!data.inspType)) S.loadedDocId = d.id;
        });
      }

      if (S.loadedDocId) {
        const updatePayload = {
          [`${prefix}WriterName`]: S.writerName,
          [`${prefix}VisitDate`]: S.visitDate,
          [`${prefix}Answers`]: S.answers,
          [`${prefix}UpdatedAt`]: new Date(),
        };
        // 반려 이후 재보완점검 제출 시 반려 상태 해제 (반려 사유/이력 필드는 보존)
        if (S.inspType === "보완") {
          updatePayload.tlRejected = false;
          updatePayload.glRejected = false;
          updatePayload.followupHistory = arrayUnion({
            event: "submit_tl",
            writerName: S.writerName,
            at: new Date(),
            answers: S.answers,
          });
        }
        // SV 문서 기반 TL 보완점검: followupSvAnswers에도 저장 (세트 종결 호환)
        if (!isGLFollowup && S.inspType === "보완") {
          updatePayload.followupSvAnswers = S.answers;
          updatePayload.followupSvWriterName = S.writerName;
          updatePayload.followupSvVisitDate = S.visitDate;
        }
        // GL 문서 기반 보완점검: 완료 후 그룹장 확인 대기로 설정
        if (isGLFollowup) {
          updatePayload.tlConfirmed = true;
          updatePayload.tlConfirmerName = S.writerName;
          updatePayload.tlConfirmedAt = new Date().toISOString();
          // PRE-POST 비교를 위한 팀장 보완점검 답변 별도 저장
          updatePayload.followupTlAnswers = S.answers;
          updatePayload.followupTlWriterName = S.writerName;
          updatePayload.followupTlVisitDate = S.visitDate;
        }
        await updateDoc(doc(db,currentSurveyCollection(),S.loadedDocId), updatePayload);
      } else {
        alert("연결된 점검 문서를 찾을 수 없습니다.\n보완점검의 경우 SV가 먼저 최초점검을 완료해야 합니다.");
        if(btn){btn.disabled=false;btn.textContent="점검 제출하기";}
        return;
      }
    }
    // 그룹장 → 독립 문서로 저장 (SV 점검 여부 무관)
    else if (effectiveRole==="gl") {
      const glNItems = Object.values(S.answers).filter(a=>a.value==="N").length;
      // GL 직접 매핑: GL Q1~Q9 → SV Q1~Q9, GL Q11 → SV Q16, GL Q10 → 없음
      const glNIds = Object.entries(S.answers)
        .filter(([,v]) => v.value === "N")
        .map(([k]) => Number(k));

      const svFollowupIds = [];
      glNIds.forEach(glId => {
        if (glId >= 1 && glId <= 9) {
          // GL Q1~Q9 → SV Q1~Q9 직접 매핑
          svFollowupIds.push(glId);
        } else if (glId === 11) {
          // GL Q11(사입관리) → SV Q16(사입관리)
          svFollowupIds.push(16);
        }
        // GL Q10 → 보완점검 없음 (이력만 남김)
      });
      // 중복 제거
      const svFollowupIdsUniq = [...new Set(svFollowupIds)];
      // GL Q10 N여부 기록 (이력용)
      const glQ10IsN = glNIds.includes(10);

      const glPayload = {
        storeCode: S.storeCode,
        storeName: S.storeName,
        storeTeam: S.storeTeam,
        writerName: S.writerName,
        visitDate: S.visitDate,
        role: "gl",
        inspType: "최초",
        answers: S.answers,
        glAnswers: S.answers,
        createdAt: new Date(),
        glNItems: glNItems,
        svFollowupIds: svFollowupIdsUniq,   // 팀장 보완점검 시 표시할 SV 문항 ID
        glQ10IsN: glQ10IsN,                 // GL Q10(품질) N이력
      };
      // Q10 제외 N항목 수 (Q10은 보완없이 이력만)
      const glNItemsExcl10 = glNIds.filter(id => id !== 10).length;
      // Q10 제외 N없음 → 자동 최종확인 (Q10 N이력은 payload에 기록됨)
      if (glNItemsExcl10 === 0) {
        glPayload.finalConfirmed = true;
        glPayload.finalConfirmedAt = new Date().toISOString();
        glPayload.glAutoConfirmed = true;
        glPayload.tlConfirmed = true;
        glPayload.tlConfirmerName = "그룹장(자동승인)";
        glPayload.tlConfirmedAt = new Date().toISOString();
      }
      // Q10 제외 N있음 → 팀장 보완점검 노출
      if (glNItemsExcl10 > 0) {
        glPayload.glRejected = true;
        glPayload.glRejectedReason = `그룹장 최초점검 N항목 ${glNItemsExcl10}건${glQ10IsN?" (품질 N이력 포함)":""}`;
        glPayload.glRejectedAt = new Date().toISOString();
        glPayload.glRejectedBy = S.writerName;
      }
      console.log("[submitForm] GL addDoc 시작...");
      const glRef = await addDoc(collection(db,currentSurveyCollection()), glPayload);
      console.log("[submitForm] GL addDoc 완료:", glRef.id);
      S.loadedDocId = glRef.id;
      
    }

    // 제출 완료 후 홈으로
    const nItemCount = Object.values(S.answers).filter(a=>a.value==="N").length;
    const isGL = effectiveRole === "gl";
    const isAutoConfirm = isGL && nItemCount === 0;

    const glQ10N = isGL && Object.entries(S.answers).some(([k,v]) => Number(k)===10 && v.value==="N");
    const glExcl10N = isGL ? Object.entries(S.answers).filter(([k,v]) => Number(k)!==10 && v.value==="N").length : 0;

    if (isAutoConfirm) {
      if (glQ10N) {
        alert("✅ 점검 제출 완료!\n최종확인 처리되었습니다.\n※ Q10(품질) N 이력이 기록되었습니다.");
      } else {
        alert("✅ 점검 제출 완료!\n이상 없어 최종확인 처리되었습니다.");
      }
    } else if (isGL && glExcl10N > 0) {
      const q10msg = glQ10N ? "\n※ Q10(품질) N 이력도 기록되었습니다." : "";
      alert(`✅ 점검 제출 완료!\nN항목 ${glExcl10N}건 - 담당 팀장 보완점검 목록에 노출됩니다.${q10msg}`);
    } else {
      alert("✅ 점검 제출 완료!");
    }
    sessionClear(); // 제출 완료 시 세션 삭제
    _compareCache.clear();
    if (S.category === "np") {
      cacheInvalidate("dashboardNP");
    } else {
      invalidateSurveyCaches();
    }
    window._dashTab = "전체";
    window._dashFilter = null;
    S.history = [];
    go(S.category === "np" ? "homeNP" : "home");
  } catch(e) {
    alert("저장 오류: "+e.message);
    if(btn) { btn.disabled=false; btn.textContent="점검 제출하기"; }
  }
}

// ── COMPARE ────────────────────────────────────────
async function loadCompareData(docId) {
  if (!docId) { S.compareData = null; return; }
  // 방법3: 세션 내 캐시 확인
  if (_compareCache.has(docId)) {
    S.compareData = _compareCache.get(docId);
    return;
  }
  try {
    const docSnap = await getDoc(doc(db,"surveys",docId));
    if (docSnap.exists()) {
      S.compareData = { id: docSnap.id, ...docSnap.data() };
      _compareCache.set(docId, S.compareData);
    } else {
      S.compareData = null;
    }
  } catch(e) {
    // 3. getDoc 실패 시 (보안규칙 차단 등): role별 전체 조회에서 탐색
    try {
      const [s1,s2,s3] = await Promise.all([
        getDocs(query(collection(db,"surveys"), where("role","==","sv"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","tl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","gl"), where("createdAt",">=",_dashFromTs()), orderBy("createdAt","desc"))),
      ]);
      let found = null;
      [s1,s2,s3].forEach(snap => snap.forEach(d => { if(d.id===docId) found={id:d.id,...d.data()}; }));
      S.compareData = found;
    } catch(e2) {
      console.error("loadCompareData 오류:", e2.message);
      S.compareData = null;
    }
  }
}

          <input id="glRejectReason" class="input-field" type="text" placeholder="반려 사유 입력" />
          <button class="btn-gl-reject" onclick="rejectGL()">🚫 반려</button>
        </div>` : `
        <div class="notice-box">🕐 그룹장 확인 대기 중입니다</div>`}
        <button class="btn-ghost" onclick="goBack()">돌아가기</button>
      </div>`;
  } else if (d2 && isClean2 && !d2.tlConfirmed) {
    const rejNotice = (d2.tlRejected || d2.glRejected) ? `
      <div class="reject-notice">
        🚫 ${d2.glRejected ? "그룹장" : "팀장"} 반려
        <div class="reject-reason">반려사유: ${d2.glRejected ? (d2.glRejectedReason||"") : (d2.tlRejectedReason||"")}</div>
      </div>` : "";
    html += `
      <div class="card-section">
        ${rejNotice}
        ${["tl","admin"].includes(_authRole) ? `
        <label class="field-label">결재의견 <span style="font-size:11px;color:#718096">(선택)</span></label>
        <input id="tlNameInput" class="input-field" type="text" placeholder="결재의견 입력 (생략 가능)" />
        <button class="btn-tl-confirm" onclick="confirmTL()">📋 팀장 확인 완료</button>
        <div class="reject-section">
          <label class="field-label" style="margin-top:8px">반려 사유</label>
          <input id="tlRejectReason" class="input-field" type="text" placeholder="반려 사유 입력" />
          <button class="btn-tl-reject" onclick="rejectTL()">🚫 반려</button>
        </div>` : `
        <div class="notice-box">🕐 담당 팀장 확인 대기 중입니다</div>`}
        <button class="btn-ghost" onclick="goBack()">돌아가기</button>
      </div>`;
  } else {
    // N있고 보완점검 미실시(또는 보완했지만 여전히 N) → 보완점검 시작 버튼
    // (반려 상태면 반려 안내도 함께 표시)
    const nPending = d2 ? Object.values(d2.answers||{}).filter(a=>a.value==="N").length : 0;
    const stillNAfterFollowup = followupN2 > 0; // 보완점검을 했지만 여전히 N인 경우
    const rejNotice2 = d2 && (d2.tlRejected || d2.glRejected) ? `
      <div class="reject-notice">
        🚫 ${d2.glRejected ? "그룹장" : "팀장"} 반려
        <div class="reject-reason">반려사유: ${d2.glRejected ? (d2.glRejectedReason||"") : (d2.tlRejectedReason||"")}</div>
      </div>` : "";
    const isClosedStore = d2 && (window._closedMap||new Map()).has(d2.storeCode);
    if (nPending > 0 || stillNAfterFollowup) {
      html += `
        <div class="card-section">
          ${rejNotice2}
          <div class="notice-box" style="background:#FFFBEB;border-color:#F6AD57;color:#744210">
            ⚠️ N항목 ${stillNAfterFollowup ? followupN2 : nPending}건 — ${stillNAfterFollowup ? "보완점검 후에도 " : ""}보완점검이 필요합니다
          </div>
          ${isClosedStore
            ? `<div class="notice-box" style="background:#FFF5F5;border-color:#FEB2B2;color:#742A2A">🚫 폐점된 매장입니다 — 보완점검을 진행할 수 없습니다</div>
               <button class="btn-ghost" disabled style="opacity:.5;cursor:not-allowed" title="폐점된 매장은 보완점검을 시작할 수 없습니다">📋 보완점검 시작</button>`
            : `<button class="btn-primary" onclick="startSvFollowupFromRecord()">📋 보완점검 시작</button>`}
          <button class="btn-ghost" onclick="goBack()">돌아가기</button>
        </div>`;
    } else {
      html += `<div class="card-section">${rejNotice2}<button class="btn-primary" onclick="goBack()">돌아가기</button></div>`;
    }
  }
  root.innerHTML = html;
}

// 점검 상세/비교 화면에서 바로 보완점검을 시작할 때, 진입 경로(매장검색 흐름 vs 기록 조회 흐름)와
// 무관하게 필요한 상태값을 항상 로드된 레코드(compareData) 기준으로 정확히 채워준다.
// (기존엔 S.prevNItems 등이 매장검색→보완점검 흐름에서만 채워져서, 점검내역조회로 바로 들어온
//  경우 이 값들이 비어있어 보완점검 시작 버튼이 정상 동작하지 않는 문제가 있었음)
function startSvFollowupFromRecord() {
  const d2 = S.compareData;
  if (!d2) { alert("점검 데이터를 불러올 수 없습니다."); return; }
  S.category = "default";
  S.role = ["sv","tl"].includes(_authRole) ? _authRole : "sv";
  S.storeCode = d2.storeCode;
  S.storeName = d2.storeName;
  S.storeTeam = d2.storeTeam;
  S.storeObj = window._activeStores?.find(s => s.code === d2.storeCode) || S.storeObj;
  S.inspType = "보완";
  S.writerName = _authName;
  S.loadedDocId = d2.id;
  S.answers = {};
  // 재점검 대상: 가장 최근 보완점검 결과가 있으면 그 기준, 없으면 최초점검 기준으로 "아직 N인 항목"만
  const latestAnswers = d2.followupSvAnswers || d2.followupTlAnswers || d2.answers || {};
  S.prevNItems = Object.entries(latestAnswers)
    .filter(([,v]) => v.value === "N")
    .map(([k]) => Number(k));
  S.glFollowupIds = (d2.svFollowupIds || []).filter(id => !S.prevNItems.includes(id));
  go("info");
}

// ── 데이터 정리: 반려 후 재보완점검을 했는데도 tlRejected/glRejected가 안 풀린 건 찾기/수정 ──
// 판별 기준: tlRejected(또는 glRejected)===true 인데 followupSvAnswers/followupTlAnswers에 실제 값이 있으면
// "재보완점검은 했는데 플래그만 안 풀린 버그 건"으로 간주. 재보완점검이 아직 없는 건(진짜 미해결)은 건드리지 않음.
function _hasContent(obj) {
  return !!obj && typeof obj === "object" && Object.keys(obj).length > 0;
}

async function scanRejectedFlagIssues() {
  const resultEl = document.getElementById("rejCleanupResult");
  resultEl.innerHTML = `<div style="font-size:12px;color:#718096">검색 중...</div>`;
  try {
    const [tlSnap, glSnap] = await Promise.all([
      getDocs(query(collection(db,"surveys"), where("tlRejected","==",true))),
      getDocs(query(collection(db,"surveys"), where("glRejected","==",true))),
    ]);
    const targets = new Map(); // docId -> {storeName, storeCode, updates}
    tlSnap.forEach(d => {
      const data = d.data();
      if (_hasContent(data.followupSvAnswers) || _hasContent(data.followupTlAnswers)) {
        targets.set(d.id, { storeName: data.storeName, storeCode: data.storeCode, updates: { tlRejected: false } });
      }
    });
    glSnap.forEach(d => {
      const data = d.data();
      if (_hasContent(data.followupSvAnswers) || _hasContent(data.followupTlAnswers)) {

        else targets.set(d.id, { storeName: data.storeName, storeCode: data.storeCode, updates: { glRejected: false } });

    if (targets.size === 0) {
      resultEl.innerHTML = `<div style="font-size:12px;color:#276749">✅ 수정 대상이 없습니다.</div>`;

// ── 데이터 정리: 그룹장 Q10(품질) 단독 N 자동확인 로직 도입 이전 legacy 데이터 보정 ──
// 대상 판별 기준(getGlSetStatus의 "legacy_미확인" 상태와 동일): finalConfirmed가 아니고,
// glRejected도 아니고, tlConfirmed도 아닌데, Q10 제외 N이 0건인 GL 문서.
// 정상 플로우라면 이 조합은 있을 수 없음 — submitForm의 자동확인 로직(2452행) 도입 이전 데이터만 해당.
async function scanLegacyGLQ10Issues() {
  const resultEl = document.getElementById("glQ10CleanupResult");
  resultEl.innerHTML = `<div style="font-size:12px;color:#718096">검색 중...</div>`;
  try {
    const glSnap = await getDocs(query(collection(db,"surveys"), where("role","==","gl")));
    const targets = new Map(); // docId -> {storeName, storeCode, q10IsN, updates}
    glSnap.forEach(d => {
      const data = d.data();
      if (data.finalConfirmed === true) return; // 이미 완료된 건은 건드리지 않음
      if (data.glRejected === true) return;      // 정상적으로 보완점검 대기 중인 건은 건드리지 않음
      if (data.tlConfirmed === true) return;      // 이미 팀장확인 거쳐 그룹장확인 대기 중인 건은 건드리지 않음
      const glA = data.glAnswers || data.answers || {};
      const nExcl10 = Object.entries(glA).filter(([k,v]) => Number(k) !== 10 && v && v.value === "N").length;
      if (nExcl10 > 0) return; // Q10 외 N 있는 정상 보완필요 건 — 건드리지 않음
      const q10IsN = Object.entries(glA).some(([k,v]) => Number(k) === 10 && v && v.value === "N");
      targets.set(d.id, {
        storeName: data.storeName, storeCode: data.storeCode, q10IsN,
        updates: {
          finalConfirmed: true,
          finalConfirmedAt: new Date().toISOString(),
          glAutoConfirmed: true,
          glAutoConfirmedByMigration: true, // 소급 보정으로 처리됐음을 구분 표시
          tlConfirmed: true,
          tlConfirmerName: "그룹장(자동승인·소급보정)",
          tlConfirmedAt: new Date().toISOString(),
          glQ10IsN: q10IsN,
        },
      });
    });

    window._glQ10CleanupTargets = targets;

    if (targets.size === 0) {
      resultEl.innerHTML = `<div style="font-size:12px;color:#276749">✅ 보정 대상이 없습니다.</div>`;
      return;
    }

    const listHtml = [...targets.entries()].map(([id, t]) =>
      `<div style="font-size:12px;color:#4A5568;padding:4px 0;border-bottom:1px solid #FEEBC8">${t.storeName||"(매장명없음)"} (${t.storeCode||"-"})${t.q10IsN?' <span style="color:#C53030">· Q10 N이력 포함</span>':''}</div>`
    ).join("");

    resultEl.innerHTML = `
      <div style="font-size:13px;font-weight:600;color:#744210;margin-bottom:6px">${targets.size}건 발견</div>
      <div style="max-height:160px;overflow-y:auto;background:white;border-radius:6px;padding:8px 10px;margin-bottom:10px">${listHtml}</div>
      <button class="btn-primary" onclick="applyLegacyGLQ10Fix()" style="background:#DD6B20">이 ${targets.size}건 일괄 최종확인 처리하기</button>`;
  } catch(e) {
    resultEl.innerHTML = `<div style="font-size:12px;color:#C53030">오류: ${e.message}</div>`;
  }
}

      _photoSettings = snap.data();
      console.log("[loadPhotoSettings] Firestore 로드 성공:", JSON.stringify(_photoSettings));
      // 로드된 설정에 없는 키는 기본값 true로 채움
      SV_QUESTIONS.forEach(q => {
        if (!(`Q${q.id}` in _photoSettings)) _photoSettings[`Q${q.id}`] = true;
      });
      GL_QUESTIONS.forEach(q => {
        if (!(`GL_Q${q.id}` in _photoSettings)) _photoSettings[`GL_Q${q.id}`] = true;
      });
    } else {
      // 기본값: Q1~Q16 모두 사진 필수
      _photoSettings = {};
      SV_QUESTIONS.forEach(q => { _photoSettings[`Q${q.id}`] = true; });
      GL_QUESTIONS.forEach(q => { _photoSettings[`GL_Q${q.id}`] = true; });
    }
  } catch(e) {
    console.warn("photoSettings 로드 실패:", e.message);
    // 로드 실패 시 기본값 (모두 필수)
    _photoSettings = {};
    SV_QUESTIONS.forEach(q => { _photoSettings[`Q${q.id}`] = true; });
    GL_QUESTIONS.forEach(q => { _photoSettings[`GL_Q${q.id}`] = true; });
  }
  _photoSettingsLoaded = true;
}

// ── 세션 저장/복원 (답변 유지) ────────────────────
const SESSION_KEY = "momstouch_insp_session";

function sessionSave() {
  if (!S.role || !S.storeCode) return; // 점검 중이 아니면 저장 안 함
  try {
    const data = {
      screen:      S.screen,
      role:        S.role,
      category:    S.category,
      inspType:    S.inspType,
      writerName:  S.writerName,
      storeCode:   S.storeCode,
      storeName:   S.storeName,
      storeTeam:   S.storeTeam,
      visitDate:   S.visitDate,
      answers:     S.answers,
      npAnswers:   S.npAnswers,
      spacoolAnswers: S.spacoolAnswers,
      loadedDocId: S.loadedDocId,
      prevNItems:  S.prevNItems,
      storeObj:    S.storeObj,
      savedAt:     Date.now(),
    };
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(data));
  } catch(e) { /* 용량 초과 등 무시 */ }
}

function sessionRestore() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    // 6시간 이상 된 세션은 무시
    if (Date.now() - data.savedAt > 6 * 60 * 60 * 1000) {
      sessionStorage.removeItem(SESSION_KEY);
      return false;
    }
    // 점검 진행 중이었던 경우만 복원
    const inspScreens = ["form","info","storeSel","inspType","compare"];
    if (!inspScreens.includes(data.screen)) return false;
    S.role       = data.role;
    S.category   = data.category || "default";
    S.inspType   = data.inspType;
    S.writerName = data.writerName;
    S.storeCode  = data.storeCode;
    S.storeName  = data.storeName;
    S.storeTeam  = data.storeTeam;
    S.visitDate  = data.visitDate;
    S.answers    = data.answers || {};
    S.npAnswers  = data.npAnswers || null;
    S.spacoolAnswers = data.spacoolAnswers || null;
    S.loadedDocId= data.loadedDocId;
    S.prevNItems = data.prevNItems || [];
    S.storeObj   = data.storeObj || null;
    return true;
  } catch(e) { return false; }
}

function sessionClear() {
  sessionStorage.removeItem(SESSION_KEY);
}

async function doChangePw() {
  const curPw  = document.getElementById("curPw")?.value;
  const newPw  = document.getElementById("newPw")?.value;
  const newPw2 = document.getElementById("newPw2")?.value;
  const errEl  = document.getElementById("pwErr");
  const okEl   = document.getElementById("pwOk");
  errEl.style.display = "none";
  okEl.style.display  = "none";

  if (!curPw || !newPw || !newPw2) {
    errEl.textContent = "모든 항목을 입력해주세요."; errEl.style.display = "block"; return;
  }
  if (newPw.length < 6) {
    errEl.textContent = "새 비밀번호는 6자 이상이어야 합니다."; errEl.style.display = "block"; return;
  }
  if (newPw !== newPw2) {
    errEl.textContent = "새 비밀번호가 일치하지 않습니다."; errEl.style.display = "block"; return;
  }

  const btn = document.querySelector("#app .btn-primary");
  if (btn) { btn.disabled=true; btn.textContent="변경 중..."; }

  const result = await authChangePassword(curPw, newPw);
  if (btn) { btn.disabled=false; btn.textContent="변경하기"; }

  if (result.ok) {
    okEl.style.display = "block";
    document.getElementById("curPw").value  = "";
    document.getElementById("newPw").value  = "";
    document.getElementById("newPw2").value = "";
    setTimeout(() => goBack(), 1500);
  } else {
    errEl.textContent = result.msg;
    errEl.style.display = "block";
  }
}

async function authChangePassword(currentPw, newPw) {
  if (!_currentUser) return { ok: false, msg: "로그인이 필요합니다." };
  try {
    const cred = EmailAuthProvider.credential(_currentUser.email, currentPw);
    await reauthenticateWithCredential(_currentUser, cred);
    await updatePassword(_currentUser, newPw);
    return { ok: true };
  } catch(e) {
    return { ok: false, msg: e.code === "auth/invalid-credential" ? "현재 비밀번호가 올바르지 않습니다." : e.message };
  }
}

// ── Firebase Storage 함수 ──────────────────────────
// 이미지 업로드: base64 → Storage URL 변환
async function uploadImageToStorage(base64, path) {
  try {
    // base64 → Blob 변환
    const res  = await fetch(base64);
    const blob = await res.blob();
    const ref  = storageRef(storage, path);
    await uploadBytes(ref, blob);
    const url  = await getDownloadURL(ref);
    return { ok: true, url };
  } catch(e) {
    console.error("Storage 업로드 오류:", e.message);
    return { ok: false, url: null };
  }
}

// 이미지 삭제: Storage URL → 파일 삭제
async function deleteImageFromStorage(url) {
  try {
    const ref = storageRef(storage, url);
    await deleteObject(ref);
    return { ok: true };
  } catch(e) {
    // 파일 없어도 무시 (이미 삭제됐거나 base64 방식 구버전)
    return { ok: true };
  }
}

// 이미지 URL 정규화: base64 또는 Storage URL 모두 처리
function normalizeImageUrl(image) {
  if (!image) return null;
  if (image.startsWith("data:") || image.startsWith("http")) return image;
  return "data:image/jpeg;base64," + image;
}

// ── 이미지 필드 제거 (목록 조회 최적화) ──────────────
// 목록/대시보드: 이미지 불필요 → 제거하여 메모리/속도 개선
// 상세보기: getDoc으로 이미지 포함 전체 문서 별도 조회
function stripImages(records) {
  return records.map(r => {
    const stripped = { ...r };
    // answers 내 이미지 제거
    if (stripped.answers) {
      stripped.answers = Object.fromEntries(
        Object.entries(stripped.answers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.followupSvAnswers) {
      stripped.followupSvAnswers = Object.fromEntries(
        Object.entries(stripped.followupSvAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.followupTlAnswers) {
      stripped.followupTlAnswers = Object.fromEntries(
        Object.entries(stripped.followupTlAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.tlAnswers) {
      stripped.tlAnswers = Object.fromEntries(
        Object.entries(stripped.tlAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.glAnswers) {
      stripped.glAnswers = Object.fromEntries(
        Object.entries(stripped.glAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    return stripped;
  });
}

// 방법1: 대시보드/점검내역 쿼리용 90일 기준 Date 반환
function _dashFromTs() {
  const d = new Date();
  d.setDate(d.getDate() - 90);
  d.setHours(0, 0, 0, 0);
  return d;
}
function cacheGet(key) {
  const c = _cache[key];
  if (!c || !c.data) return null;
  if (c.ttl && (Date.now()/1000 - c.ts) > c.ttl) { c.data = null; return null; }
  return c.data;
}
function cacheSet(key, data) {
  if (_cache[key]) { _cache[key].data = data; _cache[key].ts = Date.now()/1000; }
}
function cacheInvalidate(key) {
  if (_cache[key]) { _cache[key].data = null; _cache[key].ts = 0; }
}

// 신규플랫폼 점검 문서(surveys)가 바뀌는 모든 지점(제출/팀장확인/팀장반려/그룹장확인/그룹장반려)에서
// 공통으로 호출하는 캐시 무효화 함수. 예전엔 각 함수가 이 3줄을 개별로 복사해서 갖고 있었고,
// 그래서 rejectGL()처럼 한 곳이 통째로 빠지거나, 4곳 전부 followup 캐시 무효화가 누락되는 등의
// 버그가 있었음 — 이제 이 함수 하나만 고치면 모든 호출부에 일괄 반영됨.
function invalidateSurveyCaches() {

  cacheInvalidate("records");
