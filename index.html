// ── DASHBOARD ────────────────────────────────────────
async function renderDashboard(root) {
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">←</button>
      <h2>관리자 대시보드</h2>
      <button class="btn-excel" onclick="downloadExcel()">⬇️ Excel</button>
    </div>
    <div style="padding:20px;text-align:center;color:#718096">데이터 불러오는 중...</div>`;

  try {
    const q = query(collection(db, "surveys"), where("role", "==", "sv"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const records = [];
    snap.forEach(d => records.push({ id: d.id, ...d.data() }));
    window._dashRecords = records;

    const total   = records.length;
    const doneTL  = records.filter(r => r.tlAnswers).length;
    const doneGL  = records.filter(r => r.glAnswers).length;
    const doneAll = records.filter(r => r.tlAnswers && r.glAnswers).length;
    const pending = records.filter(r => !r.tlAnswers || !r.glAnswers).length;

    let rows = records.map(r => {
      const dt  = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleDateString("ko-KR") : "-";
      const tlOk = r.tlAnswers ? `<span class="badge-ok">✅ 완료</span>` : `<span class="badge-pend">⏳ 미완</span>`;
      const glOk = r.glAnswers ? `<span class="badge-ok">✅ 완료</span>` : `<span class="badge-pend">⏳ 미완</span>`;
      return `<tr onclick="viewRecordDash('${r.id}')" style="cursor:pointer">
        <td>${r.storeName}</td>
        <td>${r.writerName}<br><span style="font-size:11px;color:#718096">${dt}</span></td>
        <td>${tlOk}<br><span style="font-size:11px;color:#718096">${r.tlWriterName || ""}</span></td>
        <td>${glOk}<br><span style="font-size:11px;color:#718096">${r.glWriterName || ""}</span></td>
      </tr>`;
    }).join("");

    root.innerHTML = `
      <div class="page-header">
        <button class="btn-back" onclick="go('home')">←</button>
        <h2>관리자 대시보드</h2>
        <button class="btn-excel" onclick="downloadExcel()">⬇️ Excel</button>
      </div>
      <div class="dash-stats">
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체 점검</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#38A169">${doneAll}</div><div class="stat-label">3자 완료</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#D69E2E">${doneTL}</div><div class="stat-label">팀장 완료</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#805AD5">${doneGL}</div><div class="stat-label">그룹장 완료</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#E53E3E">${pending}</div><div class="stat-label">미완료</div></div>
      </div>
      <div class="dash-table-wrap">
        <table class="dash-table">
          <thead><tr><th>매장명</th><th>SV</th><th>팀장</th><th>그룹장</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="4" style="text-align:center;padding:20px;color:#718096">점검 데이터 없음</td></tr>'}</tbody>
        </table>
      </div>`;
  } catch(e) {
    root.innerHTML += `<p style="padding:20px;color:#E53E3E">오류: ${e.message}</p>`;
  }
}

  if (found) { state.compareData = found; state.loadedDocId = docId; go("compare"); }
}

// ── EXCEL DOWNLOAD ───────────────────────────────────
async function downloadExcel() {
  const records = window._dashRecords;
  if (!records || records.length === 0) { alert("다운로드할 데이터가 없습니다."); return; }

  const roleLabels = { sv: "수퍼바이저", tl: "팀장", gl: "그룹장" };
  const rows = [];

  // 헤더
  const svHeaders  = SV_QUESTIONS.map(q => `[SV] Q${q.id} ${q.title}`);
  const tlHeaders  = SV_QUESTIONS.map(q => `[팀장] Q${q.id} ${q.title}`);
  const glHeaders  = GL_QUESTIONS.map(q => `[그룹장] Q${q.id} ${q.title}`);
  rows.push(["매장명", "역할", "점검자", "방문일시", ...svHeaders, ...tlHeaders, ...glHeaders]);

  records.forEach(r => {
    const svVals = SV_QUESTIONS.map(q => r.answers?.[q.id]?.value || "");
    const tlVals = SV_QUESTIONS.map(q => r.tlAnswers?.[q.id]?.value || "");
    const glVals = GL_QUESTIONS.map(q => r.glAnswers?.[q.id]?.value || "");

    // SV 행
    rows.push([r.storeName, "수퍼바이저", r.writerName, fmtDate(r.visitDate), ...svVals, ...Array(SV_QUESTIONS.length).fill(""), ...Array(GL_QUESTIONS.length).fill("")]);
    // 팀장 행
    if (r.tlAnswers) {
      rows.push([r.storeName, "팀장", r.tlWriterName || "", fmtDate(r.tlVisitDate), ...Array(SV_QUESTIONS.length).fill(""), ...tlVals, ...Array(GL_QUESTIONS.length).fill("")]);
    }
    // 그룹장 행
    if (r.glAnswers) {
      rows.push([r.storeName, "그룹장", r.glWriterName || "", fmtDate(r.glVisitDate), ...Array(SV_QUESTIONS.length).fill(""), ...Array(SV_QUESTIONS.length).fill(""), ...glVals]);
    }
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 컬럼 너비
  ws["!cols"] = [
    {wch:16},{wch:10},{wch:10},{wch:18},
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(GL_QUESTIONS.length).fill({wch:10}),
  ];

  XLSX.utils.book_append_sheet(wb, ws, "점검이력");
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `신규플랫폼_점검이력_${today}.xlsx`);
}

async function searchRecords() {
  const storeName = document.getElementById("searchStore").value.trim();
  if (!storeName) { alert("매장명을 입력해주세요."); return; }
  const resultDiv = document.getElementById("searchResult");
  resultDiv.innerHTML = `<p class="loading-text">검색 중...</p>`;
  try {
    const q = query(collection(db, "surveys"), where("storeName", "==", storeName), where("role", "==", "sv"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    if (snap.empty) { resultDiv.innerHTML = `<p class="error-text">해당 매장의 SV 점검 내역이 없습니다.</p>`; return; }
    let html = `<div class="search-list">`;
    snap.forEach(d => {
      const data = d.data();
      const dt = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString("ko-KR") : "-";
      html += `<div class="search-item" onclick="loadRecord('${d.id}')">
        <div class="si-store">${data.storeName}</div>
        <div class="si-meta">${data.writerName} · ${dt}</div>
        <div class="si-arrow">→</div></div>`;
    });
    resultDiv.innerHTML = html + `</div>`;
  } catch(e) { resultDiv.innerHTML = `<p class="error-text">오류: ${e.message}</p>`; }
}

async function loadRecord(docId) {
  try {
    const snap = await getDocs(collection(db, "surveys"));
    let found = null;
    snap.forEach(d => { if (d.id === docId) found = d; });
    if (!found) { alert("레코드를 불러올 수 없습니다."); return; }
    state.loadedDocId = docId;
    state.loadedRecord = found.data();
    state.storeName = state.loadedRecord.storeName;
    go("info");
  } catch(e) { alert("오류: " + e.message); }
}

// ── INFO ─────────────────────────────────────────────
function renderInfo(root) {
  const roleLabel = { sv: "수퍼바이저", tl: "팀장", gl: "그룹장" }[state.role];
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('role')">←</button>
      <h2>기본 정보 입력</h2>
    </div>
    <div class="card-section">
      <div class="role-badge">${roleLabel}</div>
      <label class="field-label">방문 매장명</label>
      <input id="storeName" class="input-field" type="text" placeholder="매장명 입력"
        value="${state.storeName}" ${state.role !== "sv" ? "readonly" : ""} />
      <label class="field-label">점검자 이름</label>
      <input id="writerName" class="input-field" type="text" placeholder="이름 입력" value="${state.writerName}" />
      <label class="field-label">방문 일시</label>
      <input id="visitDate" class="input-field" type="datetime-local" value="${nowDateTimeLocal()}" />
      <button class="btn-primary" onclick="startForm()">점검 시작</button>
    </div>`;
}

function startForm() {
  const sn = document.getElementById("storeName").value.trim();
  const wn = document.getElementById("writerName").value.trim();
  const vd = document.getElementById("visitDate").value;
  if (!sn || !wn) { alert("매장명과 이름을 입력해주세요."); return; }
  state.storeName = sn; state.writerName = wn; state.visitDate = vd;
  state.answers = {};
  go("form");
}

// ── FORM ─────────────────────────────────────────────
function renderForm(root) {
  const questions = state.role === "gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const roleLabel = { sv: "수퍼바이저", tl: "팀장", gl: "그룹장" }[state.role];
  let catSections = {};
  questions.forEach(q => { if (!catSections[q.category]) catSections[q.category] = []; catSections[q.category].push(q); });

  let html = `
    <div class="page-header sticky-header">
      <button class="btn-back" onclick="confirmBack()">←</button>
      <div class="header-info">
        <span class="header-store">${state.storeName}</span>
        <span class="header-role">${roleLabel}</span>
      </div>
    </div>
    <div class="form-body">
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
        <span id="progressText" class="progress-text">0 / ${questions.length}</span>
      </div>`;

  Object.entries(catSections).forEach(([cat, qs]) => {
    const color = CATEGORY_COLORS[cat] || "#718096";
    html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${cat}</div>`;
    qs.forEach(q => {
      const tag = q.tag ? `<span class="tag-badge" style="background:${color}20;color:${color}">${q.tag}</span>` : "";
      html += `
        <div class="question-card" id="qcard-${q.id}">
          <div class="q-header"><span class="q-num">Q${q.id}</span><span class="q-title">${q.title}</span>${tag}</div>
          <p class="q-desc">${q.desc}</p>
          <div class="answer-row">
            <button class="ans-btn" id="ans-${q.id}-Y"       onclick="setAnswer(${q.id},'Y')">✅ Y</button>
            <button class="ans-btn" id="ans-${q.id}-N"       onclick="setAnswer(${q.id},'N')">❌ N</button>
            <button class="ans-btn ans-na" id="ans-${q.id}-미취급" onclick="setAnswer(${q.id},'미취급')">➖ 미취급</button>
          </div>
          <div class="image-section" id="img-sec-${q.id}">
            <label class="img-upload-btn" for="img-${q.id}">📷 사진 첨부
              <input type="file" id="img-${q.id}" accept="image/*" capture="environment" style="display:none" onchange="handleImage(${q.id},this)">
            </label>
            <div id="img-preview-${q.id}"></div>
          </div>
        </div>`;
    });
  });

  html += `
      <div class="submit-section">
        <div id="submitWarning" class="submit-warning" style="display:none">⚠️ 아직 답변하지 않은 항목이 있습니다.</div>
        <button class="btn-submit" onclick="submitForm()">점검 제출하기</button>
      </div>
    </div>`;
  root.innerHTML = html;
  updateProgress();
}

function setAnswer(qId, value) {
  if (!state.answers[qId]) state.answers[qId] = { value: null, image: null };
  state.answers[qId].value = value;
  ["Y","N","미취급"].forEach(v => { const b = document.getElementById(`ans-${qId}-${v}`); if(b) b.classList.remove("selected"); });
  const sel = document.getElementById(`ans-${qId}-${value}`);
  if (sel) sel.classList.add("selected");
  const imgSec = document.getElementById(`img-sec-${qId}`);
  if (imgSec) imgSec.style.display = value === "미취급" ? "none" : "block";
  const card = document.getElementById(`qcard-${qId}`);
  if (card) card.classList.add("answered");
  updateProgress();
}

async function handleImage(qId, input) {
  const file = input.files[0]; if (!file) return;
  const compressed = await compressImage(file, 800, 0.7);
  if (!state.answers[qId]) state.answers[qId] = { value: null, image: null };
  state.answers[qId].image = compressed;
  const preview = document.getElementById(`img-preview-${qId}`);
  if (preview) preview.innerHTML = `
    <div class="preview-container">
      <img src="${compressed}" class="preview-img" onclick="openImageModal('${compressed}')">
      <button class="remove-img" onclick="removeImage(${qId})">✕</button>
    </div>`;
}

function removeImage(qId) {
  if (state.answers[qId]) state.answers[qId].image = null;
  const p = document.getElementById(`img-preview-${qId}`); if(p) p.innerHTML = "";
  const i = document.getElementById(`img-${qId}`); if(i) i.value = "";
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function updateProgress() {
  const questions = state.role === "gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const answered = questions.filter(q => state.answers[q.id]?.value).length;
  const pct = Math.round((answered / questions.length) * 100);
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressText");
  if (fill) fill.style.width = pct + "%";
  if (text) text.textContent = `${answered} / ${questions.length}`;
}

function openImageModal(src) {
  const modal = document.createElement("div");
  modal.className = "img-modal";
  modal.innerHTML = `<div class="img-modal-bg" onclick="this.parentElement.remove()"></div>
    <img src="${src}" class="img-modal-img">
    <button class="img-modal-close" onclick="this.parentElement.remove()">✕</button>`;
  document.body.appendChild(modal);
}

// ── SUBMIT ───────────────────────────────────────────
async function submitForm() {
  const questions = state.role === "gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const unanswered = questions.filter(q => !state.answers[q.id]?.value);
  if (unanswered.length > 0) {
    document.getElementById("submitWarning").style.display = "block";
    document.getElementById(`qcard-${unanswered[0].id}`)?.scrollIntoView({ behavior: "smooth" });
    return;
  }
  const btn = document.querySelector(".btn-submit");
  if (btn) { btn.disabled = true; btn.textContent = "저장 중..."; }
  try {
    const payload = {
      storeName: state.storeName, writerName: state.writerName,
      visitDate: state.visitDate, role: state.role,
      answers: state.answers, createdAt: new Date(),
      linkedSvDocId: state.loadedDocId || null,
    };
    if (state.role === "sv") {
      const ref = await addDoc(collection(db, "surveys"), payload);
      state.loadedDocId = ref.id;
    } else {
      const field = state.role === "tl" ? "tl" : "gl";
      await updateDoc(doc(db, "surveys", state.loadedDocId), {
        [`${field}WriterName`]: state.writerName,
        [`${field}VisitDate`]: state.visitDate,
        [`${field}Answers`]: state.answers,
        [`${field}UpdatedAt`]: new Date(),
      });
    }
    await loadCompareData(state.loadedDocId);
    go("compare");
  } catch(e) {
    alert("저장 오류: " + e.message);
    if (btn) { btn.disabled = false; btn.textContent = "점검 제출하기"; }
  }
}

// ── COMPARE ──────────────────────────────────────────
async function loadCompareData(docId) {
  const snap = await getDocs(collection(db, "surveys"));
  snap.forEach(d => { if (d.id === docId) state.compareData = { id: d.id, ...d.data() }; });
}

function renderCompare(root) {
  const d = state.compareData;
  if (!d) { root.innerHTML = `<p style="padding:20px">비교 데이터 없음</p>`; return; }
  const svA = d.answers || {}, tlA = d.tlAnswers || {}, glA = d.glAnswers || {};
  const hasTL = Object.keys(tlA).length > 0, hasGL = Object.keys(glA).length > 0;

  let html = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">🏠</button>
      <h2>점검 비교</h2>
    </div>
    <div class="compare-meta">
      <div class="meta-store">${d.storeName}</div>
      <div class="meta-sub">SV: ${d.writerName} · ${fmtDate(d.visitDate)}</div>
      ${hasTL ? `<div class="meta-sub">팀장: ${d.tlWriterName} · ${fmtDate(d.tlVisitDate)}</div>` : ""}
      ${hasGL ? `<div class="meta-sub">그룹장: ${d.glWriterName} · ${fmtDate(d.glVisitDate)}</div>` : ""}
    </div>`;

  let catCurrent = "";
  SV_QUESTIONS.forEach(q => {
    const color = CATEGORY_COLORS[q.category] || "#718096";
    if (q.category !== catCurrent) {
      catCurrent = q.category;
      html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
    }
    const sv = svA[q.id], tl = tlA[q.id], gl = glA[q.id];
    const svVal = sv?.value || "-", tlVal = tl?.value || (hasTL ? "-" : ""), glVal = gl?.value || (hasGL ? "-" : "");
    const changed = hasTL && sv?.value && tl?.value && sv.value !== tl.value;
    html += `
      <div class="compare-card ${changed ? "changed" : ""}">
        <div class="cc-title">Q${q.id} ${q.title} ${changed ? '<span class="change-badge">변경</span>' : ""}</div>
        <div class="cc-row">
          <div class="cc-cell">
            <div class="cc-role">SV</div>
            <div class="cc-val ${valClass(svVal)}">${svVal}</div>
            ${sv?.image ? `<img src="${sv.image}" class="cc-img" onclick="openImageModal('${sv.image}')">` : ""}
          </div>
          ${hasTL ? `<div class="cc-cell">
            <div class="cc-role">팀장</div>
            <div class="cc-val ${valClass(tlVal)}">${tlVal}</div>
            ${tl?.image ? `<img src="${tl.image}" class="cc-img" onclick="openImageModal('${tl.image}')">` : ""}
          </div>` : ""}
          ${hasGL && q.id <= 10 ? `<div class="cc-cell">
            <div class="cc-role">그룹장</div>
            <div class="cc-val ${valClass(glVal)}">${glVal}</div>
            ${gl?.image ? `<img src="${gl.image}" class="cc-img" onclick="openImageModal('${gl.image}')">` : ""}
          </div>` : ""}
        </div>
      </div>`;
  });

  html += `<div class="card-section"><button class="btn-primary" onclick="go('home')">홈으로</button></div>`;
  root.innerHTML = html;
}

function valClass(v) {
  return v === "Y" ? "val-y" : v === "N" ? "val-n" : v === "미취급" ? "val-na" : "";
}

// ── RECORDS ──────────────────────────────────────────
async function renderRecords(root) {
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('home')">←</button>
      <h2>점검 내역 조회</h2>
    </div>
    <div class="card-section">
      <input id="recSearch" class="input-field" type="text" placeholder="매장명으로 검색 (비우면 전체)" />
      <button class="btn-primary" onclick="fetchRecords()">검색</button>
      <div id="recList"></div>
    </div>`;
}

async function fetchRecords() {
  const keyword = document.getElementById("recSearch").value.trim();
  const recList = document.getElementById("recList");
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    let q;
    if (keyword) {
      q = query(collection(db, "surveys"), where("storeName", "==", keyword), where("role", "==", "sv"), orderBy("createdAt", "desc"));
    } else {
      q = query(collection(db, "surveys"), where("role", "==", "sv"), orderBy("createdAt", "desc"));
    }
    const snap = await getDocs(q);
    if (snap.empty) { recList.innerHTML = `<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="search-list">`;
    snap.forEach(d => {
      const data = d.data();
      const dt = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString("ko-KR") : "-";
      const tlOk = data.tlAnswers ? "✅ 팀장" : "⏳ 팀장 미완";
      const glOk = data.glAnswers ? "✅ 그룹장" : "⏳ 그룹장 미완";
      html += `<div class="search-item" onclick="viewRecord('${d.id}')">
        <div class="si-store">${data.storeName}</div>
        <div class="si-meta">SV: ${data.writerName} · ${dt}</div>
        <div class="si-tags"><span class="tag-sm">${tlOk}</span><span class="tag-sm">${glOk}</span></div>
        <div class="si-arrow">→</div></div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) { recList.innerHTML = `<p class="error-text">오류: ${e.message}</p>`; }
}

async function viewRecord(docId) {
  await loadCompareData(docId);
  state.loadedDocId = docId;
  go("compare");
}

// ── UTILS ────────────────────────────────────────────
function go(screen) { state.screen = screen; render(); }
function confirmBack() { if (confirm("작성 중인 내용이 사라집니다. 돌아가시겠습니까?")) go("home"); }
function nowDateTimeLocal() {
  const now = new Date(), pad = n => String(n).padStart(2,"0");
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
function fmtDate(v) { if (!v) return "-"; try { return new Date(v).toLocaleString("ko-KR"); } catch { return v; } }

// Global exports
Object.assign(window, {
  go, goAdmin, checkAdmin, selectRole, startForm, setAnswer, handleImage,
  removeImage, submitForm, searchRecords, loadRecord, fetchRecords, viewRecord,
  viewRecordDash, confirmBack, openImageModal, downloadExcel,
});

render();
</script>

.meta-sub { font-size:13px; color:var(--sub); margin-top:2px; }

.cc-title { font-size:14px; font-weight:700; margin-bottom:10px; }
.change-badge { background:var(--red); color:white; font-size:11px; padding:2px 7px; border-radius:10px; margin-left:6px; }
.cc-row { display:flex; gap:8px; }
.cc-cell { flex:1; text-align:center; }
.cc-role { font-size:11px; color:var(--sub); margin-bottom:4px; font-weight:600; }
.cc-val { font-size:15px; font-weight:800; padding:8px 4px; border-radius:8px; }
.val-y { color:#276749; background:#F0FFF4; }
.val-n { color:#C53030; background:#FFF5F5; }
.val-na { color:#4A5568; background:#EDF2F7; }
.cc-img { width:100%; max-width:100px; border-radius:6px; margin-top:6px; cursor:pointer; }

/* DASHBOARD */
.dash-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:16px; }
.stat-card { background:white; border-radius:12px; padding:12px 6px; text-align:center; border:1.5px solid var(--border); }
.stat-num { font-size:22px; font-weight:800; }
.stat-label { font-size:10px; color:var(--sub); margin-top:2px; }
.dash-table-wrap { overflow-x:auto; padding:0 16px 40px; }
.dash-table { width:100%; border-collapse:collapse; font-size:13px; background:white; border-radius:12px; overflow:hidden; border:1.5px solid var(--border); }
.dash-table th { background:#F7F8FA; padding:10px 8px; text-align:left; font-size:12px; font-weight:700; color:var(--sub); border-bottom:1px solid var(--border); }
.dash-table td { padding:10px 8px; border-bottom:1px solid var(--border); vertical-align:middle; }
.dash-table tr:last-child td { border-bottom:none; }
.dash-table tr:hover td { background:#F7F8FA; }
.badge-ok { display:inline-block; font-size:11px; color:#276749; background:#F0FFF4; padding:2px 7px; border-radius:10px; }
.badge-pend { display:inline-block; font-size:11px; color:#744210; background:#FEFCBF; padding:2px 7px; border-radius:10px; }

/* SEARCH */
.search-list { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.search-item { background:white; border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; cursor:pointer; display:flex; flex-direction:column; gap:4px; position:relative; }
.search-item:active { border-color:var(--red); }
.si-store { font-size:16px; font-weight:700; }
.si-meta { font-size:12px; color:var(--sub); }
.si-tags { display:flex; gap:6px; flex-wrap:wrap; }
.si-arrow { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--sub); }
.tag-sm { font-size:11px; background:#EDF2F7; color:var(--sub); padding:2px 8px; border-radius:10px; }

/* MODAL */
.img-modal { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; }
.img-modal-bg { position:absolute; inset:0; background:rgba(0,0,0,.85); }
.img-modal-img { position:relative; max-width:92vw; max-height:85vh; border-radius:10px; }
.img-modal-close { position:fixed; top:20px; right:20px; background:white; border:none; border-radius:50%; width:36px; height:36px; font-size:16px; cursor:pointer; z-index:1001; }

/* UTILS */
.hint-text { font-size:14px; color:var(--sub); line-height:1.6; }
.loading-text { font-size:14px; color:var(--sub); text-align:center; padding:20px; }
.error-text { font-size:14px; color:var(--red); text-align:center; padding:20px; }
</style>
</head>
<body>
<div id="app"></div>
</body>
</html>
