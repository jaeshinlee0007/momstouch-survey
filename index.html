// 활성 매장 데이터 (Firebase store_master)
async function getActiveStoreData() {
  const cached = cacheGet("store");
  if (cached) return cached;
  try {
    // 매장 데이터 + 양도양수 데이터 병렬 조회
    const [snap, transferSnap] = await Promise.all([
      getDocs(collection(db,"store_master")),
      getDocs(collection(db,"store_transfer")).catch(() => ({docs:[]})),
    ]);
    // 양도양수 맵: 신 점포코드 → [{oldCode, transferDate}]
    window._transferMap = new Map();
    (transferSnap.docs||[]).forEach(d => {
      const t = d.data();
      if (!window._transferMap.has(t.newCode)) window._transferMap.set(t.newCode, []);
      window._transferMap.get(t.newCode).push({oldCode: t.oldCode, transferDate: t.transferDate});
    });
    if (!snap.empty) {
      const stores = [];
      snap.forEach(d => stores.push(d.data()));
      if (stores.length > 0) {
        
        window._activeStores = stores;
        cacheSet("store", stores);
        return stores;
      }
    }
  } catch(e) {
    console.warn("Firebase 매장 데이터 로드 실패:", e.message);
  }
  return [];
}

// 매장 데이터 Excel 업로드
async function uploadStoreData(file) {
  // SheetJS 지연 로딩
  try { await loadXLSX(); } catch(e) { throw new Error("Excel 라이브러리 로드 실패"); }
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "binary" });

        // ── 양도양수 시트 파싱 (시트명에 "양도양수" 포함 시) ──
        const transferSheetName = wb.SheetNames.find(n => n.includes("양도양수") || n.toLowerCase().includes("transfer"));
        if (transferSheetName) {
          const wsT = wb.Sheets[transferSheetName];
          const transferData = XLSX.utils.sheet_to_json(wsT, {header:1});
          const transferRows = transferData.slice(1).filter(r => r[0] && r[1] && r[2]);
          if (transferRows.length > 0) {
            // 기존 양도양수 데이터 삭제
            const tSnap = await getDocs(collection(db,"store_transfer"));
            await Promise.all([...tSnap.docs].map(d => deleteDoc(doc(db,"store_transfer",d.id))));
            // 새 데이터 저장
            await Promise.all(transferRows.map(r => addDoc(collection(db,"store_transfer"), {
              oldCode: String(r[0]).trim(),
              newCode: String(r[1]).trim(),
              transferDate: String(r[2]).trim(),
              createdAt: new Date(),
            })));
            
          }
        }

        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

        // 헤더 제외, 빈 행 제거
        const stores = rows.slice(1)
          .filter(r => r[0] && r[1])
          .map(r => ({
            code: String(r[0]||"").trim(),
            name: String(r[1]||"").trim(),
            team: String(r[2]||"").trim(),
            sv:   String(r[3]||"").trim(),
            tl:   String(r[4]||"").trim(),
          }));

        if (stores.length === 0) {
          reject("유효한 매장 데이터가 없습니다."); return;
        }

        // Firebase store_master 컬렉션에 저장
        // 기존 데이터 전체 삭제 후 재업로드
        const existingSnap = await getDocs(collection(db, "store_master"));
        const deletePromises = [];
        existingSnap.forEach(d => deletePromises.push(updateDoc(doc(db,"store_master",d.id), {_deleted:true})));

        // 새 데이터 일괄 저장 (50개씩 배치)
        const batchSize = 50;
        for (let i = 0; i < stores.length; i += batchSize) {
          const batch = stores.slice(i, i + batchSize);
          await Promise.all(batch.map(s => addDoc(collection(db,"store_master"), s)));
        }

        // _deleted 항목 정리
        existingSnap.forEach(d => {
          // 이미 덮어씌워졌으므로 무시
        });

        cacheInvalidate("store");
        resolve(stores.length);
      } catch(err) {
        reject(err.message || "파일 처리 오류");
      }
    };
    reader.onerror = () => reject("파일 읽기 실패");
    reader.readAsBinaryString(file);
  });
}

  const roleLabel = {sv:"수퍼바이저",tl:"팀장",gl:"그룹장"}[S.role];
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('role')">←</button>
      <h2>점검자 / 매장 선택</h2>
    </div>
    <div class="card-section">
      <label class="field-label">점검자 이름</label>
      <input id="writerInput" class="input-field" type="text"
        placeholder="${S.role==='gl' ? '그룹장 입력 시 전체 매장 표시' : '이름 입력 후 검색'}"
        value="${_currentUser && _authName ? _authName : S.writerName}"
        ${_currentUser && _authName ? 'readonly style="background:#F7FAFC;color:#4A5568;"' : ''} />
      ${_currentUser && _authName ? '<div style="font-size:11px;color:#48BB78;margin-top:2px;">✅ 로그인 계정으로 자동 적용됩니다</div>' : ''}
      <button class="btn-primary" onclick="searchStores()">매장 검색</button>
      <div id="storeSearchWrap" style="display:none">
        <input id="storeKeywordFixed" class="input-field" type="text"
          placeholder="매장명 검색"
          oninput="filterStoreListFixed(this.value)" />
      </div>
      <div id="storeResult"></div>
    </div>`;
}

function filterStoreListFixed(keyword) {
  S.storeSearch = keyword;
  const list = window._currentStoreList || [];
  renderStoreListInner(list, keyword);
}

async function searchStores() {
  // Auth 로그인 시 이름 자동 적용, 미로그인 시 수동 입력
  const inputEl = document.getElementById("writerInput");
  const name = (_currentUser && _authName) ? _authName : (inputEl?.value?.trim() || "");
  if (!name) { alert("이름을 입력해주세요."); return; }
  if (_currentUser && _authName && inputEl) inputEl.value = _authName;
  S.writerName = name;
  S.storeSearch = "";

  document.getElementById("storeResult").innerHTML = `<p class="loading-text">매장 목록 불러오는 중...</p>`;
  const activeStores = await getActiveStoreData();

  let matched = [];
  if (S.role === "sv") {
    matched = activeStores.filter(s => s.sv === name);
  } else if (S.role === "tl") {
    matched = activeStores.filter(s => s.tl === name);
  } else {
    matched = activeStores.slice();
  }

  if (matched.length === 0) {
    document.getElementById("storeResult").innerHTML =
      `<p class="error-text">담당 매장이 없습니다. 이름을 확인해주세요.</p>`;
    return;
  }

  // 보완점검: 최초점검에서 N항목 있는 담당 매장만 노출
  if (S.inspType === "보완") {
    document.getElementById("storeResult").innerHTML = `<p class="loading-text">보완필요 매장 확인 중...</p>`;
    try {
      // SV 최초점검 N항목 + 팀장 최초점검 N항목 + 그룹장 최초점검 N항목 모두 수집
      const followupCached = cacheGet("followup");
      let svSnap, tlSnap, glSnap;
      if (followupCached) {
        [svSnap, tlSnap, glSnap] = followupCached;
      } else {
        [svSnap, tlSnap, glSnap] = await Promise.all([
          getDocs(query(collection(db,"surveys"), where("role","==","sv"), where("inspType","==","최초"))),
          getDocs(query(collection(db,"surveys"), where("role","==","tl"), where("inspType","==","최초"))),
          getDocs(query(collection(db,"surveys"), where("role","==","gl"), where("inspType","==","최초"))),
        ]);
        cacheSet("followup", [svSnap, tlSnap, glSnap]);
      }
      // followup 스냅에서도 이미지는 불필요 (매장 목록 표시용)
      const needsFollowup = new Set();
      const alreadyDone = new Set();
      // TL 점검: 해당 팀장의 팀 storeCode 매핑
      const tlNStoreCodes = new Set();
      const glNStoreCodes = new Set();
      tlSnap.forEach(d => {
        const data = d.data();
        const nCount = Object.values(data.answers||{}).filter(a=>a.value==="N").length;
        if (nCount > 0) tlNStoreCodes.add(data.storeCode);
      });
      glSnap.forEach(d => {
        const data = d.data();
        // svFollowupIds가 있으면 해당 매장은 팀장 보완대상
        if (data.svFollowupIds && data.svFollowupIds.length > 0) {
          glNStoreCodes.add(data.storeCode);
        } else {
          // 구버전 호환: glAnswers Q10 제외 N항목 체크
          const glA = data.glAnswers || data.answers || {};
          const nCount = Object.entries(glA)
            .filter(([k,v]) => Number(k) !== 10 && v.value === "N").length;
          if (nCount > 0) glNStoreCodes.add(data.storeCode);
        }
      });
      // SV 최초점검: storeCode별 최신 문서 기준으로 세트 판단
      // 최신 최초점검에 followup 없으면 → 보완필요 (새 세트)
      // 최신 최초점검에 followup 있으면 → 세트 종결 (보완완료)
      const latestSvMap = new Map(); // storeCode → 최신 SV 최초점검 데이터
      svSnap.forEach(d => {
        const data = d.data();
        const existing = latestSvMap.get(data.storeCode);
        // createdAt 기준 최신 문서만 유지
        const docTime = data.createdAt?.seconds || 0;
        const existTime = existing?.createdAt?.seconds || 0;
        if (!existing || docTime > existTime) {
          // 매장 목록 표시용 → 이미지 불필요 (N항목 판단에만 사용)
          latestSvMap.set(data.storeCode, { ...stripImages([{...data}])[0], _docId: d.id });
        }
      });

      // TL 독립 최초점검 문서 (SV 없는 매장) - 보완점검 대상에 추가
      tlSnap.forEach(d => {
        const data = d.data();
        if (data.inspType !== "최초" && data.inspType) return;
        if (latestSvMap.has(data.storeCode)) return; // SV 문서 있으면 SV 기준 우선
        const nCount = Object.values(data.answers||{}).filter(a=>a.value==="N").length;
        const hasFollowup = !!(data.followupSvAnswers || data.followupTlAnswers);
        if (nCount > 0 && !hasFollowup) {
          latestSvMap.set(data.storeCode, { ...data, _docId: d.id });
        }
      });

      const svNStoreCodes = new Set();
      latestSvMap.forEach((data, storeCode) => {
        const nCount = Object.values(data.answers||{}).filter(a=>a.value==="N").length;
        // SV 또는 TL이 보완점검 완료한 경우 모두 세트 종결로 판단
        const hasFollowup = !!(data.followupSvAnswers || data.followupTlAnswers);
        if (nCount > 0 && !hasFollowup) {
          // 최신 세트에 N있고 보완 미완료 → 보완필요
          svNStoreCodes.add(storeCode);
        } else if (hasFollowup) {
          // 보완 완료된 세트 → 종결
          alreadyDone.add(storeCode);
        }
      });

      // TL/GL N항목도 세트 기준으로 판단
      // (TL/GL 최초점검은 단순 N여부만 체크 - 보완 세트는 SV 기준)
      // 역할에 따라 needsFollowup 구성
      const allNeedCodes = new Set([
        ...svNStoreCodes,
        ...tlNStoreCodes,
        ...glNStoreCodes,
      ]);
      allNeedCodes.forEach(code => {
        // alreadyDone(보완완료 세트)이어도 새 최초점검 N이면 표시
        if (S.role === "sv" && (svNStoreCodes.has(code) || tlNStoreCodes.has(code))) {
          needsFollowup.add(code);
        }
        if (S.role === "tl" && (svNStoreCodes.has(code) || tlNStoreCodes.has(code) || glNStoreCodes.has(code))) {
          needsFollowup.add(code);
        }
      });
      window._needsFollowup = needsFollowup;
      window._alreadyDone = alreadyDone;

      // 반려된 점포 목록도 수집 (SV 문서 기준)
      const rejectedMap = new Map(); // storeCode → {reason, by}
      svSnap.forEach(d => {
        const data = d.data();
        // 반려 상태면 followupSvAnswers 유무 관계없이 재보완 대상
        if (data.tlRejected && !data.finalConfirmed) {
          rejectedMap.set(data.storeCode, {reason: data.tlRejectedReason, by: "팀장", docId: d.id});
        }
        if (data.glRejected && !data.finalConfirmed) {
          // SV/TL 문서 내 glRejected는 docId만 저장 (GL 전용 건은 glSnap에서 별도 처리)
          if (!rejectedMap.has(data.storeCode)) {
            rejectedMap.set(data.storeCode, {reason: data.glRejectedReason, by: "그룹장", docId: d.id});
          }
        }
      });
      // GL 반려(glRejected) 점포도 수집 - GL 문서에서
      glSnap.forEach(d => {
        const data = d.data();
        if (data.glRejected && data.svFollowupIds && data.svFollowupIds.length > 0
            && !data.tlConfirmed && !data.finalConfirmed) {
          // GL 문서 건은 무조건 덮어쓰기 (glDocId + svFollowupIds 포함 버전이 우선)
          {
            // glDocId + svFollowupIds 저장 → 매장 선택 시 GL 전용 로직 사용
            rejectedMap.set(data.storeCode, {
              reason: data.glRejectedReason,
              by: "그룹장",
              glDocId: d.id,
              svFollowupIds: data.svFollowupIds,
            });
          }
        }
      });
      window._rejectedMap = rejectedMap;

      // 담당 매장 중: 반려된 점포 + N항목 있고 보완 미완료인 점포
      const needFollowup = matched.filter(s =>
        // 반려된 점포: alreadyDone 무시하고 무조건 표시
        rejectedMap.has(s.code) ||
        (needsFollowup.has(s.code) && !alreadyDone.has(s.code))
      );

      if (needFollowup.length === 0) {
        document.getElementById("storeResult").innerHTML =
          `<p class="error-text">보완점검이 필요한 담당 매장이 없습니다.<br>
          <span style="font-size:12px;color:#718096">(모두 점검완료 또는 추가점검 대상 없음)</span></p>`;
        return;
      }

      // 정렬: 반려 최상단 → 보완필요 → 나머지
      needFollowup.sort((a, b) => {
        const aRej = rejectedMap.has(a.code) ? 0 : 1;
        const bRej = rejectedMap.has(b.code) ? 0 : 1;
        return aRej - bRej;
      });
      matched = needFollowup;

    } catch(e) {
      console.warn("보완필요 조회 실패:", e.message);
    }
  }
  renderStoreList(matched);
}

function renderStoreList(list, keyword="") {
  window._currentStoreList = list;
  // 10개 이상이면 외부 고정 검색창 표시
  const searchWrap = document.getElementById("storeSearchWrap");
  if (searchWrap) {
    searchWrap.style.display = list.length > 10 ? "block" : "none";
    const fixedInput = document.getElementById("storeKeywordFixed");
    if (fixedInput) fixedInput.value = keyword;
  }
  renderStoreListInner(list, keyword);
}

function renderStoreListInner(list, keyword="") {
  const filtered = keyword
    ? list.filter(s => s.name.includes(keyword) || s.code.includes(keyword))
    : list;
  const needsFollowup = window._needsFollowup || new Set();
  const alreadyDone = window._alreadyDone || new Set();
  let html = `<div class="store-list-wrap">`;
  html += `<div class="store-count">${filtered.length}개 매장</div><div class="search-list">`;
  if (filtered.length === 0) {
    html += `<p class="error-text" style="padding:12px">검색 결과가 없습니다.</p>`;
  }
  filtered.forEach(s => {
    let badge = "";
    if (S.inspType === "보완") {
      if (needsFollowup.has(s.code) && !alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-need">⚠️ 보완필요</span>`;
      } else if (alreadyDone.has(s.code)) {
        badge = `<span class="follow-badge follow-done">✅ 보완점검완료</span>`;
      }
    }
    const rejInfo = (window._rejectedMap||new Map()).get(s.code);
    const rejBadge = rejInfo
      ? `<span class="rej-badge">🚫 ${rejInfo.by} 반려</span>`
      : "";
    const rejReason = rejInfo
      ? `<div class="rej-reason">반려사유: ${rejInfo.reason||"사유 없음"}</div>`
      : "";
    html += `<div class="search-item ${rejInfo?'rejected-item':''}" onclick="selectStore('${s.code}','${s.name}','${s.team}')">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="si-store">${s.name}</span>${badge}${rejBadge}
      </div>
      <div class="si-meta">${s.code} · ${s.team} · SV: ${s.sv}</div>
      ${rejReason}
      <div class="si-arrow">→</div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById("storeResult").innerHTML = html;
  window._currentStoreList = list;
}

function filterStoreList(keyword) {
  S.storeSearch = keyword;
  renderStoreListInner(window._currentStoreList || [], keyword);
}

function selectStore(code, name, team) {
  S.storeCode = code; S.storeName = name; S.storeTeam = team;

  // GL glRejected 보완점검: rejectedMap에서 GL 전용 정보 확인
  const rejInfo = (window._rejectedMap || new Map()).get(code);
  if (S.inspType === "보완" && rejInfo && rejInfo.glDocId && rejInfo.svFollowupIds) {
    // 대시보드 경로와 동일하게: compare 화면으로 이동 (그룹장 최초점검 결과 표시)
    S.role = "tl";
    S.inspType = "보완";
    S.answers = {};
    S.prevNItems = rejInfo.svFollowupIds;
    S.glFollowupIds = rejInfo.svFollowupIds;
    S.loadedDocId = rejInfo.glDocId;
    S.visitDate = new Date().toISOString();
    // GL 문서 데이터를 compareData로 설정
    // rejInfo에 문서 데이터가 없으므로 Firebase에서 직접 로드
    loadGLCompareAndShow(rejInfo.glDocId);
    return;
  }

  // GL glRejected 보완점검: prevNItems 이미 설정됨 (기존 경로 호환)
  if (S.inspType === "보완" && S.prevNItems && S.prevNItems.length > 0 && S.glFollowupIds && S.glFollowupIds.length > 0) {
    go("info");
    return;
  }

  // 보완점검 또는 그룹장 최초점검: loadPrevNItems 호출
  // 팀장 최초점검은 독립 문서로 저장 → loadPrevNItems 불필요
  if (S.inspType === "보완" || S.role === "gl") {
    loadPrevNItems(code);
  } else {
    // SV 최초점검 / TL 최초점검: 바로 info로
    go("info");
  }
}

async function loadPrevNItems(storeCode) {
  try {
    // SV + TL 최초점검 문서 병렬 조회
    const [svSnap, tlSnap] = await Promise.all([
      getDocs(query(collection(db,"surveys"),
        where("storeCode","==",storeCode),
        where("role","==","sv"),
        orderBy("createdAt","desc"))),
      getDocs(query(collection(db,"surveys"),
        where("storeCode","==",storeCode),
        where("role","==","tl"),
        orderBy("createdAt","desc"))),
    ]);

    // SV 세트 기준: 보완 미완료 최신 최초점검 문서
    // SV 또는 TL이 보완점검 완료한 경우 모두 세트 종결로 판단
    let targetDoc = null;
    svSnap.forEach(d => {
      const data = d.data();
      const isFirst = data.inspType === "최초" || !data.inspType;
      const hasFollowup = !!(data.followupSvAnswers || data.followupTlAnswers);
      if (!targetDoc && isFirst && !hasFollowup) {
        targetDoc = { id: d.id, ...data };
      }
    });
    // 미완료 세트 없으면 최신 최초점검 (SV)
    if (!targetDoc) {
      svSnap.forEach(d => {
        const data = d.data();
        if (!targetDoc && (data.inspType === "최초" || !data.inspType)) {
          targetDoc = { id: d.id, ...data };
        }
      });
    }
    // SV 문서 없으면 TL 독립 최초점검 문서 사용
    if (!targetDoc) {
      tlSnap.forEach(d => {
        const data = d.data();
        const isFirst = data.inspType === "최초" || !data.inspType;
        const hasFollowup = !!(data.followupSvAnswers || data.followupTlAnswers);
        if (!targetDoc && isFirst && !hasFollowup) {
          targetDoc = { id: d.id, ...data };
        }
      });
    }

    if (targetDoc) {
      // SV N항목
      const svAnswers = targetDoc.answers || {};
      const normalNItems = Object.entries(svAnswers)
        .filter(([,v]) => v.value === "N")
        .map(([k]) => Number(k));

      // TL 최초점검 N항목 수집 (같은 매장, 최신 최초점검)
      let tlNItems = [];
      let latestTLDoc = null;
      tlSnap.forEach(d => {
        const data = d.data();
        if (!latestTLDoc && (data.inspType === "최초" || !data.inspType)) {
          latestTLDoc = data;
        }
      });
      if (latestTLDoc) {
        tlNItems = Object.entries(latestTLDoc.tlAnswers || latestTLDoc.answers || {})
          .filter(([,v]) => v.value === "N")
          .map(([k]) => Number(k));
      }

      // GL svFollowupIds 병합
      const glFollowupIds = targetDoc.svFollowupIds || [];

      // 전체 보완점검 대상: SV N + TL N + GL 매핑 (중복제거)
      const allFollowupIds = [...new Set([...normalNItems, ...tlNItems, ...glFollowupIds])];
      S.prevNItems = allFollowupIds;
      S.loadedDocId = targetDoc.id;
      S.glFollowupIds = glFollowupIds.filter(id => !normalNItems.includes(id) && !tlNItems.includes(id));
      // 최초점검 결과 미리보기용 compareData 설정
      S.compareData = { id: targetDoc.id, ...targetDoc };
      
    } else {
      S.prevNItems = [];
      S.loadedDocId = null;
      S.glFollowupIds = [];
      S.compareData = null;
    }
  } catch(e) {
    console.error("loadPrevNItems 오류:", e.message);
    S.prevNItems = [];
    S.loadedDocId = null;
    S.glFollowupIds = [];
    S.compareData = null;
  }
  // 최초점검 결과 있으면 compare 화면으로, 없으면 바로 info로
  if (S.compareData && S.prevNItems.length > 0) {
    go("compare");
  } else {
    go("info");
  }
}

// ── INFO ───────────────────────────────────────────

  const roleLabel = {sv:"수퍼바이저",tl:"팀장",gl:"그룹장"}[S.role];
  root.innerHTML = `
    <div class="page-header">
      <button class="btn-back" onclick="go('storeSel')">←</button>
      <h2>기본 정보 확인</h2>
    </div>
    <div class="card-section">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="insp-badge ${S.inspType==='최초'?'badge-first':'badge-follow'}">${S.inspType}점검</span>
        <span class="role-badge">${roleLabel}</span>
      </div>
      <label class="field-label">매장</label>
      <div class="info-box">${S.storeName} <span style="color:#718096;font-size:13px">${S.storeCode} · ${S.storeTeam}</span></div>
      <label class="field-label">점검자</label>
      <div class="info-box">${S.writerName}</div>
      <label class="field-label">방문 일시</label>
      <input id="visitDate" class="input-field" type="datetime-local" value="${nowDTL()}" />
      ${S.inspType==='보완' && S.prevNItems.length>0 ? `
        <div class="notice-box">
          ⚠️ 재점검 대상: ${S.prevNItems.length}개 항목
          ${(S.glFollowupIds||[]).length > 0 ? `<br><span style="color:#744210">🔍 그룹장 지적 카테고리 포함 ${(S.glFollowupIds||[]).length}개 항목</span>` : ""}
        </div>` : ""}
      <button class="btn-primary" onclick="startForm()">점검 시작</button>
    </div>`;
}

function startForm() {
  S.visitDate = document.getElementById("visitDate").value;
  S.answers = {}; go("form");
}

// ── FORM ───────────────────────────────────────────
function renderForm(root) {
  const allQuestions = S.role === "gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const roleLabel = {sv:"수퍼바이저",tl:"팀장",gl:"그룹장"}[S.role];
  const nSet = new Set(S.prevNItems);

  // 보완점검: N항목만 표시 (A안)
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  const questions = isFollowup
    ? allQuestions.filter(q => nSet.has(q.id))
    : allQuestions;

  let html = `
    <div class="page-header sticky-header">
      <button class="btn-back" onclick="confirmBack()">←</button>
      <div class="header-info">
        <span class="header-store">${S.storeName}</span>
        <span class="header-role">${S.inspType}점검 · ${roleLabel}</span>
      </div>
    </div>
    <div class="form-body">
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
        <span id="progressText" class="progress-text">0 / ${questions.length}</span>
      </div>`;

  if (isFollowup) {
    html += `<div class="section-divider divider-n">⚠️ 최초점검 N항목 (${questions.length}건) — 재점검</div>`;
  }

  let prevCat = "";
  questions.forEach(q => {
    const color = CAT_COLORS[q.category] || "#718096";
    if (q.category !== prevCat) {
      prevCat = q.category;
      html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
    }
    const tag = q.tag ? `<span class="tag-badge" style="background:${color}20;color:${color}">${q.tag}</span>` : "";
    const glCatIds = S.glFollowupIds || [];
    const svNIds = (S.prevNItems || []).filter(id => !glCatIds.includes(id));
    const isGLcat = glCatIds.includes(q.id) && !svNIds.includes(q.id);
    const nHighlight = isFollowup
      ? (isGLcat ? ' style="border-color:#D69E2E;background:#FFFBEB"' : ' style="border-color:#FC8181;background:#FFF5F5"')
      : "";
    const nLabel = isFollowup
      ? (isGLcat
          ? `<span class="n-label" style="background:#FEFCBF;color:#744210">🔍 그룹장 지적</span>`
          : `<span class="n-label">⚠️ 이전 N</span>`)
      : "";
    html += `
      <div class="question-card" id="qcard-${q.id}"${nHighlight}>
        <div class="q-header">
          <span class="q-num" style="${isFollowup?'background:#E53E3E':''}">Q${q.id}</span>
          <span class="q-title">${q.title}</span>${tag}${nLabel}
        </div>
        <p class="q-desc">${q.desc}</p>
        <div class="answer-row">
          <button class="ans-btn" id="ans-${q.id}-Y" onclick="setAnswer(${q.id},'Y')">✅ Y</button>
          <button class="ans-btn" id="ans-${q.id}-N" onclick="setAnswer(${q.id},'N')">❌ N</button>
          ${!q.noNa ? `<button class="ans-btn ans-na" id="ans-${q.id}-미취급" onclick="setAnswer(${q.id},'미취급')">➖ 미취급</button>` : ""}
        </div>
        <div class="image-section" id="img-sec-${q.id}">
          <label class="img-upload-btn" for="img-${q.id}">📷 사진 첨부
            <input type="file" id="img-${q.id}" accept="image/*" style="display:none" onchange="handleImage(${q.id},this)">
          </label>
          <div id="img-preview-${q.id}"></div>
        </div>
        <div class="memo-section" id="memo-sec-${q.id}" style="display:${S.answers[q.id]?.value ? 'block' : 'none'}">
          <div class="memo-wrap">
            <input type="text" id="memo-${q.id}" class="memo-input"
              placeholder="메모 입력 (선택, 최대 50자)"
              maxlength="50"
              oninput="handleMemo(${q.id},this.value)"
              value="${S.answers[q.id]?.memo||''}" />
            <span class="memo-counter" id="memo-cnt-${q.id}" style="color:${(S.answers[q.id]?.memo?.length||0)>=45?'#E53E3E':'#718096'}">${S.answers[q.id]?.memo?.length||0}/50</span>
          </div>
        </div>
      </div>`;
  });

  html += `
      <div class="submit-section">
        <div id="submitWarning" class="submit-warning" style="display:none">⚠️ 아직 답변하지 않은 항목이 있습니다.</div>
        <button class="btn-submit" onclick="submitForm()">점검 제출하기</button>
      </div>
    </div>`;
  root.innerHTML = html;
  updateProgress();
}
function setAnswer(qId, value) {
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};
  S.answers[qId].value = value;
  ["Y","N","미취급"].forEach(v => {
    const b = document.getElementById(`ans-${qId}-${v}`); if(b) b.classList.remove("selected");
  });
  const sel = document.getElementById(`ans-${qId}-${value}`); if(sel) sel.classList.add("selected");
  const qDef = [...SV_QUESTIONS, ...GL_QUESTIONS].find(q => q.id === qId);
  const imgSec = document.getElementById(`img-sec-${qId}`);
  if (imgSec) {
    if (qDef?.photoOnN) {
      if (S.inspType === "보완") {
        // 보완점검: 사입관리 Y/N 모두 사진 섹션 표시
        imgSec.style.display = (value === "Y" || value === "N") ? "block" : "none";
      } else {
        // 최초점검: 사입관리 N일 때만 사진 섹션 표시
        imgSec.style.display = value === "N" ? "block" : "none";
      }
    } else if (S.role === "gl" && S.inspType === "최초") {
      // 그룹장 최초점검: 모든 문항 Y/N 사진 선택적 (필수 아님) - 미취급 제외
      imgSec.style.display = (value === "Y" || value === "N") ? "block" : "none";
    } else {
      imgSec.style.display = value === "미취급" ? "none" : "block";
    }
  }
  const card = document.getElementById(`qcard-${qId}`); if(card) card.classList.add("answered");
  // 메모 섹션: 답변 선택 시 항상 표시 (Y/N/미취급 모두)
  const memoSec = document.getElementById(`memo-sec-${qId}`);
  if (memoSec) {
    memoSec.style.display = value ? "block" : "none";
    const memoInput = document.getElementById(`memo-${qId}`);
    if (memoInput && S.answers[qId]?.memo) {
      memoInput.value = S.answers[qId].memo;
      const cnt = document.getElementById(`memo-cnt-${qId}`);
      if (cnt) cnt.textContent = `${S.answers[qId].memo.length}/50`;
    }
  }
  updateProgress();
}

// GL 반려건: Firebase에서 GL 문서 로드 후 compare 화면으로 이동
async function loadGLCompareAndShow(glDocId) {
  try {
    const docSnap = await getDoc(doc(db, "surveys", glDocId));
    if (docSnap.exists()) {
      S.compareData = { id: docSnap.id, ...docSnap.data() };
    } else {
      // getDoc 실패 시 캐시에서 탐색
      const cached = [
        ...(cacheGet("dashboard") || []),
        ...(cacheGet("records") || []),
      ];
      const hit = cached.find(r => r.id === glDocId);
      S.compareData = hit || null;
    }
  } catch(e) {
    // 오류 시 캐시에서 탐색
    const cached = [
      ...(cacheGet("dashboard") || []),
      ...(cacheGet("records") || []),
    ];
    S.compareData = cached.find(r => r.id === glDocId) || null;
  }
  go("compare");
}

function handleMemo(qId, value) {
  if (!S.answers[qId]) S.answers[qId] = {value:null, image:null};
  // 50자 초과 시 자르기
  const trimmed = value.slice(0, 50);
  S.answers[qId].memo = trimmed || null;
  // 글자수 카운터 업데이트
  const cnt = document.getElementById(`memo-cnt-${qId}`);
  if (cnt) {
    cnt.textContent = `${trimmed.length}/50`;
    cnt.style.color = trimmed.length >= 45 ? "#E53E3E" : "#718096";
  }
  // 입력창 값 동기화 (50자 초과 방지)
  const input = document.getElementById(`memo-${qId}`);
  if (input && input.value !== trimmed) input.value = trimmed;
}

async function handleImage(qId, input) {
  const file = input.files[0]; if(!file) return;
  // 20MB 초과 시 업로드 거부
  if (file.size > 20 * 1024 * 1024) {
    alert("파일 크기가 너무 큽니다. (20MB 이하만 가능)\n더 낮은 화질로 촬영하거나 갤러리에서 다른 사진을 선택해주세요.");
    input.value = "";
    return;
  }
  const compressed = await compressImage(file, 400, 0.35);
  if (!S.answers[qId]) S.answers[qId] = {value:null,image:null};

  // ── Storage 전환 준비 ──────────────────────────────
  // USE_STORAGE = true 로 바꾸면 Storage URL 방식으로 자동 전환
  const USE_STORAGE = false;
  if (USE_STORAGE && _currentUser) {
    const path = `inspections/${S.storeCode}/${Date.now()}_Q${qId}.jpg`;
    const { ok, url } = await uploadImageToStorage(compressed, path);
    if (ok) {
      S.answers[qId].image = url;          // Storage URL 저장
    } else {
      S.answers[qId].image = compressed;   // 실패 시 base64 fallback
    }
  } else {
    S.answers[qId].image = compressed;     // 현재: base64 저장
  }
  const preview = document.getElementById(`img-preview-${qId}`);
  if (preview) preview.innerHTML = `
    <div class="preview-container">
      <img src="${compressed}" class="preview-img" onclick="openImageModal('${compressed}')">
      <button class="remove-img" onclick="removeImage(${qId})">✕</button>
    </div>`;
}

function removeImage(qId) {
  if (S.answers[qId]) S.answers[qId].image = null;
  const p = document.getElementById(`img-preview-${qId}`); if(p) p.innerHTML = "";
  const i = document.getElementById(`img-${qId}`); if(i) i.value = "";
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h*maxWidth/w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        // ── 워터마크 추가 ──
        addWatermark(ctx, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function addWatermark(ctx, w, h) {
  // 역할 라벨
  const roleMap = { sv: "AC", tl: "팀장", gl: "그룹장" };
  const roleLabel = roleMap[S.role] || "AC";
  const name = S.writerName || "";
  const storeName = S.storeName || "";

  // 업로드 일시
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // 이미지 크기 비례 폰트/패딩
  const scale   = w / 500;
  const fMain   = Math.max(11, Math.round(13 * scale)); // 매장명/이름 폰트
  const fSub    = Math.max(9,  Math.round(11 * scale)); // 업로드 일시 폰트
  const fBadge  = Math.max(8,  Math.round(10 * scale)); // 배지 폰트
  const padX    = Math.round(12 * scale);
  const padY    = Math.round(9  * scale);
  const lineGap = Math.round(5  * scale);
  const badgeH  = Math.round(16 * scale);
  const badgePadX = Math.round(7 * scale);
  const badgeR  = Math.round(4  * scale);

  // 박스 높이 계산
  const boxH = padY + fMain + lineGap + fSub + padY;

  // 반투명 검정 배경
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, h - boxH, w, boxH);

  const baseY = h - boxH + padY;

  // ── 1행: 맘스터치 배지 + 매장명(좌) / 이름+역할(우) ──
  // 배지 ("맘스터치")
  const badgeText = "맘스터치";
  ctx.font = `500 ${fBadge}px -apple-system, sans-serif`;
  const badgeW = ctx.measureText(badgeText).width + badgePadX * 2;

  // 배지 배경 (둥근 사각형)
  ctx.fillStyle = "#E53E3E";
  ctx.beginPath();
  ctx.roundRect(padX, baseY + (fMain - badgeH) / 2, badgeW, badgeH, badgeR);
  ctx.fill();

  // 배지 텍스트
  ctx.fillStyle = "#ffffff";
  ctx.font = `500 ${fBadge}px -apple-system, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.fillText(badgeText, padX + badgePadX, baseY + fMain / 2);

  // 매장명 (배지 오른쪽)
  const badgeEndX = padX + badgeW + Math.round(7 * scale);
  ctx.fillStyle = "#ffffff";
  ctx.font = `500 ${fMain}px -apple-system, sans-serif`;
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";
  ctx.fillText(storeName, badgeEndX, baseY + fMain);

  // 이름 + 역할 (우측 정렬)
  ctx.fillStyle = "#cccccc";
  ctx.font = `500 ${fMain}px -apple-system, sans-serif`;
  ctx.textAlign = "right";
  ctx.fillText(`${name} ${roleLabel}`, w - padX, baseY + fMain);

  // ── 2행: 업로드 일시 ──
  const row2Y = baseY + fMain + lineGap + fSub;
  ctx.font = `400 ${fSub}px -apple-system, sans-serif`;
  ctx.textAlign = "left";

  // "업로드 일시" 라벨
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText("업로드 일시", padX, row2Y);

  const labelW = ctx.measureText("업로드 일시").width + Math.round(6 * scale);
  // 구분자
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillText("|", padX + labelW, row2Y);

  // 일시값
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.fillText(`${dateStr}  ${timeStr}`, padX + labelW + Math.round(10 * scale), row2Y);
}

function updateProgress() {
  const allQuestions = S.role==="gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const nSet = new Set(S.prevNItems);
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  // 보완점검: N항목만 기준, 최초점검: 전체 기준
  const questions = isFollowup
    ? allQuestions.filter(q => nSet.has(q.id))
    : allQuestions;
  const answered = questions.filter(q => S.answers[q.id]?.value).length;
  const pct = Math.round(answered/questions.length*100);
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressText");
  if(fill) fill.style.width = pct+"%";
  if(text) text.textContent = `${answered} / ${questions.length}`;
}

// ── SUBMIT ─────────────────────────────────────────
async function submitForm() {
  const allQ = S.role==="gl" ? GL_QUESTIONS : SV_QUESTIONS;
  const nSet = new Set(S.prevNItems);
  const isFollowup = S.inspType === "보완" && nSet.size > 0;
  // 보완점검: N항목만 검증, 최초점검: 전체 검증
  const questions = isFollowup ? allQ.filter(q => nSet.has(q.id)) : allQ;
  const unanswered = questions.filter(q => !S.answers[q.id]?.value);
  if (unanswered.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent="⚠️ 아직 답변하지 않은 항목이 있습니다."; }
    document.getElementById(`qcard-${unanswered[0].id}`)?.scrollIntoView({behavior:"smooth"});
    return;
  }
  // 이미지 필수 체크
  // 그룹장 최초점검: 사진 선택적 (필수 아님)
  // 사입관리(photoOnN): 최초=N만 필수, 보완=Y/N 모두 필수
  // 일반: Y/N 선택 시 필수
  const noImage = (S.role === "gl" && S.inspType === "최초")
    ? []
    : questions.filter(q => {
        const a = S.answers[q.id];
        if (!a?.value) return false;
        if (q.photoOnN) {
          if (isFollowup) {
            return (a.value === "Y" || a.value === "N") && !a.image;
          }
          return a.value === "N" && !a.image;
        }
        return (a.value === "Y" || a.value === "N") && !a.image;
      });
  if (noImage.length > 0) {
    const warn = document.getElementById("submitWarning");
    if(warn) { warn.style.display="block"; warn.textContent=`📷 사진 첨부가 필요한 항목이 ${noImage.length}건 있습니다. (Y/N 선택 항목은 사진 필수)`; }
    document.getElementById(`qcard-${noImage[0].id}`)?.scrollIntoView({behavior:"smooth"});
    // 사진 없는 항목 카드 강조
    noImage.forEach(q => {
      const card = document.getElementById(`qcard-${q.id}`);
      if(card) card.style.borderColor = "#FC8181";
    });
    return;
  }
  // 전체 이미지 용량 체크 (Firestore 1MB 문서 한도 고려)
  const totalSize = Object.values(S.answers).reduce((sum, a) => {
    return sum + (a.image ? Math.round(a.image.length * 0.75) : 0);
  }, 0);
  if (totalSize > 900 * 1024) {
    alert(`첨부 이미지 총 용량이 너무 큽니다.\n현재: ${Math.round(totalSize/1024)}KB / 한도: 900KB\n일부 사진을 제거하거나 더 낮은 화질로 다시 촬영해주세요.`);
    return;
  }
  const btn = document.querySelector(".btn-submit");
  if(btn) { btn.disabled=true; btn.textContent="저장 중..."; }
  try {
    const roleField = {sv:"sv",tl:"tl",gl:"gl"}[S.role];
    const payload = {
      storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
      writerName: S.writerName, visitDate: S.visitDate,
      role: S.role, inspType: S.inspType,
      answers: S.answers, createdAt: new Date(),
    };

    // SV 최초점검 → 새 문서
    if (S.role==="sv" && S.inspType==="최초") {
      const ref = await addDoc(collection(db,"surveys"), payload);
      S.loadedDocId = ref.id;
    }
    // SV 보완점검 → 최초점검 문서에 followup 저장
    else if (S.role==="sv" && S.inspType==="보완") {
      if (S.loadedDocId) {
        
        await updateDoc(doc(db,"surveys",S.loadedDocId), {
          followupSvAnswers: S.answers,
          followupSvWriterName: S.writerName,
          followupSvVisitDate: S.visitDate,
          followupSvUpdatedAt: new Date(),
        });
      } else {
        // loadedDocId 없으면 매장코드로 최초점검 문서 재탐색
        console.warn("loadedDocId 없음 - storeCode로 재탐색:", S.storeCode);
        const fallbackQ = query(collection(db,"surveys"),
          where("storeCode","==",S.storeCode),
          where("role","==","sv"),
          orderBy("createdAt","desc"));
        const fallbackSnap = await getDocs(fallbackQ);
        let targetId = null;
        fallbackSnap.forEach(d => {
          const data = d.data();
          if (!targetId && (data.inspType==="최초"||!data.inspType)) targetId = d.id;
        });
        if (targetId) {
          
          await updateDoc(doc(db,"surveys",targetId), {
            followupSvAnswers: S.answers,
            followupSvWriterName: S.writerName,
            followupSvVisitDate: S.visitDate,
            followupSvUpdatedAt: new Date(),
          });
          S.loadedDocId = targetId;
        } else {
          console.warn("최초점검 문서 없음 - 새 문서 생성");
          const ref = await addDoc(collection(db,"surveys"), payload);
          S.loadedDocId = ref.id;
        }
      }
    }
    // 팀장 → 최초점검 문서에 tl 필드 업데이트
    else if (S.role==="tl") {
      const prefix = S.inspType==="최초" ? "tl" : "followupTl";

      // GL 문서 기반 보완점검: S.loadedDocId가 GL 문서 ID인 경우
      const isGLFollowup = S.loadedDocId && S.glFollowupIds && S.glFollowupIds.length > 0;

      // 팀장 최초점검: SV 문서 없어도 독립 문서로 저장
      if (S.inspType === "최초" && !S.loadedDocId) {
        // TL 최초점검 N값 유무 확인
        const tlNCount = Object.values(S.answers).filter(a => a.value === "N").length;
        const tlPayload = {
          storeCode: S.storeCode, storeName: S.storeName, storeTeam: S.storeTeam,
          writerName: S.writerName, visitDate: S.visitDate,
          role: "tl", inspType: "최초",
          answers: S.answers, tlAnswers: S.answers,
          tlWriterName: S.writerName, tlVisitDate: S.visitDate,
          createdAt: new Date(),
          // N없음: 팀장확인 불필요 → 그룹장확인 자동 이동
          // N있음: 보완점검 필요 → SV/팀장 보완점검 목록 노출
          tlConfirmed: tlNCount === 0,
          tlConfirmerName: tlNCount === 0 ? S.writerName : null,
          tlConfirmedAt: tlNCount === 0 ? new Date().toISOString() : null,
        };
        const tlRef = await addDoc(collection(db,"surveys"), tlPayload);
        S.loadedDocId = tlRef.id;
        
      }

      if (!S.loadedDocId && S.inspType !== "최초") {
        // 보완점검: fallback으로 SV 최초점검 문서 재탐색
        const fbQ = query(collection(db,"surveys"),
          where("storeCode","==",S.storeCode),
          where("role","==","sv"),
          orderBy("createdAt","desc"));
        const fbSnap = await getDocs(fbQ);
        fbSnap.forEach(d => {
          const data = d.data();
          if (!S.loadedDocId && (data.inspType==="최초"||!data.inspType)) S.loadedDocId = d.id;
        });
      }

      if (S.loadedDocId) {
        const updatePayload = {
          [`${prefix}WriterName`]: S.writerName,
          [`${prefix}VisitDate`]: S.visitDate,
          [`${prefix}Answers`]: S.answers,
          [`${prefix}UpdatedAt`]: new Date(),
        };
        // SV 문서 기반 TL 보완점검: followupSvAnswers에도 저장 (세트 종결 호환)
        if (!isGLFollowup && S.inspType === "보완") {
          updatePayload.followupSvAnswers = S.answers;
          updatePayload.followupSvWriterName = S.writerName;
          updatePayload.followupSvVisitDate = S.visitDate;
        }
        // GL 문서 기반 보완점검: 완료 후 그룹장 확인 대기로 설정
        if (isGLFollowup) {
          updatePayload.tlConfirmed = true;
          updatePayload.tlConfirmerName = S.writerName;
          updatePayload.tlConfirmedAt = new Date().toISOString();
          // PRE-POST 비교를 위한 팀장 보완점검 답변 별도 저장
          updatePayload.followupTlAnswers = S.answers;
          updatePayload.followupTlWriterName = S.writerName;
          updatePayload.followupTlVisitDate = S.visitDate;
        }
        await updateDoc(doc(db,"surveys",S.loadedDocId), updatePayload);
      } else {
        alert("연결된 점검 문서를 찾을 수 없습니다.\n보완점검의 경우 SV가 먼저 최초점검을 완료해야 합니다.");
        if(btn){btn.disabled=false;btn.textContent="점검 제출하기";}
        return;
      }
    }
    // 그룹장 → 독립 문서로 저장 (SV 점검 여부 무관)
    else if (S.role==="gl") {
      const glNItems = Object.values(S.answers).filter(a=>a.value==="N").length;
      // GL 직접 매핑: GL Q1~Q9 → SV Q1~Q9, GL Q11 → SV Q16, GL Q10 → 없음
      const glNIds = Object.entries(S.answers)
        .filter(([,v]) => v.value === "N")
        .map(([k]) => Number(k));

      const svFollowupIds = [];
      glNIds.forEach(glId => {
        if (glId >= 1 && glId <= 9) {
          // GL Q1~Q9 → SV Q1~Q9 직접 매핑
          svFollowupIds.push(glId);
        } else if (glId === 11) {
          // GL Q11(사입관리) → SV Q16(사입관리)
          svFollowupIds.push(16);
        }
        // GL Q10 → 보완점검 없음 (이력만 남김)
      });
      // 중복 제거
      const svFollowupIdsUniq = [...new Set(svFollowupIds)];
      // GL Q10 N여부 기록 (이력용)
      const glQ10IsN = glNIds.includes(10);

      const glPayload = {
        storeCode: S.storeCode,
        storeName: S.storeName,
        storeTeam: S.storeTeam,
        writerName: S.writerName,
        visitDate: S.visitDate,
        role: "gl",
        inspType: "최초",
        answers: S.answers,
        glAnswers: S.answers,
        createdAt: new Date(),
        glNItems: glNItems,
        svFollowupIds: svFollowupIdsUniq,   // 팀장 보완점검 시 표시할 SV 문항 ID
        glQ10IsN: glQ10IsN,                 // GL Q10(품질) N이력
      };
      // Q10 제외 N항목 수 (Q10은 보완없이 이력만)
      const glNItemsExcl10 = glNIds.filter(id => id !== 10).length;
      // Q10 제외 N없음 → 자동 최종확인 (Q10 N이력은 payload에 기록됨)
      if (glNItemsExcl10 === 0) {
        glPayload.finalConfirmed = true;
        glPayload.finalConfirmedAt = new Date().toISOString();
        glPayload.glAutoConfirmed = true;
        glPayload.tlConfirmed = true;
        glPayload.tlConfirmerName = "그룹장(자동승인)";
        glPayload.tlConfirmedAt = new Date().toISOString();
      }
      // Q10 제외 N있음 → 팀장 보완점검 노출
      if (glNItemsExcl10 > 0) {
        glPayload.glRejected = true;
        glPayload.glRejectedReason = `그룹장 최초점검 N항목 ${glNItemsExcl10}건${glQ10IsN?" (품질 N이력 포함)":""}`;
        glPayload.glRejectedAt = new Date().toISOString();
        glPayload.glRejectedBy = S.writerName;
      }
      const glRef = await addDoc(collection(db,"surveys"), glPayload);
      S.loadedDocId = glRef.id;
      
    }

    // 제출 완료 후 홈으로
    const nItemCount = Object.values(S.answers).filter(a=>a.value==="N").length;
    const isGL = S.role === "gl";
    const isAutoConfirm = isGL && nItemCount === 0;

    const glQ10N = isGL && Object.entries(S.answers).some(([k,v]) => Number(k)===10 && v.value==="N");
    const glExcl10N = isGL ? Object.entries(S.answers).filter(([k,v]) => Number(k)!==10 && v.value==="N").length : 0;

    if (isAutoConfirm) {
      if (glQ10N) {
        alert("✅ 점검 제출 완료!\n최종확인 처리되었습니다.\n※ Q10(품질) N 이력이 기록되었습니다.");
      } else {
        alert("✅ 점검 제출 완료!\n이상 없어 최종확인 처리되었습니다.");
      }
    } else if (isGL && glExcl10N > 0) {
      const q10msg = glQ10N ? "\n※ Q10(품질) N 이력도 기록되었습니다." : "";
      alert(`✅ 점검 제출 완료!\nN항목 ${glExcl10N}건 - 담당 팀장 보완점검 목록에 노출됩니다.${q10msg}`);
    } else {
      alert("✅ 점검 제출 완료!");
    }
    cacheInvalidate("dashboard");
    cacheInvalidate("records");
    cacheInvalidate("followup");
    window._dashTab = "전체";
    window._dashFilter = null;
    S.history = [];
    go("home");
  } catch(e) {
    alert("저장 오류: "+e.message);
    if(btn) { btn.disabled=false; btn.textContent="점검 제출하기"; }
  }
}

// ── COMPARE ────────────────────────────────────────
async function loadCompareData(docId) {
  if (!docId) { S.compareData = null; return; }
  // 1. 대시보드/점검내역 캐시에서 먼저 탐색 (Firebase 조회 불필요)
  const cached = [
    ...(cacheGet("dashboard") || []),
    ...(cacheGet("records") || []),
  ];
  const hit = cached.find(r => r.id === docId);
  // 캐시 히트라도 이미지가 없으면 getDoc으로 전체 재조회 (상세보기용)
  const hasImage = hit && Object.values(hit.answers||{}).some(a => a.image);
  if (hit && hasImage) { S.compareData = hit; return; }
  // 이미지 없는 캐시 히트 → getDoc으로 이미지 포함 전체 조회
  // 2. 캐시 미스: Firebase 단일 문서 조회
  try {
    const docSnap = await getDoc(doc(db,"surveys",docId));
    if (docSnap.exists()) {
      S.compareData = { id: docSnap.id, ...docSnap.data() };
    } else {
      S.compareData = null;
    }
  } catch(e) {
    // 3. getDoc 실패 시 (보안규칙 차단 등): role별 전체 조회에서 탐색
    try {
      const [s1,s2,s3] = await Promise.all([
        getDocs(query(collection(db,"surveys"), where("role","==","sv"), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","tl"), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","gl"), orderBy("createdAt","desc"))),
      ]);
      let found = null;
      [s1,s2,s3].forEach(snap => snap.forEach(d => { if(d.id===docId) found={id:d.id,...d.data()}; }));
      S.compareData = found;
    } catch(e2) {
      console.error("loadCompareData 오류:", e2.message);
      S.compareData = null;
    }
  }
}

function renderCompare(root) {
  const d = S.compareData;
  if (!d) { root.innerHTML=`<p style="padding:20px">비교 데이터 없음</p>`; return; }

  const isGLDoc = d.role === "gl";
  const svA  = d.answers||{};
  const fuSvA = d.followupSvAnswers||{};
  const hasFollowup = Object.keys(fuSvA).length > 0;
  // GL 문서는 GL_QUESTIONS로, SV/TL은 SV_QUESTIONS로
  const displayQuestions = isGLDoc ? GL_QUESTIONS : SV_QUESTIONS;

  // N항목 ID 목록: SV 최초점검 N항목만 (GL 카테고리 추가분 제외)
  // A안: GL 지적 항목은 PRE-POST 비교 없이 보완점검 결과만 표시
  const svNIds = new Set(
    Object.entries(svA)
      .filter(([,v]) => v.value === "N")
      .map(([k]) => Number(k))
  );
  // GL 카테고리 추가 문항 (SV는 N아닌 항목)
  const glCatFollowupIds = new Set(d.svFollowupIds || []);
  const glOnlyIds = new Set([...glCatFollowupIds].filter(id => !svNIds.has(id)));
  // PRE-POST 비교 대상: SV N항목만
  const nIds = svNIds;

  let html = `
    <div class="page-header">
      <button class="btn-back" onclick="goBack()">←</button>
      <h2>점검 결과</h2>
    </div>
    <div class="compare-meta">
      <div class="meta-store">${d.storeName}</div>
      <div class="meta-sub">${d.storeCode} · ${d.storeTeam}</div>
    </div>`;

  // ── GL 문서 전용 처리 ──
  if (isGLDoc) {
    // Q10 N이력 표시
    if (d.glQ10IsN) {
      html += `<div class="notice-box" style="background:#FFF5F5;border-color:#FC8181;color:#C53030">
        ⚠️ Q10(품질) N 이력 기록됨 (보완점검 대상 아님)
      </div>`;
    }

    // 팀장 보완점검 결과 있으면 PRE-POST 비교
    const tlFollowupA = d.followupTlAnswers || {};
    const hasTLFollowup = Object.keys(tlFollowupA).length > 0;

    if (hasTLFollowup) {
      // GL N항목 (Q10 제외) → 매핑된 TL 문항 ID
      const glNIds = Object.entries(svA)
        .filter(([k,v]) => Number(k) !== 10 && v.value === "N")
        .map(([k]) => Number(k));

      // GL Q1~Q9 → SV Q1~Q9, GL Q11 → SV Q16
      const mappedTLIds = glNIds.map(glId => glId === 11 ? 16 : glId);

      html += `<div class="section-divider divider-follow">🔁 팀장 보완점검 PRE-POST 비교</div>`;
      html += `<div class="meta-row"><span>보완(POST): ${d.followupTlWriterName||d.tlConfirmerName||""}</span><span>${fmtDate(d.followupTlVisitDate||d.tlConfirmedAt)}</span></div>`;
      html += `<div class="meta-row"><span>최초(PRE/그룹장): ${d.writerName||""}</span><span>${fmtDate(d.visitDate)}</span></div>`;

      let glCatCurrent = "";
      // GL N항목 기준으로 비교 카드 생성
      glNIds.forEach(glId => {
        const glQ = GL_QUESTIONS.find(q => q.id === glId);
        if (!glQ) return;
        const tlId = glId === 11 ? 16 : glId; // GL→TL 매핑
        const color = CAT_COLORS[glQ.category] || "#718096";
        if (glQ.category !== glCatCurrent) {
          glCatCurrent = glQ.category;
          html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${glQ.category}</div>`;
        }
        const postA = tlFollowupA[tlId];   // 팀장 보완점검 답변
        const preA  = svA[glId];           // 그룹장 최초점검 답변
        const postV = postA?.value || "-";
        const preV  = preA?.value  || "-";
        const improved = preV === "N" && postV === "Y";
        const stillN   = preV === "N" && postV === "N";
        const postImg = normalizeImageUrl(postA?.image);
        const preImg = normalizeImageUrl(preA?.image);

        html += `
          <div class="compare-card ${improved ? "improved" : stillN ? "changed" : ""}">
            <div class="cc-title">
              ${glId===11 ? "Q11(GL)/Q16(TL)" : "Q"+glId} ${glQ.title}
              ${improved ? '<span class="improve-badge">✅ 개선</span>' : ""}
              ${stillN   ? '<span class="change-badge">❌ 미개선</span>' : ""}
            </div>
            <div class="cc-row">
              <div class="cc-cell">
                <div class="cc-role">보완(POST/팀장)</div>
                <div class="cc-val ${valClass(postV)}">${postV}</div>
                ${postImg ? `<img src="${postImg}" class="cc-img" onclick="openImageModal('${postImg}')">` : ""}
                ${postA?.memo ? `<div class="compare-memo">💬 ${postA.memo}</div>` : ""}
              </div>
              <div class="cc-cell">
                <div class="cc-role">최초(PRE/그룹장)</div>
                <div class="cc-val ${valClass(preV)}">${preV}</div>
                ${preImg ? `<img src="${preImg}" class="cc-img" onclick="openImageModal('${preImg}')">` : ""}
                ${preA?.memo ? `<div class="compare-memo">💬 ${preA.memo}</div>` : ""}
              </div>
            </div>
          </div>`;
      });
    }
  }

  // ── 보완점검 있을 때: PRE-POST 비교 (보완→최초 순서, N항목만)
  if (!isGLDoc && hasFollowup && nIds.size > 0) {
    html += `<div class="section-divider divider-follow">🔁 보완점검 PRE-POST 비교</div>`;
    html += `<div class="meta-row"><span>보완(POST): ${d.followupSvWriterName||""}</span><span>${fmtDate(d.followupSvVisitDate)}</span></div>`;
    html += `<div class="meta-row"><span>최초(PRE): ${d.writerName||""}</span><span>${fmtDate(d.visitDate)}</span></div>`;

    let catCurrent = "";
    SV_QUESTIONS.filter(q => nIds.has(q.id)).forEach(q => {
      const color = CAT_COLORS[q.category]||"#718096";
      if (q.category !== catCurrent) {
        catCurrent = q.category;
        html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
      }
      const postA = fuSvA[q.id];
      const preA  = svA[q.id];
      const postV = postA?.value || "-";
      const preV  = preA?.value  || "-";
      // 개선 여부
      const improved = preV === "N" && postV === "Y";
      const stillN   = preV === "N" && postV === "N";

      html += `
        <div class="compare-card ${improved ? "improved" : stillN ? "changed" : ""}">
          <div class="cc-title">
            Q${q.id} ${q.title}
            ${improved ? '<span class="improve-badge">✅ 개선</span>' : ""}
            ${stillN   ? '<span class="change-badge">❌ 미개선</span>' : ""}
          </div>
          <div class="cc-row">
            <div class="cc-cell">
              <div class="cc-role">보완(POST)</div>
              <div class="cc-val ${valClass(postV)}">${postV}</div>
              ${postA?.image ? `<img src="${normalizeImageUrl(postA.image)}" class="cc-img" onclick="openImageModal('${normalizeImageUrl(postA.image)}')">` : ""}
              ${postA?.memo ? `<div class="compare-memo">💬 ${postA.memo}</div>` : ""}
            </div>
            <div class="cc-cell">
              <div class="cc-role">최초(PRE)</div>
              <div class="cc-val ${valClass(preV)}">${preV}</div>
              ${preA?.image ? `<img src="${normalizeImageUrl(preA.image)}" class="cc-img" onclick="openImageModal('${normalizeImageUrl(preA.image)}')">` : ""}
              ${preA?.memo ? `<div class="compare-memo">💬 ${preA.memo}</div>` : ""}
            </div>
          </div>
        </div>`;
    });
  }

  // ── GL 지적 카테고리 보완점검 결과 (별도 섹션, SV/TL 문서에서만)
  if (!isGLDoc && glOnlyIds.size > 0 && hasFollowup) {
    html += `<div class="section-divider" style="background:#FFFBEB;color:#744210">🔍 그룹장 지적 카테고리 보완점검 결과</div>`;
    let catCurrent2 = "";
    SV_QUESTIONS.filter(q => glOnlyIds.has(q.id)).forEach(q => {
      const color = CAT_COLORS[q.category]||"#718096";
      if (q.category !== catCurrent2) {
        catCurrent2 = q.category;
        html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
      }
      const postA = fuSvA[q.id];
      const postV = postA?.value || "-";
      html += `
        <div class="compare-card" style="border-color:#D69E2E">
          <div class="cc-title">Q${q.id} ${q.title} <span class="n-label" style="background:#FEFCBF;color:#744210">🔍 그룹장 지적</span></div>
          <div class="cc-row">
            <div class="cc-cell">
              <div class="cc-role">보완 결과</div>
              <div class="cc-val ${valClass(postV)}">${postV}</div>
              ${postA?.image ? `<img src="${normalizeImageUrl(postA.image)}" class="cc-img" onclick="openImageModal('${normalizeImageUrl(postA.image)}')">` : ""}
              ${postA?.memo ? `<div class="compare-memo">💬 ${postA.memo}</div>` : ""}
            </div>
          </div>
        </div>`;
    });
  }

  // ── 최초점검 전체 결과 (GL 문서 제외 - GL은 버튼 분기에서 별도 표시)
  if (!isGLDoc) {
  html += `<div class="section-divider divider-first">📋 최초 점검 전체 결과</div>`;
  {
    html += `<div class="meta-row"><span>SV: ${d.writerName||""}</span><span>${fmtDate(d.visitDate)}</span></div>`;
    if (d.tlWriterName) html += `<div class="meta-row"><span>팀장: ${d.tlWriterName}</span><span>${fmtDate(d.tlVisitDate)}</span></div>`;
    if (d.glWriterName) html += `<div class="meta-row"><span>그룹장: ${d.glWriterName}</span><span>${fmtDate(d.glVisitDate)}</span></div>`;
  }

  let catCurrent = "";
  displayQuestions.forEach(q => {
    const color = CAT_COLORS[q.category]||"#718096";
    if (q.category !== catCurrent) {
      catCurrent = q.category;
      html += `<div class="cat-header" style="border-left:4px solid ${color};color:${color}">${q.category}</div>`;
    }
    const sv = svA[q.id];
    const svV = sv?.value || "-";
    const isN = svV === "N";
    html += `
      <div class="compare-card ${isN ? "changed" : ""}">
        <div class="cc-title">Q${q.id} ${q.title} ${isN ? '<span class="change-badge">N</span>' : ""}</div>

async function authLogin(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
    return { ok: true };
  } catch(e) {
    return { ok: false, msg: e.code === "auth/invalid-credential" ? "이메일 또는 비밀번호가 올바르지 않습니다." : e.message };

}

}

async function authChangePassword(currentPw, newPw) {
  if (!_currentUser) return { ok: false, msg: "로그인이 필요합니다." };
  try {
    const cred = EmailAuthProvider.credential(_currentUser.email, currentPw);
    await reauthenticateWithCredential(_currentUser, cred);
    await updatePassword(_currentUser, newPw);
    return { ok: true };
  } catch(e) {
    return { ok: false, msg: e.code === "auth/invalid-credential" ? "현재 비밀번호가 올바르지 않습니다." : e.message };
  }
}

  try {

    return { ok: false, msg: e.message };
  }
}

// ── Firebase Storage 함수 ──────────────────────────
// 이미지 업로드: base64 → Storage URL 변환
async function uploadImageToStorage(base64, path) {
  try {
    // base64 → Blob 변환
    const res  = await fetch(base64);
    const blob = await res.blob();
    const ref  = storageRef(storage, path);
    await uploadBytes(ref, blob);
    const url  = await getDownloadURL(ref);
    return { ok: true, url };
  } catch(e) {
    console.error("Storage 업로드 오류:", e.message);
    return { ok: false, url: null };
  }
}

// 이미지 삭제: Storage URL → 파일 삭제
async function deleteImageFromStorage(url) {
  try {
    const ref = storageRef(storage, url);
    await deleteObject(ref);
    return { ok: true };
  } catch(e) {
    // 파일 없어도 무시 (이미 삭제됐거나 base64 방식 구버전)
    return { ok: true };
  }
}

// 이미지 URL 정규화: base64 또는 Storage URL 모두 처리
function normalizeImageUrl(image) {
  if (!image) return null;
  if (image.startsWith("data:") || image.startsWith("http")) return image;
  return "data:image/jpeg;base64," + image;
}

// ── 이미지 필드 제거 (목록 조회 최적화) ──────────────
// 목록/대시보드: 이미지 불필요 → 제거하여 메모리/속도 개선
// 상세보기: getDoc으로 이미지 포함 전체 문서 별도 조회
function stripImages(records) {
  return records.map(r => {
    const stripped = { ...r };
    // answers 내 이미지 제거
    if (stripped.answers) {
      stripped.answers = Object.fromEntries(
        Object.entries(stripped.answers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.followupSvAnswers) {
      stripped.followupSvAnswers = Object.fromEntries(
        Object.entries(stripped.followupSvAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.followupTlAnswers) {
      stripped.followupTlAnswers = Object.fromEntries(
        Object.entries(stripped.followupTlAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.tlAnswers) {
      stripped.tlAnswers = Object.fromEntries(
        Object.entries(stripped.tlAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    if (stripped.glAnswers) {
      stripped.glAnswers = Object.fromEntries(
        Object.entries(stripped.glAnswers).map(([k, v]) => [k, { ...v, image: null }])
      );
    }
    return stripped;
  });
}

// ── SheetJS 지연 로딩 ──────────────────────────────
let _xlsxLoaded = false;
let _xlsxLoading = null;
function loadXLSX() {
  if (_xlsxLoaded && window.XLSX) return Promise.resolve();
  if (_xlsxLoading) return _xlsxLoading;
  _xlsxLoading = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js";
    script.onload = () => { _xlsxLoaded = true; resolve(); };
    script.onerror = () => reject(new Error("SheetJS 로드 실패"));
    document.head.appendChild(script);
  });
  return _xlsxLoading;
}

// ── 캐시 시스템 ────────────────────────────────────
const _cache = {
  store:     { data: null, ts: 0 },           // 세션 캐시 (TTL 없음)
  dashboard: { data: null, ts: 0, ttl: 600 }, // 10분 (3분→10분)
  records:   { data: null, ts: 0, ttl: 480 }, // 8분  (2분→8분)
  followup:  { data: null, ts: 0, ttl: 900 }, // 15분 (5분→15분)
};
function cacheGet(key) {
  const c = _cache[key];
  if (!c || !c.data) return null;
  if (c.ttl && (Date.now()/1000 - c.ts) > c.ttl) { c.data = null; return null; }
  return c.data;
}
function cacheSet(key, data) {
  if (_cache[key]) { _cache[key].data = data; _cache[key].ts = Date.now()/1000; }
}
function cacheInvalidate(key) {
  if (_cache[key]) { _cache[key].data = null; _cache[key].ts = 0; }
}

// 점검 상태 배지 공통 함수
function getInspStatusBadge(r) {
  const nItems     = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
  const hasFollowup = !!r.followupSvAnswers;
  const followupN  = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;

  if (hasFollowup && followupN === 0) {
    // 보완점검 후 N 없음 → 보완점검완료
    return `<span class="status-badge status-followup-done">보완점검완료</span>`;
  } else if (hasFollowup && followupN > 0) {
    // 보완점검 했지만 N 잔존
    return `<span class="status-badge status-need-more">추가점검필요 N ${followupN}건</span>`;
  } else if (nItems > 0) {
    // 최초점검 N 있음, 보완 미실시
    return `<span class="status-badge status-need">추가점검필요 N ${nItems}건</span>`;
  } else {
    // N 없음 → 점검완료
    return `<span class="status-badge status-done">점검완료</span>`;
  }
}

      glRejectedAt: new Date().toISOString(),

}

async function fetchRecords() {
  const keyword = document.getElementById("recSearch").value.trim();
  const recList = document.getElementById("recList");
  recList.innerHTML = `<p class="loading-text">불러오는 중...</p>`;
  try {
    // SV + TL + GL 전체 조회 후 병합
    let records = cacheGet("records");
    if (!records) {
      const [svSnap2, tlSnap2, glSnap2] = await Promise.all([
        getDocs(query(collection(db,"surveys"), where("role","==","sv"), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","tl"), orderBy("createdAt","desc"))),
        getDocs(query(collection(db,"surveys"), where("role","==","gl"), orderBy("createdAt","desc"))),
      ]);
      records = [];
      svSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      tlSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      glSnap2.forEach(d => records.push({id:d.id,...d.data()}));
      records.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      cacheSet("records", stripImages(records)); // 이미지 제외 버전 캐시
    }
    // 양도양수: 각 점포코드에 배지 정보 추가
    const tMap = window._transferMap || new Map();
    records = records.map(r => ({
      ...r,
      _transferInfo: tMap.get(r.storeCode) || null,
    }));
    // 검색 유형에 따라 필터링
    const searchType = window._searchType || 'store';
    if (keyword) {
      if (searchType === 'store') {
        records = records.filter(r => r.storeName && r.storeName.includes(keyword));
      } else {
        // 점검자명: SV + 팀장 + 그룹장 이름 모두 검색
        records = records.filter(r =>
          (r.writerName && r.writerName.includes(keyword)) ||
          (r.tlWriterName && r.tlWriterName.includes(keyword)) ||
          (r.glWriterName && r.glWriterName.includes(keyword)) ||
          (r.followupSvWriterName && r.followupSvWriterName.includes(keyword)) ||
          (r.followupTlWriterName && r.followupTlWriterName.includes(keyword)) ||
          (r.followupGlWriterName && r.followupGlWriterName.includes(keyword))
        );
      }
    }
    if (records.length===0) { recList.innerHTML=`<p class="error-text">검색 결과가 없습니다.</p>`; return; }
    let html = `<div class="store-count" style="padding:8px 2px">${records.length}건</div><div class="search-list">`;
    records.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleString("ko-KR") : "-";
      const typeBadge = `<span class="insp-badge ${r.inspType==='최초'?'badge-first':'badge-follow'} badge-sm">${r.inspType||"최초"}점검</span>`;
      const statusBadge = getInspStatusBadge(r);
      const tInfoR = (window._transferMap||new Map()).get(r.storeCode) || null;
      const transferBadgeR = tInfoR
        ? tInfoR.map(t => {
            const d = t.transferDate||""; const yy=d.slice(2,4); const mm=d.slice(5,7);
            return `<span class="badge-transfer">⚡ ${yy}.${mm} 양도양수</span>`;
          }).join(" ")
        : "";
      html += `<div class="search-item" onclick="viewRecord('${r.id}')">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${typeBadge}<span class="si-store">${r.storeName}</span>${transferBadgeR}</div>
        <div class="si-meta">${r.role==="gl"?"그룹장":r.role==="tl"?"팀장":"SV"}: ${r.writerName} · ${dt}</div>
        <div class="si-tags">${statusBadge}</div>
        <div class="si-arrow">→</div>
      </div>`;
    });
    recList.innerHTML = html + `</div>`;
  } catch(e) { recList.innerHTML=`<p class="error-text">오류: ${e.message}</p>`; }
}

// ── 날짜 필터 유틸 함수들 ──────────────────────────
function getDashDateRange() {
  const f = window._dashDateFilter || "오늘";
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (f === "오늘") {
    const label = `오늘의 점검 현황 (${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')})`;
    return { from: today, label };
  }
  if (f === "어제") {
    const d = new Date(today); d.setDate(d.getDate()-1);
    return { from: d, to: new Date(d), label: "어제 점검 현황" };
  }
  if (f === "3일") {
    const d = new Date(today); d.setDate(d.getDate()-2);
    return { from: d, label: "최근 3일 점검 현황" };
  }
  if (f === "1주") {
    const d = new Date(today); d.setDate(d.getDate()-6);
    return { from: d, label: "최근 1주 점검 현황" };
  }
  if (f === "1개월") {
    const d = new Date(today); d.setMonth(d.getMonth()-1);
    return { from: d, label: "최근 1개월 점검 현황" };
  }
  if (f === "기간선택") {
    const fr = window._dashDateFrom ? new Date(window._dashDateFrom) : today;
    const to = window._dashDateTo   ? new Date(window._dashDateTo)   : today;
    return { from: fr, to, label: "기간 선택 점검 현황" };
  }
  return { from: today, label: "오늘의 점검 현황" };
}

function filterByDate(records) {
  const { from, to } = getDashDateRange();
  return records.filter(r => {
    const d = r.visitDate
      ? new Date(r.visitDate)
      : (r.createdAt ? new Date(r.createdAt.seconds*1000) : null);
    if (!d) return false;
    const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (to) return day >= from && day <= to;
    return day >= from;
  });
}

function setDashDateFilter(f) {
  window._dashDateFilter = f;
  window._dashShown = 20;
  if (f !== "기간선택") {
    buildDashboard(document.getElementById("app"), window._dashRecords);
  } else {

function buildDashboard(root, records) {
  // ── Step 1: 탭/필터 상태 (가장 먼저 정의) ──
  const tab        = window._dashTab        || "전체";
  const dashFilter = window._dashFilter     || null;
  const df         = window._dashDateFilter || "오늘";

  // ── Step 2: 날짜 필터 적용 기준 결정 ──
  // 전체 탭: 날짜 필터 적용 / 나머지 탭: 전체 기간
  const statsBase = (tab === "전체") ? filterByDate(records) : records;

  // ── Step 3: isPending 정의 ──
  const isPending = r =>
    !r.finalConfirmed &&
    Object.values(r.answers||{}).some(a => a.value === "N") &&
    !r.followupSvAnswers && !r.followupTlAnswers;

  // ── Step 4 & 5: 통계 카드 + 탭 카운트 (모두 statsBase 기반으로 통일) ──
  // statsBase = 전체탭: 날짜필터 적용 / 나머지탭: 전체기간
  // → 통계카드 숫자와 탭 카운트 숫자가 항상 일치

  const isReadyForTL = r => {
    if (r.role === "gl") {
      return r.glRejected === true && !r.tlConfirmed && !r.finalConfirmed;
    }
    const rNItems      = Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const rHasFollowup = !!r.followupSvAnswers;
    const rFollowupN   = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;
    return ((rNItems===0) || (rHasFollowup && rFollowupN===0)) && !r.tlConfirmed && !r.finalConfirmed;
  };
  const isReadyForGL = r => r.tlConfirmed && !r.finalConfirmed;

  const total          = statsBase.length;
  const hasFirst       = statsBase.filter(r => r.inspType==="최초"||!r.inspType).length;
  const hasFollowup    = statsBase.filter(r =>
    (r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0) ||
    (r.followupTlAnswers && Object.values(r.followupTlAnswers||{}).filter(a=>a.value==="N").length===0)
  ).length;
  const pending        = statsBase.filter(isPending).length;
  const tlConfirmReady = statsBase.filter(isReadyForTL).length;
  const glConfirmReady = statsBase.filter(isReadyForGL).length;
  const finalConfirmed = statsBase.filter(r => r.finalConfirmed).length;

  // ── Step 6: 탭별 tableRecords 결정 ──
  let tableRecords = records;
  if (tab === "전체" && dashFilter) {
    if      (dashFilter === "전체점검")   tableRecords = records;
    else if (dashFilter === "최초점검")   tableRecords = records.filter(r => r.inspType==="최초"||!r.inspType);
    else if (dashFilter === "보완미실시") tableRecords = records.filter(isPending);
    else if (dashFilter === "보완완료")   tableRecords = records.filter(r =>
      (r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0) ||
      (r.followupTlAnswers && Object.values(r.followupTlAnswers||{}).filter(a=>a.value==="N").length===0)
    );
    else if (dashFilter === "최종확인")   tableRecords = records.filter(r => r.finalConfirmed);
  } else if (tab === "팀장확인") {
    let tlFiltered = records.filter(isReadyForTL);
    const selectedTL = window._dashTLFilter || "";
    if (selectedTL) {
      const _as = window._activeStores || [];
      const tlStoreCodes = new Set(_as.filter(s => s.tl === selectedTL).map(s => s.code));
      tlFiltered = tlFiltered.filter(r => tlStoreCodes.has(r.storeCode));
    }
    tableRecords = tlFiltered;
  } else if (tab === "그룹장확인") {
    tableRecords = records.filter(isReadyForGL);
  } else if (tab === "최종확인") {
    tableRecords = records.filter(r => r.finalConfirmed);
  }

  // ── Step 7: 날짜 필터 + 더보기 슬라이싱 ──
  const dateFiltered  = (tab === "전체") ? filterByDate(tableRecords) : tableRecords;
  const shown         = window._dashShown || 20;
  const shownRecords  = dateFiltered.slice(0, shown);
  const remaining     = dateFiltered.length - shown;

  // ── Step 8: 행 렌더링 ──
  const rows = shownRecords.map(r => {
    const dt        = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString("ko-KR") : "-";
    const typeBadge = `<span class="insp-badge ${r.inspType==='최초'||!r.inspType?'badge-first':'badge-follow'} badge-sm">${r.inspType||'최초'}점검</span>`;
    const nItems    = r.role === "gl"
      ? Object.entries(r.answers||{}).filter(([k,v]) => Number(k) !== 10 && v.value === "N").length
      : Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const nBadge    = nItems>0
      ? `<span class="badge-n">N ${nItems}건</span>`
      : `<span class="badge-ok">이상없음</span>`;

    let statusBadge = "";
    const hasFollowupDone = !!r.followupSvAnswers;
    const followupNItems  = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;

    if (r.role === "gl") {
      if (r.finalConfirmed)  statusBadge = `<span class="badge-final">✅ 최종확인</span>`;
      else if (r.glRejected) statusBadge = `<span class="badge-tl">📋 팀장 보완점검 대기</span>`;
      else                   statusBadge = `<span class="badge-ok">점검완료</span>`;
    } else {
      const isClean = nItems===0 || (hasFollowupDone && followupNItems===0);
      if (r.finalConfirmed)   statusBadge = `<span class="badge-final">✅ 최종확인</span>`;
      else if (r.glRejected)  statusBadge = `<span class="badge-reject">🚫 그룹장 반려</span>`;
      else if (r.tlRejected)  statusBadge = `<span class="badge-reject">🚫 팀장 반려</span>`;
      else if (r.tlConfirmed) statusBadge = `<span class="badge-gl">👥 그룹장확인 대기</span>`;
      else if (isClean)       statusBadge = `<span class="badge-tl">📋 팀장확인 대기</span>`;
      else                    statusBadge = getInspStatusBadge(r);
    }

    const glFollowupRow    = r.role === "gl" && r.glRejected && !r.finalConfirmed;
    const rowBg            = glFollowupRow ? 'style="cursor:pointer;background:#FFFBEB"' : 'style="cursor:pointer"';
    const finalStatusBadge = glFollowupRow
      ? `<span class="badge-tl" style="background:#FEFCBF;color:#744210;border:1px solid #D69E2E">🔍 보완점검 진행</span>`
      : statusBadge;
    const tInfo            = r._transferInfo || (window._transferMap||new Map()).get(r.storeCode) || null;
    const transferBadges   = tInfo
      ? tInfo.map(t => {
          const d = t.transferDate || "";
          const yy = d.slice(2,4); const mm = d.slice(5,7);
          return `<span class="badge-transfer">⚡ ${yy}.${mm} 양도양수</span>`;
        }).join(" ")
      : "";
    return `<tr onclick="viewRecordDash('${r.id}')" ${rowBg}>
      <td>${typeBadge} ${r.storeName||""}${transferBadges ? " "+transferBadges : ""}</td>
      <td>${r.writerName||""}<br><span style="font-size:11px;color:#718096">${dt}</span></td>
      <td>${nBadge}</td>
      <td>${finalStatusBadge}</td>
    </tr>`;
  }).join("");

  // ── Step 9: UI 헬퍼 ──

function setDashFilter(filter) {
  window._dashTab = "전체";
  window._dashFilter = window._dashFilter === dashFilter ? null : filter;
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function clearDashFilter() {
  window._dashFilter = null;
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function setTLFilter(value) {
  window._dashTLFilter = value || "";
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

function setDashTab(tab) {
  window._dashTab = tab;
  window._dashFilter = null;
  window._dashShown = 20;
  buildDashboard(document.getElementById("app"), window._dashRecords);
}

async function updateStoreDataStatus() {
  const statusEl = document.getElementById("storeDataStatus");
  if (!statusEl) return;
  try {
    const snap = await getDocs(collection(db, "store_master"));
    if (!snap.empty) {
      statusEl.textContent = `Firebase 매장 데이터 ${snap.size}개 적용 중`;
      statusEl.style.color = "#38A169";
    } else {
      statusEl.textContent = `내장 데이터 사용 중 (Excel 업로드 시 자동 교체)`;
      statusEl.style.color = "#D69E2E";
    }
  } catch(e) {
    statusEl.textContent = "매장 데이터 상태 확인 실패";
    statusEl.style.color = "#E53E3E";
  }
}

async function handleStoreUpload(input) {
  const file = input.files[0];
  if (!file) return;

  // 확인 팝업
  const confirmed = confirm(
    `매장 데이터를 업로드하면 기존 Firebase 매장 데이터가 교체됩니다.
파일: ${file.name}

계속하시겠습니까?`
  );
  if (!confirmed) { input.value = ""; return; }

  const progress = document.getElementById("uploadProgress");
  const fill = document.getElementById("uploadProgressFill");
  const text = document.getElementById("uploadProgressText");
  if (progress) progress.style.display = "block";
  if (fill) fill.style.width = "30%";
  if (text) text.textContent = "파일 분석 중...";

  try {
    if (fill) fill.style.width = "60%";
    if (text) text.textContent = "Firebase 업로드 중...";

    const count = await uploadStoreData(file);

    if (fill) fill.style.width = "100%";
    if (text) text.textContent = `완료! ${count}개 매장 업로드됨`;

    setTimeout(() => {
      if (progress) progress.style.display = "none";
      updateStoreDataStatus();
    }, 2000);

    alert(`✅ 매장 데이터 업로드 완료!
${count}개 매장이 등록되었습니다.`);
  } catch(e) {
    if (text) text.textContent = `오류: ${e}`;
    if (fill) fill.style.width = "0%";
    alert(`업로드 실패: ${e}`);
  }
  input.value = "";
}

async function viewRecordDash(docId) {
  const records = window._dashRecords||[];
  const found = records.find(r=>r.id===docId);
  if (!found) return;
  S.loadedDocId = docId;

  // GL glRejected 건: compare 화면으로 이동 (그룹장 최초점검 결과 + 보완점검 시작 버튼)
  if (found.role === "gl" && found.glRejected && !found.finalConfirmed && !found.tlConfirmed) {
    // GL 반려건: loadGLCompareAndShow로 이미지 포함 전체 로드
    loadGLCompareAndShow(docId);
    return;
  }

  // 이미지 포함 전체 문서 로드 (stripImages된 캐시 대신 getDoc 재조회)
  await loadCompareData(docId);
  go("compare");
}

async function downloadPDF() {
  const records = window._dashRecords;
  if (!records || records.length === 0) { alert("다운로드할 데이터가 없습니다."); return; }

  const today = new Date().toLocaleDateString("ko-KR");
  const total       = records.length;
  const hasFirst    = records.filter(r => r.inspType==="최초"||!r.inspType).length;
  const hasFollowup = records.filter(r => r.followupSvAnswers && Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length===0).length;
  const pending     = records.filter(r =>
    !r.finalConfirmed &&
    Object.values(r.answers||{}).some(a => a.value === "N") &&
    !r.followupSvAnswers && !r.followupTlAnswers).length;
  const finalDone   = records.filter(r => r.finalConfirmed).length;

  // 테이블 행 생성
  const rows = records.map(r => {
    const dt = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString("ko-KR") : "-";
    // GL 문서는 Q1~Q11(GL_QUESTIONS) 기준, Q10 제외 N항목
    const nItems = r.role === "gl"
      ? Object.entries(r.answers||{}).filter(([k,v]) => Number(k) !== 10 && v.value === "N").length
      : Object.values(r.answers||{}).filter(a=>a.value==="N").length;
    const followupN = Object.values(r.followupSvAnswers||{}).filter(a=>a.value==="N").length;
    let status = "";
    if (r.finalConfirmed)            status = '<span style="color:#276749;font-weight:700">✅ 최종확인</span>';
    else if (r.tlConfirmed)          status = '<span style="color:#553C9A;font-weight:700">👥 그룹장확인 대기</span>';
    else if (r.followupSvAnswers && followupN===0) status = '<span style="color:#2B6CB0;font-weight:700">📋 팀장확인 대기</span>';
    else if (r.followupSvAnswers)    status = '<span style="color:#C53030;font-weight:700">보완중 N '+followupN+'건</span>';
    else if (nItems > 0)             status = '<span style="color:#D69E2E;font-weight:700">⏳ 보완필요</span>';
    else                             status = '<span style="color:#276749">이상없음</span>';
    return `<tr>
      <td>${r.storeName||""}</td>
      <td>${r.storeTeam||""}</td>
      <td>${r.writerName||""}</td>
      <td>${dt}</td>
      <td>${r.inspType||"최초"}점검</td>
      <td>${nItems > 0 ? '<span style="color:#C53030;font-weight:700">N '+nItems+'건</span>' : '<span style="color:#276749">이상없음</span>'}</td>
      <td>${status}</td>
    </tr>`;
  }).join("");

  const printHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>신규플랫폼 점검리포트 ${today}</title>
<style>
  @page { size: A4 landscape; margin: 15mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif; font-size: 11px; color: #1A202C; }
  .header { background: #E53E3E; color: white; padding: 14px 20px; border-radius: 8px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-size: 20px; font-weight: 800; }
  .header-sub { font-size: 12px; opacity: 0.85; }
  .stats { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat { flex: 1; background: #F7F8FA; border: 1px solid #E2E8F0; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 10px; color: #718096; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
  th { background: #E53E3E; color: white; padding: 7px 8px; text-align: left; font-size: 11px; }
  td { padding: 6px 8px; border-bottom: 1px solid #E2E8F0; vertical-align: middle; }
  tr:nth-child(even) td { background: #F7F8FA; }
  .footer { margin-top: 12px; text-align: center; font-size: 10px; color: #718096; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">신규플랫폼 현장점검 리포트</div>
      <div class="header-sub">비프 · 피자 · 스파쿨 | 출력일: ${today}</div>
    </div>
    <div style="font-size:13px;opacity:0.9">총 ${total}건</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">전체점검</div></div>
    <div class="stat"><div class="stat-num" style="color:#3182CE">${hasFirst}</div><div class="stat-label">최초점검</div></div>
    <div class="stat"><div class="stat-num" style="color:#D69E2E">${pending}</div><div class="stat-label">보완미실시</div></div>

  const win = window.open("", "_blank");

}
async function downloadExcel() {
  const records = window._dashRecords;
  if(!records||records.length===0) { alert("다운로드할 데이터가 없습니다."); return; }
  // SheetJS 지연 로딩
  try {
    await loadXLSX();
  } catch(e) {
    alert("Excel 라이브러리 로드 실패\n인터넷 연결을 확인해주세요."); return;
  }

  // 헤더: 답변값만 (이미지 제외)
  const svH  = SV_QUESTIONS.map(q=>`[SV] Q${q.id} ${q.title}`);
  const tlH  = SV_QUESTIONS.map(q=>`[팀장] Q${q.id} ${q.title}`);
  const glH  = GL_QUESTIONS.map(q=>`[그룹장] Q${q.id} ${q.title}`);
  const confirmH = ["팀장확인자","팀장확인일시","그룹장확인일시","최종확인여부"];

  const rows = [["매장코드","매장명","팀","점검유형","역할","점검자","방문일시",...svH,...tlH,...glH,...confirmH]];

  records.forEach(r => {
    const addRow = (type, role, name, date, answers, tla, gla) => {
      if (!name && !Object.keys(answers||{}).length) return;

      const svVals = SV_QUESTIONS.map(q=> answers?.[q.id]?.value||"");
      const tlVals = SV_QUESTIONS.map(q=> tla?.[q.id]?.value||"");
      const glVals = GL_QUESTIONS.map(q=> gla?.[q.id]?.value||"");
      const confirmVals = [
        r.tlConfirmerName||"",
        r.tlConfirmedAt ? fmtDate(r.tlConfirmedAt) : "",
        r.finalConfirmedAt ? fmtDate(r.finalConfirmedAt) : "",
        r.finalConfirmed ? "Y" : "N",
      ];
      rows.push([r.storeCode,r.storeName,r.storeTeam,type,role,name||"",fmtDate(date),...svVals,...tlVals,...glVals,...confirmVals]);
    };
    addRow("최초점검","SV",r.writerName,r.visitDate,r.answers,r.tlAnswers,r.glAnswers);
    if(r.followupSvAnswers) addRow("보완점검","SV",r.followupSvWriterName,r.followupSvVisitDate,r.followupSvAnswers,r.followupTlAnswers,r.followupGlAnswers);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 이미지 Data URL 셀 처리: URL 텍스트로 저장 + 열 너비 고정
  const colCount = rows[0].length;
  for (let ri = 1; ri < rows.length; ri++) {
    for (let ci = 0; ci < colCount; ci++) {
      const val = rows[ri][ci];
      if (typeof val === "string" && val.startsWith("data:image")) {
        const cellRef = XLSX.utils.encode_cell({r: ri, c: ci});
        if (ws[cellRef]) {
          // Data URL을 그대로 텍스트로 저장 (브라우저 주소창에 붙여넣으면 이미지 열림)
          ws[cellRef].v = val;
          ws[cellRef].t = "s";
        }
      }
    }
  }

  // 열 너비 고정 - 이미지 URL 열은 고정폭(넘쳐도 옆 셀 침범 안 함)
  const colW = [{wch:10},{wch:16},{wch:8},{wch:8},{wch:10},{wch:10},{wch:18},
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(SV_QUESTIONS.length).fill({wch:10}),
    ...Array(GL_QUESTIONS.length).fill({wch:10}),
    {wch:12},{wch:18},{wch:18},{wch:10}];
  ws["!cols"] = colW;

  XLSX.utils.book_append_sheet(wb,ws,"점검이력");
  try {
    XLSX.writeFile(wb,`신규플랫폼_점검이력_${new Date().toISOString().slice(0,10)}.xlsx`);
  } catch(e) {
    alert("Excel 다운로드 오류: " + e.message);
    console.error("Excel error:", e);
  }
}

function openImageModal(src) {
  const modal = document.createElement("div");
  modal.className = "img-modal";
  modal.innerHTML = `<div class="img-modal-bg" onclick="this.parentElement.remove()"></div>
    <img src="${src}" class="img-modal-img">
    <button class="img-modal-close" onclick="this.parentElement.remove()">✕</button>`;
  document.body.appendChild(modal);
}
function go(screen) {
  if (!S.history) S.history = [];
  if (S.screen && S.screen !== screen) S.history.push(S.screen);
  S.screen = screen;
  render();
}
function goBack() {
  if (!S.history) S.history = [];
  const prev = S.history.pop();
  if (prev) { S.screen = prev; render(); }
  else go("home");
}
